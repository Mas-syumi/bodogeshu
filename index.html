<script>
"use strict";
/* ================= 対戦履歴（保存先3段構え） ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="loveletter-history";
const FPATH="loveletter/history";
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig); fdb=firebase.database();
  }
}catch(e){ console.warn("firebase init failed",e); }
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage; // バンドル内iframeから親のストレージを借りる
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）"
  : (STORE ? "アプリ内ストレージ" : "この端末のみ");
/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY, false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}
/* 全消去の確認（Firebase有効時は共有データである旨を明示） */
function confirmClear(){
  const shared = !!fdb;
  showSheet({title:"履歴を全消去しますか？",
    body: shared
      ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
      : `この端末に保存された対戦履歴をすべて削除します。`,
    btns:[["削除する", async()=>{ await clearHistory(); msg("対戦履歴を消去しました"); }],
          ["やめる", null, "g"]]});
}


/* ================= cards ================= */
const CARDS={
  1:{n:"兵士", count:5, ds:"相手1人の手札を推理（兵士以外）。的中でその人は脱落"},
  2:{n:"僧侶", count:2, ds:"相手1人の手札をこっそり見る"},
  3:{n:"男爵", count:2, ds:"相手1人と手札を比べ、小さい方が脱落"},
  4:{n:"侍女", count:2, ds:"次の自分の番まで、他のカードの対象にならない"},
  5:{n:"王子", count:2, ds:"誰か1人（自分も可）の手札を捨てさせ、1枚引き直させる"},
  6:{n:"王",   count:1, ds:"相手1人と手札を交換する"},
  7:{n:"伯爵夫人", count:1, ds:"王か王子と同時に持っていたら、この札を必ず捨てる"},
  8:{n:"姫",   count:1, ds:"この札を捨てたら（捨てさせられたら）脱落"},
};
let fastFwd=false;
const sleep=ms=>new Promise(r=>setTimeout(r, fastFwd?0:ms));
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const $=id=>document.getElementById(id);

/* ================= state ================= */
const CPU_NAMES=["アルベルト","ロザリンデ","ジーモン"];
let players, deck, burn, faceup, turnIdx, startIdx, roundNo, tokenGoal, diffLevel="normal", over;
let busy=false;
let know; // know[a][b] = aがbの手札だと知っている値 or null
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};

function chooseSetup(){
  showSheet({title:"対戦人数を選択",body:`あなた + CPU で対戦します<br>先に3点（トークン3個）を取った人の勝ち`,center:true,btns:[
    ["2人（CPU×1）",()=>chooseDiff(1)],
    ["3人（CPU×2）",()=>chooseDiff(2)],
    ["4人（CPU×3）",()=>chooseDiff(3)],
  ]});
}
function chooseDiff(nCpu){
  showSheet({title:"CPUの強さを選択",center:true,
    body:"やさしい：気まぐれに打つ<br>ふつう：定石どおり<br>つよい：捨て札を数え、見た手札を覚えている",
    btns:[
      ["やさしい",()=>newGame(nCpu,"easy")],
      ["ふつう",()=>newGame(nCpu,"normal")],
      ["つよい",()=>newGame(nCpu,"hard")],
    ]});
}
function newGame(nCpu,diff){
  diffLevel=diff;
  players=[{name:"あなた",cpu:false}];
  for(let i=0;i<nCpu;i++) players.push({name:"CPU・"+CPU_NAMES[i],cpu:true});
  for(const p of players){ p.tokens=0; }
  tokenGoal=3;                       // 第2版の正規ルール：3点先取
  roundNo=0; over=false;
  startIdx=Math.floor(Math.random()*players.length);   // 初回の先手はランダム
  newRound(startIdx);
}
function newRound(starter){
  roundNo++;
  fastFwd=false;
  deck=shuffle(Object.entries(CARDS).flatMap(([v,c])=>Array(c.count).fill(+v)));
  burn=deck.pop();                       // 1枚伏せて除外
  faceup=[];
  if(players.length===2){ faceup=[deck.pop(),deck.pop(),deck.pop()]; }  // 2人戦は3枚公開除外
  for(const p of players){ p.hand=[deck.pop()]; p.disc=[]; p.out=false; p.prot=false; }
  know=players.map(()=>players.map(()=>null));
  turnIdx=starter;
  msg(`ラウンド${roundNo}開始。先手は <span class="em">${players[starter].name}</span>`);
  renderAll();
  setTimeout(runTurn, 1100);
}

/* ================= render ================= */
function msg(h){$("msg").innerHTML=h;}
function discHTML(p){
  return p.disc.map(v=>`<span class="dchip" data-card="${v}" title="${CARDS[v].n}">${v}</span>`).join("");
}
function renderAll(){
  $("topinfo").textContent=`3点先取 ・ CPU:${DIFF_LABEL[diffLevel]} ・ ラウンド${roundNo}`;
  $("opps").innerHTML=players.map((p,i)=>{
    if(i===0) return "";
    const intel = know[0][i]!=null && !p.out ? `<div class="intel">👁 持ち札は「${CARDS[know[0][i]].n}」</div>`:"";
    return `<div class="opp${turnIdx===i&&!p.out?" active":""}${p.out?" dead":""}">
      <div class="line1">🤖 ${p.name}
        <span class="tokens">${"♥".repeat(p.tokens)}${"♡".repeat(tokenGoal-p.tokens)}</span>
        ${p.out?`<span class="tag dead">脱落</span>`:""}
        ${p.prot&&!p.out?`<span class="tag prot">守護</span>`:""}
        <span style="margin-left:auto;font-size:.62rem;opacity:.6">手札${p.out?0:p.hand.length}枚</span>
      </div>
      ${intel}
      <div class="discards"><span class="dlabel">捨札</span>${discHTML(p)||"<span style='opacity:.4;font-size:.6rem'>なし</span>"}</div>
    </div>`;
  }).join("");
  $("deckn").textContent=deck.length;
  $("burninfo").innerHTML=`伏せ札1枚${faceup.length?`<br>公開除外：${faceup.map(v=>CARDS[v].n).join("・")}`:""}`;
  const me=players[0];
  $("myline").innerHTML=`🧑 あなた
    <span class="tokens">${"♥".repeat(me.tokens)}${"♡".repeat(tokenGoal-me.tokens)}</span>
    ${me.out?`<span class="tag dead">脱落</span>`:""}
    ${me.prot&&!me.out?`<span class="tag prot">守護</span>`:""}`;
  $("mydisc").innerHTML=`<span class="dlabel">捨札</span>`+(discHTML(me)||"<span style='opacity:.4;font-size:.6rem'>なし</span>");
  renderHand(false);
  bindCardInfo();
}
/* 捨て札をタップすると、そのカードの効果を表示 */
function bindCardInfo(){
  document.querySelectorAll(".dchip[data-card]").forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      const v=+el.dataset.card;
      showSheet({title:`${v} ${CARDS[v].n}`, peek:v, center:true,
        body:`<div style="opacity:.75;font-size:.72rem">捨て札は全員分ずっと見えています。残り枚数を数えると兵士の推理精度が上がります。</div>`,
        btns:[["閉じる",null,true]]});
    };
  });
}
function renderHand(playable){
  const me=players[0];
  if(me.out){ $("hand").innerHTML=`<div style="opacity:.5;font-size:.8rem;padding:20px">このラウンドは脱落しました</div>`; return; }
  const mustCountess = me.hand.includes(7)&&(me.hand.includes(5)||me.hand.includes(6));
  $("hand").innerHTML=me.hand.map((v,i)=>{
    const locked = playable && mustCountess && v!==7;
    return `<div class="bigcard ${playable&&!locked?"":"dim"} ${locked?"locked":""}" data-i="${i}">
      <span class="v">${v}</span><span class="nm">${CARDS[v].n}</span>
      <span class="ds">${CARDS[v].ds}</span></div>`;
  }).join("");
  if(playable){
    $("hand").querySelectorAll(".bigcard:not(.locked):not(.dim)").forEach(el=>{
      el.onclick=()=>{ if(busy) return; humanPick(+el.dataset.i); };
    });
  }
}

/* ================= sheet ================= */
function showSheet({title,body,btns,peek,center}){
  $("stitle").textContent=title;
  $("speek").innerHTML=peek!=null?`<div class="peek"><span class="v">${peek}</span> <span class="nm">${CARDS[peek].n}</span><div class="ds">${CARDS[peek].ds}</div></div>`:"";
  $("sbody").innerHTML=body||"";
  $("sbody").className="body"+(center?" center":"");
  $("sbtns").innerHTML="";
  for(const [label,fn,ghost] of btns){
    const b=document.createElement("button");
    b.className="act"+(ghost?" ghost":""); b.textContent=label;
    b.onclick=()=>{closeSheet(); fn&&fn();};
    $("sbtns").appendChild(b);
  }
  $("veil").classList.add("show");
}
function closeSheet(){$("veil").classList.remove("show");}

/* ================= knowledge helpers ================= */
function forgetAbout(j){ for(let a=0;a<players.length;a++) know[a][j]=null; }
function onPlayed(j,v){ // jがvを場に出した→vだと知っていた人の情報整理
  for(let a=0;a<players.length;a++) if(know[a][j]===v) know[a][j]=null;
}
function swapKnowledge(a,b){
  for(let c=0;c<players.length;c++){
    if(c===a||c===b) continue;
    [know[c][a],know[c][b]]=[know[c][b],know[c][a]];
  }
}

/* ================= turn loop ================= */
const aliveIdx=()=>players.map((p,i)=>p.out?null:i).filter(i=>i!=null);
function validTargets(pi,card){
  const t=aliveIdx().filter(i=>i!==pi&&!players[i].prot);
  if(card===5) return t.length?[...t,pi]:[pi];   // 王子は自分も可・全員守護なら自分のみ
  return t;
}

async function runTurn(){
  if(over) return;
  const pi=turnIdx, p=players[pi];
  p.prot=false;                          // 守護は自分の番が来たら切れる
  p.hand.push(deck.pop());
  renderAll();
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(2400);
    const mv=cpuChoose(pi);
    await resolvePlay(pi,mv);
  }else{
    busy=false;
    msg(`あなたの番です。出すカードを選んでください`);
    renderHand(true);
    return;                              // 以降はUIハンドラから再開
  }
  await afterPlay();
}
async function afterPlay(){
  renderAll();
  const alive=aliveIdx();
  if(alive.length<=1){ endRound(alive[0]); return; }
  if(deck.length===0){ showdown(); return; }
  do{ turnIdx=(turnIdx+1)%players.length; }while(players[turnIdx].out);
  await sleep(700);
  runTurn();
}

/* ---- human interaction ---- */
function humanPick(i){
  const me=players[0], v=me.hand[i];
  showSheet({title:`${v} ${CARDS[v].n}`, peek:v, center:true,
    body:`このカードを出しますか？`,
    btns:[["このカードを出す",()=>humanPlayFlow(i)],["やめる",()=>renderHand(true),true]]});
}
function humanPlayFlow(i){
  const me=players[0], v=me.hand[i];
  if(v===8){
    showSheet({title:"姫を捨てますか？",center:true,body:"姫を捨てると即脱落です。本当に？",btns:[
      ["捨てる（脱落）",()=>humanPlay(i,null,null)],
      ["やめる",()=>renderHand(true),true],
    ]});
    return;
  }
  if([1,2,3,5,6].includes(v)){
    const ts=validTargets(0,v);
    if(!ts.length){
      showSheet({title:CARDS[v].n,center:true,body:"対象にできる相手がいません（全員守護中/脱落）。<br>効果なしで捨てます。",btns:[
        ["効果なしで捨てる",()=>humanPlay(i,null,null)],
        ["やめる",()=>renderHand(true),true],
      ]});
      return;
    }
    const btns=ts.map(t=>[t===0?"自分":players[t].name.replace("CPU・",""),
      ()=>{ if(v===1) humanGuess(i,t); else humanPlay(i,t,null); }]);
    btns.push(["やめる",()=>renderHand(true),true]);
    showSheet({title:`${CARDS[v].n}：対象を選択`,center:true,body:CARDS[v].ds,btns});
    return;
  }
  humanPlay(i,null,null);  // 侍女・伯爵夫人
}
function humanGuess(i,t){
  const btns=[2,3,4,5,6,7,8].map(g=>[`${g} ${CARDS[g].n}`,()=>humanPlay(i,t,g)]);
  btns.push(["やめる",()=>renderHand(true),true]);
  showSheet({title:`兵士：${players[t].name.replace("CPU・","")}の手札を推理`,center:true,
    body:"相手が持っていそうなカードは？（兵士は指定不可）",btns});
}
async function humanPlay(i,target,guess){
  if(busy) return;
  busy=true;
  renderHand(false);
  const me=players[0], v=me.hand.splice(i,1)[0];
  await resolvePlay(0,{card:v,target,guess},true);
  await afterPlay();
}

/* ---- resolve ---- */
async function resolvePlay(pi,{card,target,guess},already=false){
  const p=players[pi];
  if(!already){ const i=p.hand.indexOf(card); p.hand.splice(i,1); }
  p.disc.push(card);
  onPlayed(pi,card);
  const pn=pi===0?`<span class="em">あなた</span>`:`🤖 ${p.name}`;
  const tn=target!=null?(target===0?`<span class="em">あなた</span>`:players[target].name.replace("CPU・","")):"";
  renderAll();

  if(card===1){ // 兵士
    if(target==null){ msg(`${pn} は兵士を捨てた（対象なし）`); await sleep(900); }
    else{
      msg(`${pn} は兵士！ ${tn} の手札を「${CARDS[guess].n}」と推理…`);
      await sleep(1300);
      if(players[target].hand[0]===guess){
        msg(`的中！ ${tn} は脱落`);
        await eliminate(target);
      }else{
        msg(`${pn} の推理「${CARDS[guess].n}」…はずれ`);
      }
      await sleep(900);
    }
  }
  else if(card===2){ // 僧侶
    if(target==null){ msg(`${pn} は僧侶を捨てた（対象なし）`); await sleep(900); }
    else{
      know[pi][target]=players[target].hand[0];
      if(pi===0){
        await new Promise(res=>showSheet({title:`${tn.replace(/<[^>]+>/g,"")}の手札`,peek:players[target].hand[0],center:true,
          body:"この情報は相手の欄に表示され続けます（手札が変わるまで）",btns:[["OK",res]]}));
      }
      msg(`${pn} は僧侶で ${tn} の手札を見た`);
      await sleep(900);
    }
  }
  else if(card===3){ // 男爵
    if(target==null){ msg(`${pn} は男爵を捨てた（対象なし）`); await sleep(900); }
    else{
      const a=p.hand[0], b=players[target].hand[0];
      know[pi][target]=b; know[target][pi]=a;
      msg(`${pn} は男爵！ ${tn} と手札を比べる…`);
      await sleep(1300);
      if(pi===0||target===0){
        await new Promise(res=>showSheet({title:"男爵の対決",center:true,
          body:`あなた：${CARDS[pi===0?a:b].n}（${pi===0?a:b}） ／ 相手：${CARDS[pi===0?b:a].n}（${pi===0?b:a}）`,
          btns:[["OK",res]]}));
      }
      if(a>b){ msg(`${tn} の負け（${b} < ${a}）。脱落`); await eliminate(target); }
      else if(b>a){ msg(`${pn} の負け（${a} < ${b}）。脱落`); await eliminate(pi); }
      else{ msg(`引き分け。何も起こらない`); }
      await sleep(900);
    }
  }
  else if(card===4){ p.prot=true; msg(`${pn} は侍女で身を守った`); await sleep(900); }
  else if(card===5){ // 王子
    const t=players[target];
    const dumped=t.hand.pop();
    t.disc.push(dumped);
    forgetAbout(target);
    msg(`${pn} は王子！ ${tn} は手札「${CARDS[dumped].n}」を捨てた`);
    await sleep(1100);
    if(dumped===8){ msg(`捨てたのは姫！ ${tn} は脱落`); await eliminate(target,true); }
    else{
      t.hand.push(deck.length?deck.pop():burn);   // 山切れは伏せ札を引く
    }
    await sleep(700);
  }
  else if(card===6){ // 王
    if(target==null){ msg(`${pn} は王を捨てた（対象なし）`); await sleep(900); }
    else{
      const t=players[target];
      const mine=p.hand[0], theirs=t.hand[0];
      p.hand[0]=theirs; t.hand[0]=mine;
      swapKnowledge(pi,target);
      know[pi][target]=mine; know[target][pi]=theirs;
      if(pi===0||target===0){
        const got=pi===0?theirs:mine;
        await new Promise(res=>showSheet({title:"王：手札交換",peek:got,center:true,
          body:"交換で受け取ったカード",btns:[["OK",res]]}));
      }
      msg(`${pn} は王で ${tn} と手札を交換した`);
      await sleep(900);
    }
  }
  else if(card===7){ msg(`${pn} は伯爵夫人を捨てた…`); await sleep(900); }
  else if(card===8){ msg(`${pn} は姫を捨てた！ 脱落`); await eliminate(pi,true); await sleep(700); }
}
async function eliminate(pi,alreadyDiscarded=false){
  const p=players[pi];
  p.out=true;
  if(!alreadyDiscarded && p.hand.length){ p.disc.push(...p.hand); }
  p.hand=[];
  forgetAbout(pi);
  renderAll();
  await sleep(600);
  // あなたが脱落し、まだ2人以上残っているなら「結果まで飛ばす」を提案
  if(pi===0 && !fastFwd){
    const rest=players.filter(x=>!x.out);
    if(rest.length>=2){
      await new Promise(res=>{
        showSheet({title:"脱落…",center:true,
          body:`このラウンドは脱落です。<br>残りはCPU同士の勝負になります。`,
          btns:[["結果まで飛ばす",()=>{ fastFwd=true; res(); }],
                ["最後まで見る",()=>res()]]});
      });
    }
  }
}

/* ================= CPU ================= */
function unseenCounts(pi){
  const c={}; for(const v in CARDS) c[v]=CARDS[v].count;
  for(const v of faceup) c[v]--;
  for(const pl of players) for(const v of pl.disc) c[v]--;
  for(const v of players[pi].hand) c[v]--;
  return c;
}
function bestGuess(pi,t){
  if(know[pi][t]!=null && know[pi][t]!==1) return know[pi][t];    // 見た情報で確定
  const c=unseenCounts(pi);
  let best=2,bn=-1;
  for(let v=2;v<=8;v++) if(c[v]>bn){bn=c[v];best=v;}
  return best;
}
function cpuChoose(pi){
  const p=players[pi], [a,b]=p.hand;
  const hard=diffLevel==="hard", easy=diffLevel==="easy";
  // 伯爵夫人の強制
  if(p.hand.includes(7)&&(p.hand.includes(5)||p.hand.includes(6)))
    return {card:7,target:null,guess:null};
  // やさしい：姫以外からランダム
  if(easy){
    const opts=p.hand.filter(v=>v!==8);
    const card=opts.length?opts[Math.floor(Math.random()*opts.length)]:p.hand[0];
    const ts=validTargets(pi,card);
    const target=[1,2,3,5,6].includes(card)&&ts.length?ts[Math.floor(Math.random()*ts.length)]:null;
    const guess=card===1&&target!=null?2+Math.floor(Math.random()*7):null;
    return {card,target,guess:guess===1?2:guess};
  }
  // 候補を採点
  const moves=[];
  for(const card of new Set(p.hand)){
    if(card===8) continue;                       // 姫は出さない
    const other=p.hand[0]===card?p.hand[1]:p.hand[0];
    const ts=validTargets(pi,card);
    if([1,2,3,6].includes(card)&&!ts.length){ moves.push({card,target:null,guess:null,score:1}); continue; }
    if(card===1){
      // 確定情報があれば必殺
      const kt=ts.find(t=>know[pi][t]!=null&&know[pi][t]!==1);
      if(kt!=null){ moves.push({card,target:kt,guess:know[pi][kt],score:100}); continue; }
      const t=ts[Math.floor(Math.random()*ts.length)];
      const g=bestGuess(pi,t);
      const c=unseenCounts(pi), tot=Object.values(c).reduce((x,y)=>x+y,0)-c[1];
      const hit=tot>0?c[g]/tot:0;
      moves.push({card,target:t,guess:g,score:20+(hard?hit*60:20)});
    }
    else if(card===2){
      const t=ts.find(t=>know[pi][t]==null)??ts[0];
      moves.push({card,target:t,guess:null,score:30});
    }
    else if(card===3){
      let best=null,bs=-1;
      for(const t of ts){
        let winP;
        if(know[pi][t]!=null) winP=other>know[pi][t]?1:(other===know[pi][t]?0.5:0);
        else{
          const c=unseenCounts(pi); let lower=0,tot=0;
          for(let v=1;v<=8;v++){ tot+=c[v]; if(v<other) lower+=c[v]; }
          winP=tot?lower/tot:0;
        }
        if(winP>bs){bs=winP;best=t;}
      }
      moves.push({card,target:best,guess:null,score:bs>=(hard?0.75:0.6)?70*bs:5});
    }
    else if(card===4){ moves.push({card,target:null,guess:null,score:other===8?90:45}); }
    else if(card===5){
      const kt=ts.filter(t=>t!==pi).find(t=>know[pi][t]===8);   // 姫持ちを狙い撃ち
      if(kt!=null){ moves.push({card,target:kt,guess:null,score:100}); }
      else{
        const t=ts.filter(t=>t!==pi)[0];
        moves.push({card,target:t??pi,guess:null,score:t!=null?(hard?28:35):8});
      }
    }
    else if(card===6){
      const t=ts[0];
      moves.push({card,target:t,guess:null,score:other<=3?40:10});  // 弱い手札を押し付ける
    }
    else if(card===7){ moves.push({card,target:null,guess:null,score:other>=5?50:25}); }
  }
  if(!moves.length) return {card:p.hand[0],target:null,guess:null}; // 姫2枚は起こらないが保険
  moves.sort((x,y)=>y.score-x.score+ (Math.random()-.5)*(hard?2:14));
  return moves[0];
}

/* ================= round end ================= */
async function showdown(){
  const alive=aliveIdx();
  const lines=alive.map(i=>`${players[i].name}：${CARDS[players[i].hand[0]].n}（${players[i].hand[0]}）`);
  let win=alive[0];
  for(const i of alive){
    const hv=players[i].hand[0], wv=players[win].hand[0];
    if(hv>wv) win=i;
    else if(hv===wv){
      const s=p=>p.disc.reduce((x,y)=>x+y,0);
      if(s(players[i])>s(players[win])) win=i;
    }
  }
  await new Promise(res=>showSheet({title:"山札切れ — 手札公開",center:true,
    body:lines.join("<br>"),btns:[["結果へ",res]]}));
  endRound(win);
}
function endRound(winIdx){
  const w=players[winIdx];
  w.tokens++;
  renderAll();
  if(w.tokens>=tokenGoal){
    over=true;
    saveRecord({t:Date.now(), n:players.length, diff:diffLevel,
      win:winIdx===0, tokens:players.map(p=>p.tokens), rank:[...players].sort((a,b)=>b.tokens-a.tokens).indexOf(players[0])+1});
    showSheet({title: winIdx===0?"💌 あなたの勝ち！":`${w.name} の勝ち！`, center:true,
      body:players.map(p=>`${p===players[0]?"<b>":""}${p.name}：♥${p.tokens}${p===players[0]?"</b>":""}`).join("<br>"),
      btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,true]]});
    return;
  }
  showSheet({title:`ラウンド${roundNo}：${winIdx===0?"あなた":w.name} の勝ち`, center:true,
    body:players.map(p=>`${p===players[0]?"<b>":""}${p.name}：♥${p.tokens}${p===players[0]?"</b>":""}`).join("<br>")
      +`<br><br>次のラウンドは勝者から`,
    btns:[["次のラウンドへ",()=>newRound(winIdx)]]});
}

/* ================= history view ================= */
/* カード内訳：16枚の構成と、まだ見えていない枚数 */
$("compBtn").onclick=()=>{
  if($("veil").classList.contains("show")) return;
  const seenCnt={};
  for(const v of faceup) seenCnt[v]=(seenCnt[v]||0)+1;
  for(const p of players) for(const v of p.disc) seenCnt[v]=(seenCnt[v]||0)+1;
  const me=players[0];
  for(const v of me.hand) seenCnt[v]=(seenCnt[v]||0)+1;
  const rows=[8,7,6,5,4,3,2,1].map(v=>{
    const total=CARDS[v].count, gone=seenCnt[v]||0, left=total-gone;
    const bar="●".repeat(left)+"○".repeat(gone);
    return `<div style="display:flex;gap:6px;align-items:baseline">
      <b style="min-width:5.5em">${v} ${CARDS[v].n}</b>
      <span style="min-width:3em;opacity:.7">${total}枚</span>
      <span style="color:var(--gold);letter-spacing:1px">${bar}</span>
      <span style="opacity:.7;font-size:.7rem">残${left}</span></div>`;
  }).join("");
  showSheet({title:"カード内訳（全16枚）",
    body:`<div style="font-size:.72rem;opacity:.75;margin-bottom:8px">
      ●＝まだ見えていない ／ ○＝捨て札・公開除外・自分の手札で確認済み<br>
      毎ラウンド1枚が伏せて除外されるので、残りが全部場に出るとは限りません。</div>${rows}`,
    btns:[["閉じる",closeSheet,true]]});
};
$("histBtn").onclick=async()=>{
  if($("veil").classList.contains("show")) return;
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",center:true,
      body:`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,true]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":num(r.rank)+"位"}`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br><span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[
      ["閉じる",closeSheet,true],
      ["履歴を全消去",()=>confirmClear(),true],
    ]});
};

chooseSetup();

const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage; // バンドル内iframeから親のストレージを借りる

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY, false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}

  shuffle(players);                                  // 席順もシャッフル
  for(const p of players){ p.hand=[]; p.played=[]; p.tak=false; }
  // デッキ構築
  let deckTypes;
  if(n===8) deckTypes=[...FULL];
  else{
    const fixed=[...FIXED[n]];
    const pool=[...FULL];
    for(const c of fixed){ pool.splice(pool.indexOf(c),1); }
    deckTypes=fixed.concat(shuffle(pool).slice(0, n*4-fixed.length));
  }
  shuffle(deckTypes);
  players.forEach((p,i)=>p.hand=deckTypes.slice(i*4,i*4+4));
  cands=players.map((p,i)=>p.hand.includes("hannin")?new Set([i]):null);
  intelLog=[]; over=false; turnsTaken=0;
  // 第一発見者から開始（自動で場に出す）
  turnIdx=players.findIndex(p=>p.hand.includes("hakken"));
  const fp=players[turnIdx];
  fp.hand.splice(fp.hand.indexOf("hakken"),1);
  fp.played.push("hakken"); turnsTaken++;
  if(!fp.cpu) addIntel("あなたが第一発見者。事件発生！");
  msg(`<span class="em">${fp.name}</span> が事件を発見！「大変だ、事件だ！」`);
  renderAll();
  setTimeout(()=>advance(), 1400);
}

/* ================= knowledge ================= */
function addIntel(s){
  intelLog.push(s);
  if(intelLog.length>6) intelLog.shift();
}
// 秘密の受け渡し from→to が起きた（犯人カードかどうかは当事者のみ知る）
function onSecretTransfer(from,to,movedType){
  if(players[from]==null || players[to]==null) return;
  // 観測者：候補にfromが入っていたらtoも候補に
  for(let i=0;i<N();i++){
    if(i===from||i===to) continue;
    if(cands[i] && cands[i].has(from)) cands[i].add(to);
  }
  if(movedType==="hannin"){
    cands[from]=new Set([to]);     // 渡した本人は行き先を知っている
    cands[to]=new Set([to]);       // 受け取った本人は自分と知る
    if(to===humanIdx()) addIntel("⚠ 犯人カードがあなたの手札に来た！");
    if(from===humanIdx()) addIntel(`犯人カードは ${players[to].name} へ渡った`);
  }else{
    // 犯人カードは動いていない：自分が持っていれば自分、なければ従来の候補のまま
    if(players[from].hand.includes("hannin")) cands[from]=new Set([from]);
    if(players[to].hand.includes("hannin")) cands[to]=new Set([to]);
  }
}
const humanIdx=()=>players.findIndex(p=>!p.cpu);

/* ================= render ================= */
function msg(h){$("msg").innerHTML=h;}
function chipHTML(t){return `<span class="pchip ${t}" data-card="${t}">${T[t].n}</span>`;}
function renderSeats(){
  const n=N(), RAD=76, C=93;
  let html=`<div class="ring"></div><div class="arrow"><b>↻</b>手番は<br>この向き<br><span style="font-size:.52rem">（左隣へ）</span></div>`;
  for(let i=0;i<n;i++){
    // 自分を下（真下）に置き、手番の進む向き（＝左隣）が反時計回りになるよう配置
    const off=(i-humanIdx()+n)%n;
    const ang=Math.PI/2 + off*(2*Math.PI/n);      // 下から反時計回り
    const x=C+RAD*Math.cos(ang), y=C+RAD*Math.sin(ang);
    const p=players[i];
    const rel = i===humanIdx() ? ""
      : (i===L(humanIdx()) ? "左隣（次）" : (i===R(humanIdx()) ? "右隣（前）" : ""));
    html+=`<div class="seat${i===humanIdx()?" me":""}${i===turnIdx&&!over?" now":""}"
      style="left:${x}px; top:${y-20}px">
      <div class="dot">${p.cpu?"🤖":"🧑"}</div>
      <div class="nm">${p.name.replace("CPU・","")}</div>
      <div class="rel">${rel}</div></div>`;
  }
  $("seats").innerHTML=html;
}
function renderAll(){
  renderSeats();
  $("topinfo").textContent=`${N()}人対戦 ・ CPU:${DIFF_LABEL[diffLevel]} ・ 手番${turnsTaken}${turnsTaken<N()?"（一巡目：探偵は使用不可）":""}`;
  $("opps").innerHTML=players.map((p,i)=>{
    if(!p.cpu) return "";
    return `<div class="opp${turnIdx===i&&!over?" active":""}">
      <div class="line1">🤖 ${p.name}
        ${p.tak?`<span class="tag tak">たくらみ済</span>`:""}
        <span class="backs">${`<span class="cb"></span>`.repeat(p.hand.length)}</span>
      </div>
      <div class="played"><span class="plabel">出した:</span>${p.played.map(chipHTML).join("")||"<span class='plabel'>なし</span>"}</div>
    </div>`;
  }).join("");
  const me=players[humanIdx()];
  $("myline").innerHTML=`🧑 あなた（席順${humanIdx()+1}番）${me.tak?`<span class="tag tak">たくらみ済</span>`:""}`;
  $("myplayed").innerHTML=`<span class="plabel">出した:</span>`+(me.played.map(chipHTML).join("")||"<span class='plabel'>なし</span>");

/* 場に出たカードをタップすると効果を表示（いつでも見られる） */
function bindCardInfo(){

}
function renderHand(playable){
  const me=players[humanIdx()];
  $("hand").innerHTML=me.hand.map((t,i)=>{

    const locked = playable && ((isHannin&&me.hand.length>1) || (t==="tantei"&&turnsTaken<N()&&hasOtherPlayable(me)));

function hasOtherPlayable(p){

/* ================= sheet ================= */
function showSheet({title,body,btns}){

/* ================= turn flow ================= */
let passStreak=0;
async function advance(){
  if(over) return;
  if(passStreak>N()+1){                          // 全員が続けてパス＝進行不能
    const h=holderOf();
    msg(`誰もカードを出せません。犯人は見つからず…`);
    await sleep(1200);
    finish("escape", h>=0?h:0);
    return;
  }
  if(players.every(x=>x.hand.length===0)){      // 誰も出せない：犯人は見つからず逃走
    const h=holderOf();
    msg(`全員の手札がなくなりました。犯人は見つからず…`);
    await sleep(1200);
    finish("escape", h>=0?h:0);
    return;
  }
  turnIdx=L(turnIdx);
  const p=players[turnIdx];
  if(p.hand.length===0){
    passStreak++;
    msg(`${p.name} は手札なし。パス`);
    renderAll();
    await sleep(650);
    advance(); return;
  }
  passStreak=0;
  renderAll();
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(2400);
    const mv=cpuChoose(turnIdx);
    await playCard(turnIdx,mv);
    if(!over) advance();
  }else{
    busy=false;
    msg("あなたの番です。カードを1枚出してください");
    renderHand(true);
  }
}
function humanPick(i){
  const me=players[humanIdx()], t=me.hand[i];
  const mustCountess=false;
  showSheet({title:`${T[t].n}`,
    body:`<div style="text-align:left;line-height:1.9">${T[t].ds}</div>`,
    btns:[["このカードを出す",()=>humanPlay(i)],["やめる",()=>renderHand(true),"ghost"]]});
}
function humanPlay(i){
  const me=players[humanIdx()], t=me.hand[i], hi=humanIdx();
  const others=players.map((p,j)=>j).filter(j=>j!==hi&&players[j].hand.length>0);
  const nameBtn=(j,fn)=>[players[j].name,fn];
  if(t==="tantei"){
    if(turnsTaken<N()){ // 一巡目：他に出せる札がない場合のみ効果なしで出せる
      humanPlayResolved(i,{card:t,noEffect:true}); return;
    }
    showSheet({title:"探偵：犯人だと思う人は？",body:"指名した人が犯人カード所持＆アリバイ無しなら、あなたの勝ち",
      btns:[...others.map(j=>nameBtn(j,()=>humanPlayResolved(i,{card:t,target:j}))),["やめる",()=>renderHand(true),"ghost"]]});
    return;
  }
  if(t==="mokugeki"||t==="inu"){
    showSheet({title:`${T[t].n}：対象を選択`,body:T[t].ds,
      btns:[...others.map(j=>nameBtn(j,()=>humanPlayResolved(i,{card:t,target:j}))),["やめる",()=>renderHand(true),"ghost"]]});
    return;
  }
  if(t==="tori"){
    showSheet({title:"取り引き：相手を選択",body:"互いに1枚ずつ裏向きで交換します",
      btns:[...others.map(j=>nameBtn(j,()=>humanTradePick(i,j))),["やめる",()=>renderHand(true),"ghost"]]});
    return;
  }
  if(t==="hannin"){
    showSheet({title:"犯人カードを出す",body:"「犯人は私だ！」逃げ切り勝利です。",
      btns:[["出す（勝利）",()=>humanPlayResolved(i,{card:t}),"danger"],["やめる",()=>renderHand(true),"ghost"]]});
    return;
  }
  humanPlayResolved(i,{card:t});
}
function humanTradePick(cardIdx,target){
  const me=players[humanIdx()];
  const rest=me.hand.filter((_,k)=>k!==cardIdx);
  if(!rest.length){ humanPlayResolved(cardIdx,{card:"tori",target,give:null}); return; }
  showSheet({title:"取り引き：渡すカードを選択",body:`${players[target].name} に渡す1枚は？`,
    btns:[...rest.map(t2=>[T[t2].n,()=>{
      humanPlayResolved(cardIdx,{card:"tori",target,give:t2});
    }]),["やめる",()=>renderHand(true),"ghost"]]});
}
async function humanPlayResolved(i,mv){
  if(busy) return;
  busy=true;
  renderHand(false);
  const me=players[humanIdx()];
  me.hand.splice(i,1);
  await playCard(humanIdx(),mv,true);
  if(!over) advance();
}

/* ================= card resolution ================= */
async function playCard(pi,mv,removed=false){
  const p=players[pi], t=mv&&mv.card;
  if(!t) return;                                   // 不正な手（手札切れ等）は何もしない
  if(!removed){
    const i=p.hand.indexOf(t);
    if(i<0) return;                                // 手札にない札は出せない
    p.hand.splice(i,1);
  }
  p.played.push(t); turnsTaken++;
  if(t==="takurami") p.tak=true;
  const pn=pi===humanIdx()?`<span class="em">あなた</span>`:`🤖 ${p.name}`;
  renderAll();

  if(t==="hannin"){
    msg(`${pn}「犯人は…私だ！」<span class="bad">犯人の逃げ切り勝利！</span>`);
    await sleep(600);
    finish("escape", pi);
    return;
  }
  if(t==="tantei"){
    if(mv.noEffect||mv.target==null){
      msg(`${pn} は探偵を出した（効果なし）`);
      await sleep(1000); return;
    }
    const q=players[mv.target];
    const qn=mv.target===humanIdx()?"あなた":q.name;
    msg(`${pn} は探偵！「犯人は…${qn}、あなたですね？」`);
    await sleep(1600);
    if(q.hand.includes("hannin") && !q.hand.includes("alibi")){
      msg(`${qn}「…参りました」<span class="bad">犯人逮捕！</span>`);
      await sleep(600);
      finish("tantei", mv.target, pi);
    }else{
      msg(`${qn}「いいえ、私は犯人ではありません」`);
      // つよいCPU：外れた指名から容疑を薄める
      if(diffLevel==="hard"){
        for(let k=0;k<N();k++){
          if(cands[k]&&cands[k].size>1) cands[k].delete(mv.target);
        }
      }
      await sleep(1200);
    }
    return;
  }
  if(t==="mokugeki"){
    if(mv.target==null){ msg(`${pn} は目撃者を出した（対象なし）`); await sleep(900); return; }
    const q=players[mv.target];
    if(pi===humanIdx()){
      await new Promise(res=>showSheet({title:`目撃者：${q.name}の手札`,
        body:q.hand.map(x=>T[x].n).join("・")||"（手札なし）",btns:[["OK",res]]}));
      addIntel(`目撃者：${q.name}の手札＝${q.hand.map(x=>T[x].n).join("・")||"なし"}`);
    }else{
      cands[pi] = q.hand.includes("hannin") ? new Set([mv.target])
        : (cands[pi]&&cands[pi].has(mv.target)&&cands[pi].size>1 ? (cands[pi].delete(mv.target),cands[pi]) : cands[pi]);
    }
    msg(`${pn} は目撃者で ${mv.target===humanIdx()?"あなた":q.name} の手札を見た`);
    await sleep(1100);
    return;
  }
  if(t==="shonen"){
    const h=holderOf();
    if(pi===humanIdx()){
      const hn=h<0?"（もう誰も持っていない）":(h===humanIdx()?"あなた自身":players[h].name);
      await new Promise(res=>showSheet({title:"少年「ぼく、見ちゃったんだ」",
        body:`いま犯人カードを持っているのは…<b>${hn}</b>`,btns:[["OK",res]]}));
      if(h>=0) addIntel(`少年情報：犯人カードは ${h===humanIdx()?"あなた":players[h].name} が所持（当時）`);
    }else if(h>=0){
      cands[pi]=new Set([h]);
    }
    msg(`${pn} は少年を出した。犯人の居場所をこっそり知った…`);
    await sleep(1100);
    return;
  }
  if(t==="inu"){
    if(mv.target==null){ msg(`${pn} はいぬを出した（対象なし）`); await sleep(900); return; }
    const q=players[mv.target];
    const qn=mv.target===humanIdx()?"あなた":q.name;
    msg(`${pn} はいぬを放った！ ${qn} の手札をくんくん…`);
    await sleep(1400);
    if(!q.hand.length){ msg(`${qn} の手札は空だった`); await sleep(900); return; }
    const gi=Math.floor(Math.random()*q.hand.length);
    const got=q.hand.splice(gi,1)[0];
    if(got==="hannin"){
      msg(`いぬは<span class="bad">犯人カード</span>をくわえてきた！`);
      await sleep(600);
      finish("inu", mv.target, pi);
      return;
    }
    p.hand.push(got);
    onSecretTransfer(mv.target,pi,got);
    if(pi===humanIdx()) addIntel(`いぬ：${q.name}から「${T[got].n}」を獲得`);
    if(mv.target===humanIdx()) addIntel(`いぬに「${T[got].n}」を持っていかれた`);
    msg(`いぬは何かをくわえて ${pn} のもとへ戻った`);
    await sleep(1100);
    return;
  }
  if(t==="tori"){
    if(mv.target==null){ msg(`${pn} は取り引きを出した（対象なし）`); await sleep(900); return; }
    const q=players[mv.target];
    const qn=mv.target===humanIdx()?"あなた":q.name;
    // 双方が渡すカードを決める
    let give=mv.give;
    if(give==null || p.hand.indexOf(give)<0) give=cpuTradeGive(pi);   // 手札にない札は渡せない
    if(give!=null && p.hand.indexOf(give)<0) give=null;
    let back=null;
    if(q.hand.length){
      if(mv.target===humanIdx()){
        back=await humanChooseGive(`取り引き：${p.name} に渡すカードを選択`);
      }else{
        back=cpuTradeGive(mv.target);
      }
      if(back!=null && q.hand.indexOf(back)<0) back=null;
    }
    if(give!=null&&back!=null){
      p.hand.splice(p.hand.indexOf(give),1); q.hand.push(give);
      q.hand.splice(q.hand.indexOf(back),1); p.hand.push(back);
      onSecretTransfer(pi,mv.target,give);
      onSecretTransfer(mv.target,pi,back);
      if(pi===humanIdx()) addIntel(`取り引き：「${T[back].n}」を受け取った`);
      if(mv.target===humanIdx()) addIntel(`取り引き：「${T[give].n}」を受け取った`);
    }
    msg(`${pn} は ${qn} と取り引きした`);
    await sleep(1100);
    return;
  }
  if(t==="joho"){
    msg(`${pn} は情報操作！ 全員、1枚を左隣へ…`);
    await sleep(900);
    // 全員同時に選ぶ（スナップショット）
    const picks=[];
    for(let j=0;j<N();j++){
      if(!players[j].hand.length){ picks[j]=null; continue; }
      if(j===humanIdx()){ picks[j]=await humanChooseGive("情報操作：左隣へ渡すカードを選択"); }
      else picks[j]=cpuPassLeft(j);
    }
    for(let j=0;j<N();j++){
      if(picks[j]==null) continue;
      players[j].hand.splice(players[j].hand.indexOf(picks[j]),1);
    }
    for(let j=0;j<N();j++){
      if(picks[j]==null) continue;
      players[L(j)].hand.push(picks[j]);
      onSecretTransfer(j,L(j),picks[j]);
    }
    const got=picks[R(humanIdx())];
    if(got!=null) addIntel(`情報操作：${players[R(humanIdx())].name}から「${T[got].n}」が来た`);
    msg(`カードが一斉に左へ流れた…`);
    await sleep(1100);
    return;
  }
  if(t==="uwasa"){
    msg(`${pn} はうわさ！ 全員、右隣からランダムに1枚…`);
    await sleep(900);
    // スナップショットで同時解決：jはR(j)から1枚引く
    const picks=[];
    for(let j=0;j<N();j++){
      const src=players[R(j)];
      picks[j]=src.hand.length?src.hand[Math.floor(Math.random()*src.hand.length)]:null;
    }
    for(let j=0;j<N();j++){
      if(picks[j]==null) continue;
      const src=players[R(j)];
      src.hand.splice(src.hand.indexOf(picks[j]),1);
    }
    for(let j=0;j<N();j++){
      if(picks[j]==null) continue;
      players[j].hand.push(picks[j]);
      onSecretTransfer(R(j),j,picks[j]);
    }
    const got=picks[humanIdx()];
    if(got!=null) addIntel(`うわさ：${players[R(humanIdx())].name}から「${T[got].n}」を引いた`);
    const taken=picks[L(humanIdx())];
    if(taken!=null) addIntel(`うわさ：${players[L(humanIdx())].name}に「${T[taken].n}」を引かれた`);
    msg(`カードがざわざわと巡った…`);
    await sleep(1100);
    return;
  }
  if(t==="alibi"){ msg(`${pn} はアリバイを場に出した（効果なし）`); await sleep(1000); return; }
  if(t==="takurami"){ msg(`${pn} はたくらみ！ 以後、犯人と一蓮托生…`); await sleep(1100); return; }
  msg(`${pn} は一般人を出した。特に何も起こらない`);
  await sleep(1000);
}
function humanChooseGive(title){
  return new Promise(res=>{
    const me=players[humanIdx()];
    showSheet({title,body:"裏向きで渡します（相手には見えません）",
      btns:me.hand.map(t=>[T[t].n,()=>res(t)])});
  });
}

/* ================= CPU ================= */
function cpuChoose(pi){
  const p=players[pi], hand=p.hand;
  if(!hand.length) return {card:null};
  const easy=diffLevel==="easy", hard=diffLevel==="hard";
  const others=players.map((_,j)=>j).filter(j=>j!==pi&&players[j].hand.length>0);
  const iAmHolder=hand.includes("hannin");
  // 犯人カードのみ→出して勝利
  if(hand.length===1&&hand[0]==="hannin") return {card:"hannin"};
  const playable=hand.filter(t=>t!=="hannin");
  const rnd=a=>a[Math.floor(Math.random()*a.length)];
  // 対象にできる相手が誰もいない場合
  if(!others.length){
    const nt=playable.filter(t=>!["tantei","mokugeki","inu","tori"].includes(t));
    if(nt.length) return {card:rnd(nt)};
    if(playable.includes("tantei")) return {card:"tantei",noEffect:true};
    return {card:rnd(playable)};   // 対象カードは効果なしで処理される
  }

  if(easy){
    let card=rnd(playable);
    if(card==="tantei"&&turnsTaken<N()&&hasOtherPlayable(p)) card=rnd(playable.filter(t=>t!=="tantei"));
    const mv={card};
    if(["tantei","mokugeki","inu","tori"].includes(card)) mv.target=rnd(others);
    if(card==="tantei"&&turnsTaken<N()) mv.noEffect=true;
    if(card==="tori") mv.give=cpuTradeGive(pi,true);
    return mv;
  }

  const known = cands[pi]&&cands[pi].size===1 ? [...cands[pi]][0] : null;
  // 1) 確定情報があれば探偵（自分以外・一巡後）
  if(hand.includes("tantei")&&turnsTaken>=N()&&known!=null&&known!==pi&&players[known].hand.length>0){
    if(!hard||Math.random()<0.9) return {card:"tantei",target:known};
  }
  // 2) いぬ：確定していて相手の手札が少ないなら高確率で当たる
  if(hand.includes("inu")&&known!=null&&known!==pi&&players[known].hand.length>0){
    const hitP=1/players[known].hand.length;
    if(hitP>=(hard?0.4:0.34)) return {card:"inu",target:known};
  }
  // 3) 犯人所持者：手放すか、抱えて逃げ切るか
  if(iAmHolder){
    if(hand.includes("alibi")){
      // アリバイ持ち：抱えて逃げ切り狙い。安全な札から消化
      const safe=playable.filter(t=>!["alibi","tantei"].includes(t));
      if(safe.length) return targetize(pi,{card:rnd(safe)},others);
      if(hand.includes("tantei")) return {card:"tantei",target:rnd(others),noEffect:turnsTaken<N()};
      return {card:"alibi"};   // 最後はアリバイを切るしかない
    }
    // アリバイ無し：取り引き/情報操作で犯人カードを流したい
    if(hand.includes("tori")) return {card:"tori",target:rnd(others),give:"hannin"};
    if(hand.includes("joho")) return {card:"joho"};
    if(hand.includes("takurami")&&Math.random()<0.5) return {card:"takurami"};
  }
  // 4) 情報収集
  if(known==null){
    if(hand.includes("shonen")) return {card:"shonen"};
    if(hand.includes("mokugeki")){
      const t=hard&&cands[pi]&&cands[pi].size>1 ? [...cands[pi]].filter(j=>j!==pi&&players[j].hand.length)[0]??rnd(others) : rnd(others);
      return {card:"mokugeki",target:t};
    }
  }
  // 5) それ以外を適当に消化（アリバイは温存気味）
  let pool=playable.filter(t=>t!=="alibi"&&t!=="tantei");
  if(!pool.length) pool=playable.filter(t=>t!=="alibi");
  if(!pool.length) pool=playable;
  let card=rnd(pool);
  if(card==="tantei"&&turnsTaken<N()) return {card,noEffect:true};
  if(card==="tantei"){  // 当てずっぽう探偵は「つよい」では撃たない
    if(hard&&known==null&&pool.length>1) card=rnd(pool.filter(t=>t!=="tantei"));
  }
  return targetize(pi,{card},others);
}
function targetize(pi,mv,others){
  const rnd=a=>a[Math.floor(Math.random()*a.length)];
  if(["tantei","mokugeki","inu","tori"].includes(mv.card)&&mv.target==null) mv.target=rnd(others);
  // 取り引きで渡す札は playCard 側で決める（この時点ではまだ手札に取り引き自身が残っているため）
  return mv;
}
function cpuTradeGive(pi,easy=false){
  const p=players[pi];
  if(!p.hand.length) return null;
  if(!easy&&p.hand.includes("hannin")&&!p.hand.includes("alibi")) return "hannin"; // 押し付け
  const junk=p.hand.filter(t=>["ippan","uwasa","joho"].includes(t));
  if(!easy&&junk.length) return junk[0];
  const notKey=p.hand.filter(t=>!["hannin","alibi"].includes(t));
  return (notKey.length?notKey:[...p.hand])[Math.floor(Math.random()*(notKey.length||p.hand.length))];
}
function cpuPassLeft(pi){ return cpuTradeGive(pi,diffLevel==="easy"); }

/* ================= finish ================= */
function finish(how, culpritIdx, catcherIdx){
  over=true;
  const takIdx=players.map((p,i)=>p.tak?i:null).filter(i=>i!=null);
  let winners=[], title="", detail="";
  if(how==="escape"){
    winners=[culpritIdx,...takIdx.filter(i=>i!==culpritIdx)];
    title="犯人の逃げ切り！";
    detail=`犯人：${players[culpritIdx].name}`;
  }else{
    const catcherTak=players[catcherIdx].tak;
    if(catcherTak){
      winners=players.map((_,i)=>i).filter(i=>i!==culpritIdx&&!players[i].tak);
      title="犯人逮捕…でも捕まえたのは共犯者！";
      detail=`${players[catcherIdx].name} はたくらみ済のため道連れで負け（公式裁定）`;
    }else{
      winners=[catcherIdx];
      title=how==="tantei"?"名探偵、犯人を看破！":"いぬ、お手柄！";
      detail=`${players[catcherIdx].name} が ${players[culpritIdx].name} の犯行を暴いた`;
    }
  }
  const meWin=winners.includes(humanIdx());
  saveRecord({t:Date.now(), n:N(), diff:diffLevel, win:meWin, how,
    culprit:players[culpritIdx]?.name??"", me:players[humanIdx()].tak?"たくらみ":"一般"});
  renderAll();
  showSheet({title:(meWin?"🎉 ":"")+title,
    body:`${detail}<br><br>勝者：${winners.map(i=>players[i].name).join("・")||"なし"}<br>
      <b>あなたの${meWin?"勝ち！":"負け…"}</b>`,
    btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,"ghost"]]});
}

/* ================= history view ================= */
$("histBtn").onclick=async()=>{
  if($("veil").classList.contains("show")) return;
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",body:`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,"ghost"]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const HOWN={escape:"逃げ切り",tantei:"探偵",inu:"いぬ"};
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":"負け"}（${HOWN[r.how]||"?"}決着）`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br><span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[
      ["閉じる",closeSheet,"ghost"],
      ["履歴を全消去",()=>confirmClear(),"ghost"],
    ]});
};

chooseSetup();
<\/script>

<script>
(function(){
  var HTML=`<p class="hgoal"><b>目的</b>　犯人カードの持ち主を暴けば探偵側の勝ち。犯人が最後の1枚として犯人カードを出せたら犯人の勝ちです。</p><h3>まず知っておくこと</h3><p><b>犯人は固定されていません。</b>犯人カードは取り引き・うわさ・情報操作で人から人へ移ります。<br>いま持っている人が犯人。さっきまで犯人だった人が今は無関係、ということも普通に起こります。</p><h3>勝ち方は3つ</h3><p><b>① 探偵</b>で犯人カードの持ち主を指名して当てる<br><b>② いぬ</b>で相手の手札から犯人カードを引き当てる<br><b>③ 犯人カードを、手札が最後の1枚になったときに出す</b>（逃げ切り）</p><h3>重要：アリバイ</h3><p>犯人カードを持っていても、<b>アリバイを一緒に持っていれば探偵に指名されても「いいえ」と言えます</b>。<br>逆に、アリバイを持たない犯人は探偵に怯えることになります。</p><h3>主なカード</h3><p><b>探偵</b>：1人を指名（最初の一巡では使用不可） ／ <b>いぬ</b>：1人の手札からランダムに1枚<br><b>目撃者</b>：1人の手札を全部見る ／ <b>少年</b>：いま犯人カードを持つ人を自分だけが知る<br><b>取り引き</b>：1人と1枚ずつ裏向きで交換 ／ <b>うわさ</b>：全員が右隣からランダムに1枚<br><b>情報操作</b>：全員が1枚選んで左隣へ ／ <b>たくらみ</b>：以後、犯人と運命共同体<br><b>アリバイ</b>：持つ限り探偵を否認できる ／ <b>一般人</b>：何も起こらない</p><h3>たくらみの罠</h3><p>たくらみを出した人は犯人の味方です。<b>たくらみ済の人が探偵で犯人を当てても、道連れで負けます</b>。</p><h3>画面の見方</h3><p>上部の<b>円</b>が席順です。あなたは常に下、手番は<b>時計回り</b>に進みます。<br>「うわさ」は<b>右隣（前の手番の人）</b>から引き、「情報操作」は<b>左隣（次の手番の人）</b>へ渡します。<br>あなたが得た情報（見た手札、少年情報、受け取った札、犯人カードが自分に来た警告）は、手札の上のメモ欄に残ります。</p><h3>CPUについて</h3><p>つよいCPUは、犯人カードを渡した相手を記憶し、うわさや取り引きで動くたびに容疑者を広げ、探偵の空振りで絞り込みます。</p>`;
  var veil=document.getElementById("helpveil");

  veil.onclick=function(e){ if(e.target===veil) close(); };

})();
<\/script>

(function(){
  function apply(t){ document.documentElement.setAttribute("data-theme", t==="light"?"light":"dark"); }
  var t=null;
  try{ t = window.name && window.name.indexOf("theme:")===0 ? window.name.slice(6) : null; }catch(e){}
  if(!t){ try{ t = localStorage.getItem("bodoge-theme"); }catch(e){} }
  if(!t){ t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark"; }
  apply(t);
  window.addEventListener("message", function(ev){
    if(ev.data && ev.data.type==="theme") apply(ev.data.value);
  });
})();

<script>
"use strict";
/* ================= 履歴（3段構え保存） ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="jackal-history";
const FPATH="jackal/history";
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig); fdb=firebase.database();
  }
}catch(e){}
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage;
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）" : (STORE ? "アプリ内ストレージ" : "この端末のみ");
/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      // push形式（キー付きオブジェクト）と旧配列形式の両方を読む
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }          // 通信失敗など：空履歴として扱わない
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;                       // 読めなかったときは上書きしない
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY,false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}
/* 全消去の確認（Firebase有効時は共有データである旨を明示） */
function confirmClear(){
  const shared = !!fdb;
  showSheet({title:"履歴を全消去しますか？",
    body: shared
      ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
      : `この端末に保存された対戦履歴をすべて削除します。`,
    btns:[["削除する", async()=>{ await clearHistory(); msg("対戦履歴を消去しました"); }],
          ["やめる", null, "g"]]});
}


/* ================= カード ================= */
/* 36枚：1〜5各4枚 / 0・10が3枚 / -5・15が2枚 / -10・20が1枚 / 特殊4種1枚ずつ */
const SP={ X2:"x2", MAX0:"max0", NIGHT:"night", DRAW:"draw" };
const LABEL={ [SP.X2]:"×2", [SP.MAX0]:"MAX→0", [SP.NIGHT]:"夜0", [SP.DRAW]:"?" };
const SUB={ [SP.X2]:"合計2倍", [SP.MAX0]:"最大を0に", [SP.NIGHT]:"0・山札再構成", [SP.DRAW]:"1枚追加" };
function buildDeck(){
  const d=[];
  for(const v of [1,2,3,4,5]) for(let i=0;i<4;i++) d.push({t:"n",v});
  for(let i=0;i<3;i++) d.push({t:"n",v:0});
  for(let i=0;i<3;i++) d.push({t:"n",v:10});
  for(let i=0;i<2;i++) d.push({t:"n",v:-5});
  for(let i=0;i<2;i++) d.push({t:"n",v:15});
  d.push({t:"n",v:-10}); d.push({t:"n",v:20});
  d.push({t:"s",s:SP.X2}); d.push({t:"s",s:SP.MAX0});
  d.push({t:"s",s:SP.NIGHT}); d.push({t:"s",s:SP.DRAW});
  return d;
}
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
let fastFwd=false;
const sleep=ms=>new Promise(r=>setTimeout(r, fastFwd?0:ms));
const $=id=>document.getElementById(id);
const key=c=> c.t==="n" ? "n"+c.v : "s"+c.s;
const cardName=c=> c.t==="n" ? String(c.v) : LABEL[c.s];

/* 合計計算：?は引いたカードで置換 → 基本値合計 → MAX→0 → ×2 */
function total(cards){
  const base=cards.filter(c=>c.t==="n").map(c=>c.v);
  const hasMax0=cards.some(c=>c.t==="s"&&c.s===SP.MAX0);
  const hasX2 =cards.some(c=>c.t==="s"&&c.s===SP.X2);
  let vals=[...base];
  if(hasMax0 && vals.length){
    const mx=Math.max(...vals);
    if(mx>0) vals.splice(vals.indexOf(mx),1,0);
  }
  let sum=vals.reduce((a,b)=>a+b,0);
  if(hasX2) sum*=2;
  return sum;
}

/* ================= 状態 ================= */
const CPU_NAMES=["ワイリー","ナヴァホ","ソーニャ","ブラン","ミゲル"];
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};
let players, deck, discard, turnIdx, lastBid, lastBidder, diffLevel, over, roundNo, drawnExtra;
let myBid=1, busy=false;
const alive=()=>players.map((p,i)=>p.life>0?i:null).filter(i=>i!=null);
const N=()=>players.length;

function chooseSetup(){
  showSheet({title:"対戦人数を選択",body:"あなた + CPU で対戦します（人数が多いほど混沌とします）",
    btns:[3,4,5,6].map(n=>[`${n}人（CPU×${n-1}）`,()=>chooseDiff(n-1)])});
}
function chooseDiff(nCpu){
  showSheet({title:"CPUの強さを選択",
    body:"やさしい：ざっくり感覚で宣言<br>ふつう：見えているカードから期待値を計算<br>つよい：捨て札を数え、自分のカードの確率分布まで推定する",
    btns:[["やさしい",()=>newGame(nCpu,"easy")],["ふつう",()=>newGame(nCpu,"normal")],["つよい",()=>newGame(nCpu,"hard")]]});
}
function newGame(nCpu,diff){
  diffLevel=diff;
  players=[{name:"あなた",cpu:false,life:3,card:null,say:""}];
  for(let i=0;i<nCpu;i++) players.push({name:CPU_NAMES[i],cpu:true,life:3,card:null,say:""});
  deck=shuffle(buildDeck()); discard=[];
  roundNo=0; over=false;
  newRound(Math.floor(Math.random()*N()));
}
function newRound(starter){
  roundNo++;
  if(deck.length < alive().length+2){          // 山札不足なら捨て札を戻す
    deck=shuffle(deck.concat(discard)); discard=[];
  }
  for(const p of players){ p.card=null; p.say=""; }
  for(const i of alive()) players[i].card=deck.pop();
  lastBid=0; lastBidder=null; drawnExtra=null;
  turnIdx=players[starter].life>0 ? starter : alive()[0];
  myBid=1;
  render();
  msg(`ラウンド${roundNo}開始。先手は <span class="em">${players[turnIdx].name}</span>`);
  setTimeout(step, 1200);
}

/* ================= 描画 ================= */
function msg(h){ $("msg").innerHTML=h; }
function cardHTML(c){
  if(!c) return "";
  if(c.t==="s") return `<div class="fcard sp"><span class="v">${LABEL[c.s]}</span><span class="lb">${SUB[c.s]}</span></div>`;
  const cls = c.v<0 ? "neg" : (c.v===0 ? "zero" : "");
  return `<div class="fcard ${cls}"><span class="v">${c.v}</span><span class="lb">ジャッカル</span></div>`;
}
function render(){
  $("topinfo").textContent=`${N()}人 ・ CPU:${DIFF_LABEL[diffLevel]} ・ ライフ3で脱落 ・ 残り山札${deck.length}`;
  $("others").innerHTML=players.map((p,i)=>{
    if(i===0) return "";
    return `<div class="who${turnIdx===i&&!over?" active":""}${p.life<=0?" out":""}">
      <div class="nm">🤖 ${p.name}</div>
      <div class="life">${"♥".repeat(p.life)}${"♡".repeat(3-p.life)}</div>
      ${p.life>0?cardHTML(p.card):`<div class="fcard" style="background:#5a4a3a;color:#3a3028"><span class="v">-</span></div>`}
      <div class="say">${p.say||""}</div>
    </div>`;
  }).join("");
  const me=players[0];
  $("meline").innerHTML=`🧑 あなた <span class="life">${"♥".repeat(me.life)}${"♡".repeat(3-me.life)}</span>
    ${me.say?`<span style="color:var(--gold)">「${me.say}」</span>`:""}`;
  $("disc").innerHTML=discard.map(c=>`<span class="dc">${cardName(c)}</span>`).join("")||`<span style="opacity:.4">なし</span>`;
  $("num").textContent=myBid;
  $("minhint").textContent = lastBid>0 ? `前の宣言は ${lastBid} — ${lastBid+1} 以上を宣言` : "1 以上を宣言";
}
function showMyCard(reveal){
  const el=$("mycard"), me=players[0];
  if(reveal && me.card){
    el.classList.add("revealed");
    el.textContent = cardName(me.card);
  }else{
    el.classList.remove("revealed");
    el.textContent="?";
  }
}

/* ================= 手番 ================= */
function nextAlive(i){ let j=i; do{ j=(j+1)%N(); }while(players[j].life<=0); return j; }

async function step(){
  if(over) return;
  const p=players[turnIdx];
  render();
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(1800);
    const mv=cpuMove(turnIdx);
    if(mv.owl){ await callJackal(turnIdx); return; }
    p.say=String(mv.bid);
    lastBid=mv.bid; lastBidder=turnIdx;
    render();
    msg(`🤖 ${p.name}「${mv.bid}」`);
    await sleep(900);
    turnIdx=nextAlive(turnIdx);
    step();
  }else{
    busy=false;
    myBid=Math.max(lastBid+1, 1);
    $("controls").classList.add("on");
    $("coyote").disabled = lastBidder===null;    // 先手は宣言できない
    render();
    msg(lastBidder===null ? "あなたが先手。合計以下と思う数を宣言してください"
      : `<span class="em">${players[lastBidder].name}</span> の宣言は <b>${lastBid}</b>。より大きい数を宣言するか、ジャッカル！`);
  }
}
$("minus").onclick=()=>{ myBid=Math.max(lastBid+1, myBid-1); render(); };
$("plus").onclick =()=>{ myBid=myBid+1; render(); };
$("declare").onclick=async()=>{
  if(busy) return; busy=true;
  $("controls").classList.remove("on");
  players[0].say=String(myBid);
  lastBid=myBid; lastBidder=0;
  render();
  msg(`あなた「${myBid}」`);
  await sleep(800);
  turnIdx=nextAlive(0);
  step();
};
$("coyote").onclick=async()=>{
  if(lastBidder===null || busy) return;
  busy=true;
  $("controls").classList.remove("on");
  await callJackal(0);
};

/* ================= 「ジャッカル！」の解決 ================= */
async function callJackal(caller){
  const target=lastBidder;
  players[caller].say="ジャッカル！";
  render();
  msg(`<span class="bad">${caller===0?"あなた":players[caller].name}「ジャッカル！」</span><br>${players[target].name} の宣言 <b>${lastBid}</b> を疑いました…`);
  await sleep(1600);

  // 全員のカードを公開。?があれば山札から1枚追加
  const cards=alive().map(i=>players[i].card);
  let extra=null;
  if(cards.some(c=>c.t==="s"&&c.s===SP.DRAW)){
    extra = deck.length ? deck.pop() : null;
    drawnExtra=extra;
  }
  const all = extra ? [...cards, extra] : cards;
  const sum = total(all);
  showMyCard(true);
  render();

  const lines = alive().map(i=>
    `<span class="rc${i===0?" mine":""}">${players[i].name.replace("CPU・","")}: ${cardName(players[i].card)}</span>`).join("");
  const extraLine = extra ? `<div style="margin-top:6px;font-size:.7rem">「?」で山札から追加：<b>${cardName(extra)}</b></div>` : "";
  const loser = (lastBid > sum) ? target : caller;
  const verdict = (lastBid > sum)
    ? `宣言 <b>${lastBid}</b> は合計 <b>${sum}</b> を超えていた！<br>見破り成功 → <b>${players[target].name}</b> がライフを失う`
    : `合計は <b>${sum}</b>。宣言 <b>${lastBid}</b> は範囲内だった…<br>見破り失敗 → <b>${players[caller].name}</b> がライフを失う`;

  await new Promise(res=>showSheet({title:"オープン！",
    body:`<div class="reveal">${lines}</div>${extraLine}
      <div style="margin:10px 0;font-size:1.1rem;font-weight:800">合計 ${sum}</div>
      <div>${verdict}</div>`,
    btns:[["OK",res]]}));

  players[loser].life--;
  // 使用カードを捨て札へ（夜0が出ていたら山札を再構成）
  const used=[...all];
  const night = used.some(c=>c.t==="s"&&c.s===SP.NIGHT);
  discard.push(...used);
  for(const i of alive()) players[i].card=null;
  if(night){
    deck=shuffle(deck.concat(discard)); discard=[];
    msg(`<span class="em">夜0が出た！</span> 捨て札を戻して山札を作り直します`);
    await sleep(1400);
  }
  showMyCard(false);
  render();

  if(players[loser].life<=0){
    msg(`<span class="bad">${players[loser].name} は脱落…</span>`);
    await sleep(1300);
  }
  const rest=alive();
  if(rest.length<=1 || players[0].life<=0){ endGame(rest); return; }
  newRound(players[loser].life>0 ? loser : rest[0]);
}

/* ================= CPU ================= */
/* 見えているカード＋捨て札から、自分のカードの候補分布を作り、合計の分布を推定する */
function cpuMove(pi){
  const p=players[pi];
  const others=alive().filter(i=>i!==pi).map(i=>players[i].card);
  const easy=diffLevel==="easy", hard=diffLevel==="hard";

  // 自分のカード候補：全デッキ − 捨て札 − 見えているカード（つよいのみ捨て札を数える）
  const pool=buildDeck();
  const remove=(list)=>{ for(const c of list){ const k=key(c); const idx=pool.findIndex(x=>key(x)===k); if(idx>=0) pool.splice(idx,1); } };
  remove(others);
  if(hard) remove(discard);                 // つよいCPUだけカウンティングする
  if(!pool.length) pool.push({t:"n",v:1});

  // 合計の分布（自分のカード候補ごと。?は期待値で近似）
  const drawEV = 3.2;                        // 山札から1枚引いたときの平均的な値
  const sums=[];
  for(const cand of pool){
    const cards=[...others, cand];
    let s=total(cards);
    if(cards.some(c=>c.t==="s"&&c.s===SP.DRAW)){
      const mult=cards.some(c=>c.t==="s"&&c.s===SP.X2)?2:1;
      s += drawEV*mult;                      // ?の追加分（概算）
    }
    sums.push(s);
  }
  const mean = sums.reduce((a,b)=>a+b,0)/sums.length;
  const pAtLeast = d => sums.filter(s=>s>=d).length/sums.length;

  // 疑うべきか：前の宣言が合計を超えている確率
  if(lastBidder!==null){
    let pOver = 1 - pAtLeast(lastBid);       // 宣言 > 合計 の確率
    if(easy) pOver += (Math.random()-0.5)*0.5;
    const thr = hard ? 0.62 : (easy ? 0.85 : 0.7);
    if(pOver > thr) return {owl:true};
    // 次に宣言できる最小値がすでに危険なら、疑うしかない
    if(pAtLeast(lastBid+1) < (hard?0.30:0.22)) return {owl:true};
  }

  // 宣言値：安全に通せる範囲でできるだけ低く（つり上げは次の人に押し付けるため小刻みに）
  const floor=lastBid+1;
  let bid=floor;
  const safe = hard ? 0.55 : 0.45;           // これ以上の確率で「合計以下」であってほしい
  let cand=floor;
  while(cand < mean+8 && pAtLeast(cand) > safe) cand++;
  bid=Math.max(floor, cand-1);
  if(easy) bid = floor + Math.floor(Math.random()*3);
  else if(!hard && Math.random()<0.25) bid += 1;         // ふつうは少しブラフ
  else if(hard && Math.random()<0.18) bid += 1+Math.floor(Math.random()*2);  // つよいも時々つり上げ
  if(bid<floor) bid=floor;
  return {owl:false, bid};
}

/* ================= 終了 ================= */
function endGame(rest){
  over=true;
  const win = rest.length===1 ? rest[0] : (players[0].life>0?0:rest[0]);
  const meWin = win===0 && players[0].life>0;
  saveRecord({t:Date.now(), n:N(), diff:diffLevel, win:meWin, life:players[0].life, rounds:roundNo});
  render();
  showSheet({title: meWin ? "🎉 あなたの勝ち！" : `${players[win].name} の勝ち！`,
    body: players.map(p=>`${p===players[0]?"<b>":""}${p.name}：${p.life>0?"♥".repeat(p.life):"脱落"}${p===players[0]?"</b>":""}`).join("<br>")
      + `<br><br>全${roundNo}ラウンド`,
    btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,true]]});
}

/* ================= シート ================= */
function showSheet({title,body,btns}){
  $("stitle").textContent=title;
  $("sbody").innerHTML=body||"";
  $("sbtns").innerHTML="";
  for(const [label,fn,ghost] of btns){
    const b=document.createElement("button");
    b.className="act"; b.textContent=label;
    if(ghost) b.style.cssText="background:transparent;color:var(--sand);border:1.5px solid rgba(255,255,255,.4);box-shadow:none";
    b.onclick=()=>{ closeSheet(); fn&&fn(); };
    $("sbtns").appendChild(b);
  }
  $("veil").classList.add("show");
}
function closeSheet(){ $("veil").classList.remove("show"); }

/* ================= 履歴表示 ================= */
/* カード内訳：36枚の構成と、捨て札に出た枚数 */
$("compBtn").onclick=()=>{
  if($("veil").classList.contains("show")) return;
  const used={};
  for(const c of discard){ const k=key(c); used[k]=(used[k]||0)+1; }
  const full=buildDeck();
  const cnt={};
  for(const c of full){ const k=key(c); cnt[k]=(cnt[k]||0)+1; }
  const order=[20,15,10,5,4,3,2,1,0,-5,-10];
  const numRows=order.map(v=>{
    const k="n"+v, total=cnt[k]||0, gone=used[k]||0;
    if(!total) return "";
    return `<div style="display:flex;gap:6px;align-items:baseline">
      <b style="min-width:3em;text-align:right">${v}</b>
      <span style="min-width:3.5em;opacity:.7">${total}枚</span>
      <span style="color:var(--gold);letter-spacing:1px">${"●".repeat(total-gone)}${"○".repeat(gone)}</span></div>`;
  }).join("");
  const spRows=[SP.X2,SP.MAX0,SP.NIGHT,SP.DRAW].map(sp=>{
    const k="s"+sp, gone=used[k]||0;
    return `<div style="display:flex;gap:6px;align-items:baseline">
      <b style="min-width:5em">${LABEL[sp]}</b>
      <span style="min-width:6em;opacity:.7;font-size:.7rem">${SUB[sp]}</span>
      <span style="color:var(--gold)">${gone?"○":"●"}</span></div>`;
  }).join("");
  showSheet({title:"カード内訳（全36枚）",
    body:`<div style="text-align:left">
      <div style="font-size:.72rem;opacity:.75;margin-bottom:8px">●＝まだ出ていない ／ ○＝捨て札に出た</div>
      ${numRows}
      <div style="margin:10px 0 4px;font-weight:800;color:var(--gold)">特殊カード（各1枚）</div>
      ${spRows}</div>`,
    btns:[["閉じる",closeSheet,true]]});
};
$("histBtn").onclick=async()=>{
  if($("veil").classList.contains("show")) return;
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",body:`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,true]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":"敗退"}（${num(r.rounds)}R）`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br><span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[["閉じる",closeSheet,true],["履歴を全消去",()=>confirmClear(),true]]});
};

chooseSetup();
<\/script>
