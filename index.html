<script>
"use strict";
/* ================= 履歴 ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="gokipoker-history";
const FPATH="gokipoker/history";
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig); fdb=firebase.database();
  }
}catch(e){}
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage;
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）" : (STORE ? "アプリ内ストレージ" : "この端末のみ");
/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      // push形式（キー付きオブジェクト）と旧配列形式の両方を読む
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }          // 通信失敗など：空履歴として扱わない
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;                       // 読めなかったときは上書きしない
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY,false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}
/* 全消去の確認（Firebase有効時は共有データである旨を明示） */
function confirmClear(){
  const shared = !!fdb;
  showSheet({title:"履歴を全消去しますか？",
    body: shared
      ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
      : `この端末に保存された対戦履歴をすべて削除します。`,
    btns:[["削除する", async()=>{ await clearHistory(); msg("対戦履歴を消去しました"); }],
          ["やめる", null, "g"]]});
}


/* ================= カード ================= */
const KIND=[
  {k:"goki", n:"ゴキブリ", i:"🪳"},
  {k:"nezu", n:"ネズミ",   i:"🐀"},
  {k:"kumo", n:"クモ",     i:"🕷️"},
  {k:"kaeru",n:"カエル",   i:"🐸"},
  {k:"sasori",n:"サソリ",  i:"🦂"},
  {k:"hae",  n:"ハエ",     i:"🪰"},
  {k:"komori",n:"コウモリ",i:"🦇"},
  {k:"kame", n:"カメムシ", i:"🐞"},
];
const KN=Object.fromEntries(KIND.map(x=>[x.k,x.n]));
const KI=Object.fromEntries(KIND.map(x=>[x.k,x.i]));
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);

/* ================= 状態 ================= */
const CPU_NAMES=["ハルカ","ゲンさん","トビー","ミナ","クロエ"];
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};
let players, turnIdx, LIMIT, diffLevel, over;
let pass=null;   // {card, claim, from, to, seen:[idx...]}
let busy=false;

const N=()=>players.length;
const meIdx=()=>players.findIndex(p=>!p.cpu);
const pileCount=(p,k)=>p.piles[k]||0;
const distinctPiles=p=>Object.values(p.piles).filter(v=>v>0).length;

function chooseSetup(){
  showSheet({title:"対戦人数を選択",body:"あなた + CPU で対戦します<br>（2人戦のみ、敗北は同種5枚になります）",
    btns:[2,3,4,5,6].map(n=>[`${n}人（CPU×${n-1}）`,()=>chooseDiff(n-1)])});
}
function chooseDiff(nCpu){
  showSheet({title:"CPUの強さを選択",
    body:"やさしい：気分で嘘をつき、気分で疑う<br>ふつう：手札と場から嘘を見抜く<br>つよい：残り枚数を数え、あなたの負けを狙って押し付けてくる",
    btns:[["やさしい",()=>newGame(nCpu,"easy")],["ふつう",()=>newGame(nCpu,"normal")],["つよい",()=>newGame(nCpu,"hard")]]});
}
function newGame(nCpu,diff){
  diffLevel=diff; over=false;
  const n=nCpu+1;
  LIMIT = n===2 ? 5 : 4;
  players=[{name:"あなた",cpu:false,hand:[],piles:{}}];
  for(let i=0;i<nCpu;i++) players.push({name:CPU_NAMES[i],cpu:true,hand:[],piles:{}});
  // 64枚を均等に配り、余りは使わない
  const deck=shuffle(KIND.flatMap(x=>Array(8).fill(x.k)));
  const per=Math.floor(deck.length/n);
  players.forEach((p,i)=>p.hand=deck.slice(i*per,(i+1)*per).sort());
  turnIdx=Math.floor(Math.random()*n);
  pass=null;
  render();
  msg(`先手は <span class="em">${players[turnIdx].name}</span>`);
  setTimeout(startTurn, 1200);
}

/* ================= 描画 ================= */
function msg(h){ $("msg").innerHTML=h; }
function pilesHTML(p){
  const items=KIND.filter(x=>pileCount(p,x.k)>0).map(x=>{
    const c=pileCount(p,x.k);
    const cls = c>=LIMIT-1 ? "crit" : (c>=LIMIT-2 ? "warn" : "");
    return `<span class="pile ${cls}">${x.i}<span class="n">×${c}</span></span>`;
  });
  return items.join("") || `<span class="nopile">まだ引き取っていません</span>`;
}
function render(){
  $("topinfo").textContent=`${N()}人 ・ CPU:${DIFF_LABEL[diffLevel]} ・ 同種${LIMIT}枚か8種類コンプで敗北`;
  $("board").innerHTML=players.map((p,i)=>{
    const risky=KIND.some(x=>pileCount(p,x.k)===LIMIT-1);
    return `<div class="pl${turnIdx===i&&!over?" active":""}${i===meIdx()?" me":""}">
      <div class="l1">${p.cpu?"🤖":"🧑"} ${p.name}
        ${risky?`<span class="danger">あと1枚で敗北</span>`:""}
        ${distinctPiles(p)>=6?`<span class="danger">${distinctPiles(p)}種類</span>`:""}
        <span class="hand">手札${p.hand.length}枚</span></div>
      <div class="piles">${pilesHTML(p)}</div>
    </div>`;
  }).join("");
  // 中央
  const pc=$("passcard");
  if(pass){
    pc.classList.remove("open"); pc.textContent="?";
    $("claim").innerHTML=`<span class="em">${players[pass.from].name}</span> →
      <b>${pass.to===meIdx()?"あなた":players[pass.to].name}</b><br>
      「これは <span class="q">${KI[pass.claim]} ${KN[pass.claim]}</span> です」`;
    $("chain").textContent = pass.seen.length>1 ? `経由：${pass.seen.map(i=>players[i].name).join(" → ")}` : "";
  }else{
    pc.classList.remove("open"); pc.textContent="?";
    $("claim").innerHTML=`<span style="opacity:.5;font-size:.75rem">カードのやり取りを待っています</span>`;
    $("chain").textContent="";
  }
  renderHand(false);
}
function renderHand(playable){
  const me=players[meIdx()];
  const counts={};
  for(const k of me.hand) counts[k]=(counts[k]||0)+1;
  $("hand").innerHTML=KIND.filter(x=>counts[x.k]).map(x=>
    `<div class="hc ${playable?"":"dim"}" data-k="${x.k}">
      <div class="ic">${x.i}</div><div class="nm">${x.n}</div><div class="ct">×${counts[x.k]}</div>
    </div>`).join("") || `<div style="opacity:.5;font-size:.75rem;padding:10px">手札なし</div>`;
  if(playable){
    $("hand").querySelectorAll(".hc").forEach(el=>{
      el.onclick=()=>{ if(busy) return; humanChooseTarget(el.dataset.k); };
    });
  }
}
function setActs(list){
  $("act").innerHTML="";
  for(const [label,fn,cls] of list){
    const b=document.createElement("button");
    b.className="act"+(cls?" "+cls:""); b.innerHTML=label;
    b.onclick=fn;
    $("act").appendChild(b);
  }
}

/* ================= 手番開始（親＝カードを出す） ================= */
async function startTurn(){
  if(over) return;
  busy=false;                          // 新しい手番：入力ロック解除
  const p=players[turnIdx];
  pass=null;
  render();
  if(p.hand.length===0){                       // 出せない＝敗北
    msg(`${p.name} は手札がなくなり、カードを出せません…`);
    await sleep(1200);
    lose(turnIdx, "手札切れで出せなくなった");
    return;
  }
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(1800);
    const mv=cpuGive(turnIdx);
    doPass(turnIdx, mv.to, mv.card, mv.claim);
  }else{
    busy=false;
    setActs([]);
    msg("手札から1枚選んで、誰かに押し付けます");
    renderHand(true);
  }
}
function humanChooseTarget(k){
  const me=meIdx();
  const others=players.map((_,i)=>i).filter(i=>i!==me);
  showSheet({title:`${KI[k]} ${KN[k]} を誰に？`, body:"押し付ける相手を選んでください",
    btns:[...others.map(i=>[players[i].name,()=>humanChooseClaim(k,i)]),["やめる",()=>renderHand(true),"g"]]});
}
function humanChooseClaim(k,to){
  const grid=KIND.map(x=>
    `<button data-k="${x.k}" class="${x.k===k?"sameas":""}"><span class="ic">${x.i}</span>${x.n}</button>`).join("");
  showSheet({title:"なんと言って渡す？",
    body:`実際のカードは <b>${KI[k]} ${KN[k]}</b><br>
      <span style="font-size:.7rem;opacity:.75">本当のことを言っても、嘘をついてもOK（金枠＝本当）</span>
      <div class="grid8">${grid}</div>`,
    btns:[["やめる",()=>renderHand(true),"g"]]});
  $("sbody").querySelectorAll("button[data-k]").forEach(b=>{
    b.onclick=()=>{ closeSheet(); doPass(meIdx(), to, k, b.dataset.k); };
  });
}
function doPass(from,to,card,claim){
  if(busy) return;
  busy=true;
  const p=players[from];
  p.hand.splice(p.hand.indexOf(card),1);
  pass={card, claim, from, to, seen:[from]};
  render();
  msg(`<span class="em">${from===meIdx()?"あなた":players[from].name}</span>「これは ${KI[claim]}${KN[claim]} です」`);
  setTimeout(receive, 1400);
}

/* ================= 受け手の判断 ================= */
function canForward(){
  // まだ見ていない生存者がいれば回せる
  return players.some((p,i)=> !pass.seen.includes(i) && i!==pass.to);
}
async function receive(){
  if(!pass || over) return;            // 解決済みのやり取りに対する遅延呼び出しを無視
  const to=pass.to, p=players[to];
  render();
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(2000);
    const mv=cpuReceive(to);
    if(mv.forward){
      pass.seen.push(to);
      const oldClaim=pass.claim;
      pass.from=to; pass.to=mv.to; pass.claim=mv.claim;
      render();
      msg(`🤖 ${p.name} はカードを覗いて…<br><span class="em">${players[mv.to].name}</span> に回した`
        + (mv.claim!==oldClaim?`（「${KI[mv.claim]}${KN[mv.claim]}」と言い換えた）`:``));
      await sleep(1500);
      receive();
      return;
    }
    await resolve(to, mv.guess);
  }else{
    busy=false;
    const acts=[
      [`本当だ`, ()=>{ if(busy) return; busy=true; setActs([]); resolve(meIdx(), true); }, "t"],
      [`嘘だ`,   ()=>{ if(busy) return; busy=true; setActs([]); resolve(meIdx(), false); }, "f"],
    ];
    if(canForward()) acts.push([`覗いて回す`, ()=>{ if(busy) return; humanForward(); }, "g"]);
    setActs(acts);
    msg(`<b>${players[pass.from].name}</b> は「${KI[pass.claim]}${KN[pass.claim]}」だと言っています。<br>本当？ 嘘？`
      + (canForward()?`　（覗いて他の人に回すこともできます）`:`　<span class="bad">もう回せません</span>`));
  }
}
function humanForward(){
  setActs([]);
  const me=meIdx();
  const targets=players.map((_,i)=>i).filter(i=> !pass.seen.includes(i) && i!==me);
  const k=pass.card;
  showSheet({title:"カードを覗いた",
    peek:k,
    body:`誰に回しますか？（回すときに言う生き物も選べます）`,
    btns:targets.map(i=>[players[i].name,()=>humanForwardClaim(i)])});
}
function humanForwardClaim(to){
  const k=pass.card;
  const grid=KIND.map(x=>
    `<button data-k="${x.k}" class="${x.k===k?"sameas":""}"><span class="ic">${x.i}</span>${x.n}</button>`).join("");
  showSheet({title:`${players[to].name} になんと言って回す？`,
    body:`実際のカードは <b>${KI[k]} ${KN[k]}</b><div class="grid8">${grid}</div>`,
    btns:[]});
  $("sbody").querySelectorAll("button[data-k]").forEach(b=>{
    b.onclick=()=>{
      closeSheet();
      pass.seen.push(meIdx());
      pass.from=meIdx(); pass.to=to; pass.claim=b.dataset.k;
      render();
      msg(`あなたは <span class="em">${players[to].name}</span> に回した`);
      setTimeout(receive, 1300);
    };
  });
}

/* ================= 判定 ================= */
async function resolve(guesser, saysTrue){
  if(!pass || over) return;
  const truth = pass.card===pass.claim;
  const correct = (saysTrue===truth);
  const taker = correct ? pass.from : guesser;      // 当てたら出し手が引き取る
  const pc=$("passcard");
  pc.classList.add("open");
  pc.innerHTML=`${KI[pass.card]}<span class="nm">${KN[pass.card]}</span>`;
  const gname = guesser===meIdx()?"あなた":players[guesser].name;
  msg(`${gname}「${saysTrue?"本当だ":"嘘だ"}」→ 正体は <b>${KI[pass.card]}${KN[pass.card]}</b>…`);
  await sleep(1800);

  const tname = taker===meIdx()?"あなた":players[taker].name;
  msg(correct
    ? `<span class="ok">見破った！</span> ${players[pass.from].name} が引き取ります`
    : `<span class="bad">はずれ…</span> ${tname} が引き取ります`);
  await sleep(1300);

  const p=players[taker];
  p.piles[pass.card]=(p.piles[pass.card]||0)+1;
  const kindCount=p.piles[pass.card];
  const kinds=distinctPiles(p);
  turnIdx=taker;                                    // 引き取った人が次の親
  pass=null;
  render();
  await sleep(600);

  if(kindCount>=LIMIT){ lose(taker, `${KN[Object.keys(p.piles).find(k=>p.piles[k]>=LIMIT)]}を${LIMIT}枚集めてしまった`); return; }
  if(kinds>=8){ lose(taker, "8種類すべてを集めてしまった"); return; }
  startTurn();
}

/* ================= CPU ================= */
/* 公開情報：全員の場札 + 自分の手札。残り枚数から嘘を見抜く */
function unaccounted(pi, k){
  let used=0;
  for(const p of players) used += pileCount(p,k);
  used += players[pi].hand.filter(x=>x===k).length;
  return 8-used;                                    // 他人の手札にある可能性がある枚数
}
function dangerFor(p,k){                            // その札を引き取ると即負けか
  return pileCount(p,k)>=LIMIT-1 || (distinctPiles(p)>=7 && !pileCount(p,k));
}
function cpuGive(pi){
  const p=players[pi], hard=diffLevel==="hard", easy=diffLevel==="easy";
  const others=players.map((_,i)=>i).filter(i=>i!==pi);
  const rnd=a=>a[Math.floor(Math.random()*a.length)];

  if(easy){
    const card=rnd(p.hand);
    const claim=Math.random()<0.5 ? card : rnd(KIND).k;
    return {to:rnd(others), card, claim};
  }
  // 相手ごとの「致命傷」を探す
  let best=null;
  for(const to of others){
    const t=players[to];
    for(const card of new Set(p.hand)){
      // 相手が引き取ると負けるカードか？
      const kill = dangerFor(t, card);
      for(const claim of (hard ? KIND.map(x=>x.k) : [card, rnd(KIND).k])){
        // 相手が「本当/嘘」を外せば引き取る → 引き取らせたい
        let score = 0;
        const truth = (card===claim);
        // 相手が疑いにくい宣言か：残り枚数が多い種類ほど「本当らしい」
        const plaus = unaccounted(pi, claim);        // 0なら嘘だと即バレ
        if(plaus<=0 && !truth) score -= 100;         // 絶対にバレる嘘
        if(kill){
          // 致命札：本当のことを言って渡すと、相手は「嘘だ」と言いたくなる → 当たれば相手が取る
          score += truth ? 60 : 25;
          score += hard ? 25 : 0;
        }
        // 自分の手札で持て余している種類を減らす
        score += p.hand.filter(x=>x===card).length*3;
        // 危険な相手（もう後がない人）を狙う
        score += (LIMIT-1-pileCount(t,card))<=1 ? 12 : 0;
        score += truth ? 4 : 8;                      // 適度に嘘を混ぜる
        score += Math.random()*10;
        if(!best || score>best.score) best={score,to,card,claim};
      }
    }
  }
  return best || {to:rnd(others), card:rnd(p.hand), claim:rnd(KIND).k};
}
function cpuReceive(pi){
  const p=players[pi], hard=diffLevel==="hard", easy=diffLevel==="easy";
  if(!pass) return {forward:false, guess:true};
  const claim=pass.claim, actual=pass.card;
  const rnd=a=>a[Math.floor(Math.random()*a.length)];

  if(easy){
    if(canForward() && Math.random()<0.3){
      const t=players.map((_,i)=>i).filter(i=>!pass.seen.includes(i)&&i!==pi);
      return {forward:true, to:rnd(t), claim: Math.random()<0.5?actual:rnd(KIND).k};
    }
    return {forward:false, guess:Math.random()<0.5};
  }

  // 宣言された種類が残っていない → 確実に嘘
  const left=unaccounted(pi, claim);
  let pTrue;
  if(left<=0) pTrue=0;                              // 絶対に嘘
  else{
    // 残り枚数が多いほど「本当」もあり得る。相手のブラフ率を0.45と仮定
    const base=0.5;
    pTrue = base * Math.min(1, left/3);
    // 自分がその種類をたくさん持っている＝出回っていない → 嘘寄り
    if(hard && left<=1) pTrue*=0.5;
  }
  // 引き取ると致命傷になる状況なら、回避を優先
  const fatalIfTrue = dangerFor(p, claim);          // 宣言通りなら死ぬ
  const fatalIfActual = dangerFor(p, actual);       // （回すとき用：中身を見て判断できる）

  if(canForward()){
    // 覗いて回す：中身が自分にとって危険 or 判断がつかないとき
    const chainLen=pass.seen.length;
    const wantForward = fatalIfActual || (pTrue>0.3 && pTrue<0.7 && chainLen<2);
    if(wantForward && (hard || Math.random()<0.7)){
      const cands=players.map((_,i)=>i).filter(i=>!pass.seen.includes(i)&&i!==pi);
      // 危険な相手に押し付ける
      let to=cands[0], bs=-Infinity;
      for(const c of cands){
        let s=Math.random()*5;
        if(hard && dangerFor(players[c], actual)) s+=40;   // 相手の致命札を回す
        s += pileCount(players[c],actual)*4;
        if(!players[c].cpu) s+=hard?12:4;                  // 人間を狙いがち
        if(s>bs){bs=s;to=c;}
      }
      // 言い換える：相手が引き取ると死ぬ種類だと分かっているなら本当を言う
      let newClaim=actual;
      if(!hard || Math.random()<0.5){
        if(!dangerFor(players[to], actual)) newClaim = Math.random()<0.5 ? actual : rnd(KIND).k;
      }
      if(unaccounted(pi,newClaim)<=0 && newClaim!==actual) newClaim=actual;   // バレバレの嘘は避ける
      return {forward:true, to, claim:newClaim};
    }
  }
  // 答える：致命傷を避ける方向に倒す
  let guessTrue = pTrue>0.5;
  if(fatalIfTrue){
    // 「本当」だと引き取ったら死ぬ…わけではない（外したら引き取る）ので、
    // 死なないためには "正解" する必要がある。確率に従うのが最善。
    guessTrue = pTrue>0.5;
  }
  if(!hard && Math.random()<0.15) guessTrue=!guessTrue;   // ふつうは時々読み間違える
  return {forward:false, guess:guessTrue};
}

/* ================= 決着 ================= */
function lose(pi, reason){
  over=true;
  const meLost = pi===meIdx();
  saveRecord({t:Date.now(), n:N(), diff:diffLevel, win:!meLost, loser:players[pi].name, reason});
  render();
  showSheet({title: meLost ? "😖 あなたの負け…" : `${players[pi].name} の負け！`,
    body:`<b>${players[pi].name}</b> が ${reason}<br><br>
      ${meLost?"一人負けです。":"あなたを含む他の全員の勝ちです。"}`,
    btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,"g"]]});
}

/* ================= シート ================= */
function showSheet({title,body,btns,peek}){
  $("stitle").textContent=title;
  $("speek").innerHTML = peek ? `<div class="peek"><div class="ic">${KI[peek]}</div><div class="nm">${KN[peek]}</div></div>` : "";
  $("sbody").innerHTML=body||"";
  $("sbtns").innerHTML="";
  for(const [label,fn,cls] of (btns||[])){
    const b=document.createElement("button");
    b.className="act"+(cls?" "+cls:""); b.textContent=label;
    b.onclick=()=>{ closeSheet(); fn&&fn(); };
    $("sbtns").appendChild(b);
  }
  $("veil").classList.add("show");
}
function closeSheet(){ $("veil").classList.remove("show"); }

/* ================= 履歴表示 ================= */
/* カード内訳：各8枚。場札＋自分の手札から「まだ見えていない枚数」を出す */
$("compBtn").onclick=()=>{
  if($("veil").classList.contains("show")) return;
  const me=players[meIdx()];
  const rows=KIND.map(x=>{
    let onBoard=0;
    for(const p of players) onBoard += pileCount(p,x.k);
    const inHand=me.hand.filter(k=>k===x.k).length;
    const unknown=8-onBoard-inHand;
    const warn = unknown<=0 ? ' style="color:var(--lie);font-weight:800"' : "";
    return `<div style="display:flex;gap:6px;align-items:baseline;padding:2px 0">
      <span style="min-width:1.6em">${x.i}</span>
      <b style="min-width:4.5em">${x.n}</b>
      <span style="min-width:4.5em;opacity:.7;font-size:.7rem">場に${onBoard}</span>
      <span style="min-width:5em;opacity:.7;font-size:.7rem">手札に${inHand}</span>
      <span${warn}>残り${unknown}</span></div>`;
  }).join("");
  showSheet({title:"カード内訳（8種×8枚＝64枚）",
    body:`<div style="text-align:left">
      <div style="font-size:.72rem;opacity:.75;margin-bottom:8px">
        「残り」＝場にも自分の手札にもない枚数。<br>
        <b style="color:var(--lie)">残り0</b> の生き物を宣言されたら、それは<b>確実に嘘</b>です。</div>
      ${rows}</div>`,
    btns:[["閉じる",closeSheet,"g"]]});
};
$("histBtn").onclick=async()=>{
  if($("veil").classList.contains("show")) return;
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",body:`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":"😖 一人負け"}`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br><span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[["閉じる",closeSheet,"g"],["履歴を全消去",()=>confirmClear(),"g"]]});
};

chooseSetup();
<\/script>

<!-- Firebase（GitHub Pagesで履歴を共有する場合に設定。未設定でも動きます） -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"><\/script>
<script>
"use strict";
/* ================= 履歴 ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="kotori-history";
const FPATH="kotori/history";
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig); fdb=firebase.database();
  }
}catch(e){}
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage;
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）" : (STORE ? "アプリ内ストレージ" : "この端末のみ");
/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      // push形式（キー付きオブジェクト）と旧配列形式の両方を読む
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }          // 通信失敗など：空履歴として扱わない
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;                       // 読めなかったときは上書きしない
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY,false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}
/* 全消去の確認（Firebase有効時は共有データである旨を明示） */
function confirmClear(){
  const shared = !!fdb;
  showSheet({title:"履歴を全消去しますか？",
    body: shared
      ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
      : `この端末に保存された対戦履歴をすべて削除します。`,
    btns:[["削除する", async()=>{ await clearHistory(); msg("対戦履歴を消去しました"); }],
          ["やめる", null, "g"]]});
}


/* ================= カード ================= */
const BIRD={1:"🐤",2:"🐥",3:"🐦",4:"🕊️",5:"🦜",6:"🦉",7:"🦚"};
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
let fastFwd=false;                  // 自分の退場後、結果まで飛ばす
const sleep=ms=>new Promise(r=>setTimeout(r, fastFwd?0:ms));
const $=id=>document.getElementById(id);

/* 役の強さ比較：枚数が多いほど強い、同枚数なら数字が大きいほど強い */
function stronger(a,b){ // a が b より強いか（a,b = {num,count}）
  if(!b) return true;
  if(a.count!==b.count) return a.count>b.count;
  return a.num>b.num;
}

/* ================= 状態 ================= */
const CPU_NAMES=["ヒバリ","ツバメ","カワセミ","フクロウ","セキレイ"];
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};
let players, deck, field, fieldOwner, turnIdx, passers, finishOrder, diffLevel, over, busy;
let selStart=-1, selLen=0;
let gen=0;                         // ラウンド世代（古い非同期処理の無効化用）
const N=()=>players.length;
const active=()=>players.map((p,i)=>p.done?null:i).filter(i=>i!=null);

function chooseSetup(){
  showSheet({title:"対戦人数を選択",body:"あなた + CPU で対戦します（3〜6人）<br>手札を早く出し切るゲームです。最後まで残るとペナルティ。",
    btns:[3,4,5,6].map(n=>[`${n}人（CPU×${n-1}）`,()=>chooseDiff(n-1)])});
}
function chooseDiff(nCpu){
  showSheet({title:"CPUの強さを選択",
    body:"やさしい：手なりで出す<br>ふつう：役を作って出す<br>つよい：場の回収を活かして手札を育て、上がりを狙う",
    btns:[["やさしい",()=>newGame(nCpu,"easy")],["ふつう",()=>newGame(nCpu,"normal")],["つよい",()=>newGame(nCpu,"hard")]]});
}
function newGame(nCpu,diff){
  diffLevel=diff; over=false;
  players=[{name:"あなた",cpu:false,hand:[],done:false,rank:0,pen:0}];
  for(let i=0;i<nCpu;i++) players.push({name:CPU_NAMES[i],cpu:true,hand:[],done:false,rank:0,pen:0});
  newRound(Math.floor(Math.random()*N()));
}
function newRound(starter){
  gen++;
  fastFwd=false;
  deck=shuffle([].concat(...[1,2,3,4,5,6,7].map(v=>Array(9).fill(v))));
  for(const p of players){ p.hand=deck.splice(0,8); p.done=false; p.rank=0; }
  // 手札は並べ替え禁止＝配られた順のまま
  field=null; fieldOwner=-1; passers=new Set(); finishOrder=[];
  turnIdx=starter; busy=false;
  selStart=-1; selLen=0;
  render();
  const g=gen;
  msg(`スタートは <span class="em">${players[starter].name}</span>。好きなカードから出せます`);
  setTimeout(()=>step(g), 1200);
}

/* ================= 描画 ================= */
function msg(h){ $("msg").innerHTML=h; }
function cardHTML(num,cls=""){
  return `<div class="card n${num} ${cls}"><span class="num">${num}</span><span class="bird">${BIRD[num]}</span></div>`;
}
function groupsOf(hand){
  // 手札の連続する同数字をまとめてグループ化（並べ替え禁止なので位置that重要）
  const g=[]; let i=0;
  while(i<hand.length){ let j=i; while(j<hand.length&&hand[j]===hand[i]) j++; g.push({num:hand[i],start:i,count:j-i}); i=j; }
  return g;
}
function render(){
  $("topinfo").textContent=`${N()}人 ・ CPU:${DIFF_LABEL[diffLevel]} ・ 早く出し切ればあがり ・ 最下位はペンギン-1`;
  $("others").innerHTML=players.map((p,i)=>{
    if(i===0) return "";
    const st = p.done ? `<div class="st">${rankLabel(p.rank)}</div>`
      : (fieldOwner===i ? `<div class="st up">場を確保中</div>`
      : (passers.has(i) ? `<div class="st ps">パス</div>` : `<div class="st">&nbsp;</div>`));
    return `<div class="who${turnIdx===i&&!over?" active":""}${p.done?" done":""}">
      <div class="nm">🐧${"🐧".repeat(Math.max(0,p.pen))||""} ${p.name}</div>
      <div class="cnt">手札 ${p.hand.length}枚</div>
      ${st}</div>`;
  }).join("");
  // 場
  if(field){
    $("fieldcards").innerHTML=Array(field.count).fill(0).map(()=>cardHTML(field.num)).join("");
    $("fieldinfo").innerHTML=`<span class="em">${players[fieldOwner].name}</span> が出した
      <b>${field.num}が${field.count}枚</b>　—　これより強い役（枚数が多い／同枚数なら数字が上）を出すかパス`;
  }else{
    $("fieldcards").innerHTML=`<span style="opacity:.4;font-size:.8rem">場は空</span>`;
    $("fieldinfo").innerHTML=`好きなカードを出せます`;
  }
  const me=players[0];
  $("myhead").innerHTML=`🐧${"🐧".repeat(Math.max(0,me.pen))||""} あなた ${me.done?`（${rankLabel(me.rank)}）`:`・手札 ${me.hand.length}枚`}`;
  renderHand(false);
}
function rankLabel(r){ return r===1?"1抜け🥇":r===2?"2抜け🥈":r===3?"3抜け🥉":`${r}番目`; }

function renderHand(interactive){
  const me=players[0];
  if(me.done){ $("hand").innerHTML=`<div style="opacity:.5;font-size:.8rem;padding:16px">あがりました</div>`; return; }
  $("hand").innerHTML=me.hand.map((v,i)=>{
    const inSel = interactive && selStart>=0 && i>=selStart && i<selStart+selLen;
    const selectable = interactive && isSelectableStart(i);
    return cardHTML(v, (inSel?"sel ":"")+(selectable&&!inSel?"selectable ":"")+"dim");
  }).join("");
  if(interactive){
    [...$("hand").children].forEach((el,i)=>{ el.onclick=()=>{ if(busy) return; tapCard(i); }; });
  }
}
// 位置iが「選択の起点」になれるか（そこから同じ数字が連続していれば束にできる）
function isSelectableStart(i){
  const me=players[0];
  // 束の起点は「直前が違う数字（またはindex0）」に限定して二重選択を防ぐ
  return true;
}

/* ================= 選択（連続する同数字の束） ================= */
function tapCard(i){
  const me=players[0], v=me.hand[i];
  // その位置を含む「連続する同数字ブロック」を特定
  let s=i; while(s>0 && me.hand[s-1]===v) s--;
  let e=i; while(e<me.hand.length-1 && me.hand[e+1]===v) e++;
  const blockLen=e-s+1;
  if(selStart===s){
    // 同じブロックを再タップ → 枚数を1増やす（最大 blockLen）、超えたら解除
    selLen = selLen>=blockLen ? 0 : selLen+1;
    if(selLen===0) selStart=-1;
  }else{
    selStart=s; selLen=1;
  }
  updateControls();
  renderHand(true);
}
function updateControls(){
  const me=players[0];
  let ok=false, why="";
  if(selStart>=0 && selLen>0){
    const play={num:me.hand[selStart], count:selLen};
    ok = field ? stronger(play, field) : true;
    why = ok ? `${play.num}を${play.count}枚出す` : `場（${field.num}が${field.count}枚）より弱い`;
  }
  $("controls").innerHTML="";
  const mk=(label,cls,fn,dis)=>{ const b=document.createElement("button"); b.className="act"+(cls?" "+cls:""); b.textContent=label; b.disabled=!!dis; b.onclick=fn; return b; };
  $("controls").appendChild(mk(selStart>=0?why:"カードを選択", "", ()=>humanPlay(), !ok));
  if(field) $("controls").appendChild(mk("パス", "pass", ()=>humanPass()));
}

/* ================= 手番 ================= */
function nextActive(i){ let j=i; do{ j=(j+1)%N(); }while(players[j].done); return j; }

async function step(myGen){
  if(myGen!==undefined && myGen!==gen) return;
  if(over) return;
  // 全員が場主以外パス → 場主が場を流して continues
  render();
  const p=players[turnIdx];
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(1600);
    const mv=cpuMove(turnIdx);
    if(mv.pass){ await doPass(turnIdx); }
    else{ await doPlay(turnIdx, mv.start, mv.count); }
  }else{
    busy=false;
    selStart=-1; selLen=0;
    updateControls();
    renderHand(true);
    msg(field ? "強い役を出すか、パスしてください" : "好きなカードを出してください");
  }
}

function humanPlay(){
  if(busy || selStart<0) return;
  busy=true;
  doPlay(0, selStart, selLen);
}
function humanPass(){
  if(busy) return;
  busy=true;
  doPass(0);
}

/* カードを出す */
async function doPlay(pi, start, count){
  if(over || players[pi]===undefined) return;
  const myGen=gen;
  const p=players[pi];
  const num=p.hand[start];
  const play={num, count};
  // 場のカードを回収するかどうか（前の場カードがある場合）
  const prevField = field;
  // 手札から除去
  p.hand.splice(start, count);
  field=play; fieldOwner=pi; passers.clear();
  const pn = pi===0?`<span class="em">あなた</span>`:`🤖 ${p.name}`;
  render();
  msg(`${pn} は <b>${num}を${count}枚</b> 出した`);
  await sleep(700);

  // 直前に場にあったカードを「手札に加える or 捨てる」
  if(prevField){
    if(pi===0){
      await new Promise(res=>{
        showSheet({title:"場のカードをどうする？",
          body:`<div style="display:flex;gap:4px;justify-content:center;margin:6px 0">${Array(prevField.count).fill(0).map(()=>cardHTML(prevField.num,"small")).join("")}</div>
            <b>${prevField.num}が${prevField.count}枚</b><br>手札に加えると、同じ数字とつなげて大きな役を作れます。<br>
            <span style="font-size:.7rem;opacity:.7">※加えたカードは手札の好きな位置に置けます</span>`,
          btns:[["手札に加える",()=>{ pickupHuman(prevField, res); }],
                ["捨てる",()=>{ res(); }]]});
      });
    }else{
      cpuPickup(pi, prevField);
    }
  }
  if(myGen!==gen) return;
  render();
  await afterMove(pi);
}
// 人間が回収：実際の手札を見せて、すき間をタップして差し込む。done=完了通知
function pickupHuman(picked, done){
  const me=players[0];
  const cards=Array(picked.count).fill(picked.num);
  renderInsertUI(me, picked, cards, done);
}
function renderInsertUI(me, picked, cards, done){
  // 手札を並べ、カードとカードの間に「ここに置く」スロットを挟む
  const slot=(pos)=>{
    const isAdj = (pos>0 && me.hand[pos-1]===picked.num) || (pos<me.hand.length && me.hand[pos]===picked.num);
    return `<span class="ins-slot${isAdj?" adj":""}" data-pos="${pos}">＋</span>`;
  };
  let row=slot(0);
  for(let i=0;i<me.hand.length;i++){
    row += `<span class="ins-card">${cardHTML(me.hand[i],"small")}</span>` + slot(i+1);
  }
  showSheet({title:`${picked.num}を${picked.count}枚 どこに置く？`,
    body:`<div style="font-size:.72rem;opacity:.75;margin-bottom:8px">
        置きたい位置の <b style="color:var(--gold)">＋</b> をタップ。<br>
        <span style="color:var(--gold)">金色の＋</span>＝同じ数字の隣（まとめて出せる大きな役になります）</div>
      <div class="ins-row">${row}</div>
      <div style="margin-top:8px;font-size:.7rem;opacity:.6">追加するカード：${Array(picked.count).fill(0).map(()=>cardHTML(picked.num,"mini")).join("")}</div>`,
    btns:[["やっぱり捨てる",()=>{ closeSheet(); done&&done(); },"g"]]});
  $("sbody").querySelectorAll(".ins-slot").forEach(el=>{
    el.onclick=()=>{ insertAt(me,cards,+el.dataset.pos); closeSheet(); done&&done(); };
  });
}
function insertAt(me,cards,pos){ me.hand.splice(pos,0,...cards); render(); }

// CPUの回収：同じ数字があれば隣接させて回収、なければ役に応じて判断
function cpuPickup(pi, picked){
  const p=players[pi], hard=diffLevel==="hard";
  const haveSame = p.hand.includes(picked.num);
  // つよい/ふつうは、同じ数字を持っている or 枚数が多い塊なら回収して育てる
  const worth = haveSame || picked.count>=2 || (hard && picked.num>=5);
  // やさしいはランダム寄り
  const take = diffLevel==="easy" ? Math.random()<0.5 : worth;
  if(!take) return;
  const cards=Array(picked.count).fill(picked.num);
  // 同じ数字の右隣に挿入（連結）
  let pos=p.hand.length;
  for(let i=0;i<p.hand.length;i++){ if(p.hand[i]===picked.num){ pos=i+1; } }
  p.hand.splice(pos,0,...cards);
}

/* パス */
async function doPass(pi){
  if(over || players[pi]===undefined) return;
  const myGen=gen;
  const p=players[pi];
  passers.add(pi);
  const pn = pi===0?`<span class="em">あなた</span>`:`🤖 ${p.name}`;
  render();
  const drawn = deck.length ? deck.pop() : null;
  if(drawn!=null){
    if(pi===0){
      msg(`あなたはパス。山札から <b>${drawn}</b> を引いた`);
      await sleep(500);
      await new Promise(res=>{
        showSheet({title:"山札から引いた",
          body:`<div style="display:flex;justify-content:center;margin:6px 0">${cardHTML(drawn)}</div>
            <b>${drawn}</b> を手札に加える？<br>
            <span style="font-size:.7rem;opacity:.7">加えると同じ数字とつなげて役を作れます</span>`,
          btns:[["手札に加える",()=>{ pickupHuman({num:drawn,count:1}, res); }],
                ["捨てる",()=>res()]]});
      });
    }else{
      cpuPickup(pi, {num:drawn, count:1});
      msg(`${pn} はパス（山札から1枚引いた）`);
      await sleep(650);
    }
  }else{
    msg(`${pn} はパス（山札が尽きているため引けない）`);
    await sleep(650);
  }
  render();
  if(myGen!==gen) return;
  await afterMove(pi);
}

/* 手番後の処理：あがり判定・場流し・手番送り */
async function afterMove(pi){
  const p=players[pi];
  let justFinished=false;
  // あがり判定
  if(p.hand.length===0 && !p.done){
    p.done=true;
    finishOrder.push(pi);
    p.rank=finishOrder.length;
    justFinished=true;
    msg(`<span class="win">${pi===0?"あなた":p.name} があがり！（${rankLabel(p.rank)}）</span>`);
    await sleep(1200);
    // あなたがあがって、まだ勝負が続くなら「結果まで飛ばす」を提案
    if(pi===0 && !fastFwd && active().length>1){
      await new Promise(res=>{
        showSheet({title:`あがり！（${rankLabel(p.rank)}）`,
          body:`残りはCPU同士の勝負です。<br>最後まで見ますか？`,
          btns:[["結果まで飛ばす",()=>{ fastFwd=true; res(); }],
                ["最後まで見る",()=>res()]]});
      });
    }
  }
  // 残り1人になったら終了（最後の1人を最下位に）
  const rem=active();
  if(rem.length<=1){
    if(rem.length===1){ players[rem[0]].rank=N(); finishOrder.push(rem[0]); players[rem[0]].done=true; }
    endRound();
    return;
  }
  // 場主があがった場合：場を流して、次のアクティブ（あがった人の次）から
  if(justFinished && fieldOwner===pi){
    field=null; fieldOwner=-1; passers.clear();
    turnIdx=nextActive(pi);
    step(gen); return;
  }
  // 場流し判定（公式）：場主以外の現役が全員パスしたら場を捨て、場主から再開
  if(field && fieldOwner>=0 && !players[fieldOwner].done){
    const others=active().filter(i=>i!==fieldOwner);
    if(others.length>0 && others.every(i=>passers.has(i))){
      field=null; passers.clear();
      turnIdx=fieldOwner;
      msg(`全員パス。場が流れて <span class="em">${players[fieldOwner].name}</span> から好きに出せます`);
      await sleep(1000);
      step(gen); return;
    }
  }
  // 場が空（誰も出していない or 流れた直後）なら次のアクティブから自由出し
  if(!field){
    turnIdx=nextActive(pi);
    passers.clear();
    step(gen); return;
  }
  // 通常の手番送り（あがった人・パスした人を飛ばす）
  turnIdx=nextActive(pi);
  step(gen);
}

/* ================= CPU 思考 ================= */
function cpuMove(pi){
  const p=players[pi], hand=p.hand;
  const easy=diffLevel==="easy", hard=diffLevel==="hard";
  const gs=groupsOf(hand);
  // 出せる候補（場より強い役）を列挙
  const cands=[];
  for(const g of gs){
    for(let c=1;c<=g.count;c++){
      const play={num:g.num,count:c,start:g.start};
      if(!field || stronger(play,field)) cands.push(play);
    }
  }
  if(!field){
    // 場が空：基本は「弱い役」から捌く。手札を減らしたいので単発の小さい数字を優先
    // ただし つよい は、大きな束は温存して小刻みに出す
    if(!cands.length) return {pass:true};  // 起こらないが保険
    let pick;
    if(easy){ pick=cands[Math.floor(Math.random()*cands.length)]; }
    else{
      // 最小の数字・最小枚数から。ただし束（count>=3）は崩さず温存
      const singles=cands.filter(c=>c.count===1).sort((a,b)=>a.num-b.num);
      const small=cands.filter(c=>c.count<=2).sort((a,b)=>a.count-b.count||a.num-b.num);
      pick = (hard && singles.length) ? singles[0] : (small[0]||cands[0]);
    }
    return {start:pick.start, count:pick.count};
  }
  // 場がある：勝てる最小の役で受ける（強い役は温存）。勝てないならパス
  if(!cands.length) return {pass:true};
  // 残り手札が少ないなら強気に出し切りにいく
  const nearEnd = hand.length<=3;
  let pool=[...cands].sort((a,b)=> (a.count-b.count) || (a.num-b.num));
  let pick=pool[0];
  if(easy && Math.random()<0.4) pick=pool[Math.floor(Math.random()*pool.length)];
  // つよい：あがりに直結する出し（残り全部出せる）なら最優先
  if(hard || !easy){
    const finisher=cands.find(c=>c.count===hand.length);
    if(finisher) pick=finisher;
  }
  // ふつう/つよいは、場が弱い(1枚)のに大役を崩すのを避けてパスすることも
  if(!easy && !nearEnd && pick.count>=3 && field.count===1 && Math.random()<0.5) return {pass:true};
  return {start:pick.start, count:pick.count};
}

/* ================= ラウンド終了 ================= */
function endRound(){
  // 最下位がペナルティ（ペンギン-1）
  const last=finishOrder[finishOrder.length-1];
  players[last].pen = (players[last].pen||0); // 表示用
  // ペンギンは各自2個スタート、最下位が1個失う
  if(players[last]._peng===undefined) players.forEach(p=>p._peng=(p._peng??2));
  players[last]._peng--;
  players[last].pen = 2-players[last]._peng;

  const meRank=players[0].rank;
  const loser=players[last];
  const gameOver = loser._peng<=0;

  if(gameOver){
    over=true;
    // 勝者：ペンギンを失っていない人たち（＝最後まで生き残り）。ここでは最下位以外の生存
    const meLost = loser===players[0];
    saveRecord({t:Date.now(), n:N(), diff:diffLevel, win:!meLost, rank:meRank});
    showSheet({title: meLost?"😢 あなたの負け…":"🎉 あなたの勝ち！",
      body:`<b>${loser.name}</b> がペンギンを2個失って脱落。<br><br>
        今回の順位：${finishOrder.map((i,k)=>`${rankLabel(k+1)} ${players[i].name}`).join("<br>")}`,
      btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,"g"]]});
    return;
  }
  // 続行
  showSheet({title:`ラウンド終了`,
    body:`順位：${finishOrder.map((i,k)=>`${rankLabel(k+1)} ${players[i].name}`).join("<br>")}<br><br>
      <b>${loser.name}</b> がペンギンを1個失った（残り${loser._peng}個）<br>
      ペンギンを2個失うと脱落です。`,
    btns:[["次のラウンドへ",()=>newRound(last)]]});
}

/* ================= シート ================= */
function showSheet({title,body,btns}){
  $("stitle").textContent=title;
  $("sbody").innerHTML=body||"";
  $("sbtns").innerHTML="";
  for(const [label,fn,cls] of (btns||[])){
    const b=document.createElement("button");
    b.className="act"+(cls?" "+cls:""); b.textContent=label;
    b.onclick=()=>{ closeSheet(); fn&&fn(); };
    $("sbtns").appendChild(b);
  }
  $("veil").classList.add("show");
}
function closeSheet(){ $("veil").classList.remove("show"); }

/* ================= 履歴表示 ================= */
$("histBtn").onclick=async()=>{
  if($("veil").classList.contains("show")) return;
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",body:`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":"敗退"}`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br><span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[["閉じる",closeSheet,"g"],["履歴を全消去",()=>confirmClear(),"g"]]});
};

chooseSetup();
<\/script>

<div id="helpveil"><div id="helppanel">

</div></div>
<script>
(function(){
  var HTML=`<p class="hgoal"><b>目的</b>　手札をいち早く出し切る「大富豪」系のゲーム。最後まで残るとペンギンを失い、2個失うと脱落。最後まで生き残れば勝ちです。</p><h3>手札は並べ替えできない</h3><p>配られた手札は<b>並び順を変えられません</b>。この制約がこのゲームの肝です。<br>だから最初はバラバラで、大きな役が作れません。</p><h3>カードの出し方</h3><p>自分の番に、手札からカードを出します。<b>手札で隣り合っている同じ数字は、まとめて出せます</b>（例：3が3枚並んでいれば3枚出し）。<br>場に出ているカードより<b>強い役</b>しか出せません。出せない・出したくないときはパスします。</p><h3>役の強さ</h3><p><b>枚数が多いほど強い</b>（1が2枚 ＞ 7が1枚）。<br><b>同じ枚数なら、数字が大きいほど強い</b>（7が2枚 ＞ 3が2枚）。</p><h3>カードを回収して手札を育てる（重要）</h3><p>手札を強化する方法が2つあります。<br>①<b>カードを出したとき</b>：直前に場にあったカードを「手札に加える」か「捨てる」か選べます。<br>②<b>パスしたとき</b>：山札から1枚引き、「手札に加える」か「捨てる」か選べます。<br>加えるときは絵をタップして同じ数字の隣に差し込み、<b>大きな役を育てられます</b>。並べ替えできないぶん、これが手札を強化する手段です。</p><h3>場が流れる</h3><p>カードを出した人以外の全員がパスをして、再びその人の番が来たら、場のカードは全て捨てられ、その人から好きなカードを出せます。</p><h3>勝敗</h3><p>手札を出し切った人から順に「あがり」。最後まで残った人がペンギンを1個失います。<br>ペンギンを2個失うと脱落。生き残れば勝ちです。</p><h3>CPUについて</h3><p>つよいCPUは、場のカードを回収して手札を育て、大きな役は温存し、終盤に一気に出し切る動きをします。</p>`;

  document.getElementById("helpclose").onclick=close;
  veil.onclick=function(e){ if(e.target===veil) close(); };
  window.openHelp=open;
})();
<\/script>

<script>
"use strict";
/* ================= 履歴 ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="pengin-history";
const FPATH="pengin/history";
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig); fdb=firebase.database();
  }
}catch(e){}
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage;
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）" : (STORE ? "アプリ内ストレージ" : "この端末のみ");
/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      // push形式（キー付きオブジェクト）と旧配列形式の両方を読む
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }          // 通信失敗など：空履歴として扱わない
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;                       // 読めなかったときは上書きしない
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY,false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}
/* 全消去の確認（Firebase有効時は共有データである旨を明示） */
function confirmClear(){
  const shared = !!fdb;
  showSheet({title:"履歴を全消去しますか？",
    body: shared
      ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
      : `この端末に保存された対戦履歴をすべて削除します。`,
    btns:[["削除する", async()=>{ await clearHistory(); msg("対戦履歴を消去しました"); }],
          ["やめる", null, "g"]]});
}


/* ================= カード ================= */
/* 5色 × 各7枚 = 35枚（正規版準拠） */
const COLORS=["🐧","🐤","🐦","🦆","🦩"];         // 5色を絵文字で区別（色帯も付く）
const CNAME=["あか","あお","みどり","きいろ","むらさき"];
const NCOL=5, PER=7, TOTAL=NCOL*PER;
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
let fastFwd=false;
const sleep=ms=>new Promise(r=>setTimeout(r, fastFwd?0:ms));
const $=id=>document.getElementById(id);

/* ================= 状態 ================= */
const CPU_NAMES=["ペネ","コーロ","ロイ","ジェンツー","アデリー"];
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};
let players, pyramid, baseSize, turnIdx, diffLevel, over, busy, roundNo, maxRounds, startIdx;
let selCard=-1;
const N=()=>players.length;
const alive=()=>players.map((p,i)=>p.out?null:i).filter(i=>i!=null);

/* ピラミッド：pyramid[row] = 配列。row0=最下段(baseSize枚)、上に行くほど-1 */
function chooseSetup(){
  showSheet({title:"対戦人数を選択",body:"あなた + CPU で対戦します（2〜6人）<br>手札を出し切るゲーム。置けないとシャチチップ（失点）。",
    btns:[2,3,4,5,6].map(n=>[`${n}人（CPU×${n-1}）`,()=>chooseDiff(n-1)])});
}
function chooseDiff(nCpu){
  showSheet({title:"CPUの強さを選択",
    body:"やさしい：置ける場所に適当に置く<br>ふつう：自分の色を通しやすく置く<br>つよい：残り枚数を数え、相手の色を詰まらせる",
    btns:[["やさしい",()=>newGame(nCpu,"easy")],["ふつう",()=>newGame(nCpu,"normal")],["つよい",()=>newGame(nCpu,"hard")]]});
}
function newGame(nCpu,diff){
  diffLevel=diff; over=false;
  players=[{name:"あなた",cpu:false,hand:[],out:false,orca:0}];
  for(let i=0;i<nCpu;i++) players.push({name:CPU_NAMES[i],cpu:true,hand:[],out:false,orca:0});
  maxRounds=N();                 // 人数分のラウンド
  roundNo=0; startIdx=Math.floor(Math.random()*N());
  newRound();
}
function newRound(){
  roundNo++;
  fastFwd=false;
  // 2人:base7 / 5人:base7 / それ以外:base8（正規ルール）
  baseSize = (N()===2||N()===5) ? 7 : 8;
  const deck=shuffle([].concat(...COLORS.map((_,c)=>Array(PER).fill(c))));
  for(const p of players){ p.hand=[]; p.out=false; }
  // 均等配り（余りは先頭から）
  let idx=0;
  while(deck.length){ players[idx%N()].hand.push(deck.pop()); idx++; }
  for(const p of players) p.hand.sort((a,b)=>a-b);
  pyramid=[[]];                  // 最下段だけ用意
  turnIdx=startIdx; busy=false; selCard=-1;
  render();
  msg(`ラウンド${roundNo}／${maxRounds}　スタートは <span class="em">${players[turnIdx].name}</span>`);
  setTimeout(step, 1100);
}

/* ================= ピラミッド判定 ================= */
/* 置ける位置の一覧を返す：{row, col} の配列 */
function legalSpots(color){
  const spots=[];
  // 最下段（row0）：baseSize未満なら右端に追加可能。色は自由
  if(pyramid[0].length < baseSize){
    spots.push({row:0, col:pyramid[0].length});
  }
  // 上段：row>=1。col位置に置けるのは、下段の col と col+1 が埋まっていて、
  //       そのどちらかと同じ色のとき
  for(let r=1;r<baseSize;r++){
    const below=pyramid[r-1]||[];
    const cur=pyramid[r]||[];
    const width=baseSize-r;               // その段の最大枚数
    for(let col=0; col<width; col++){
      if(cur[col]!==undefined) continue;  // すでに埋まっている
      if(col!==cur.length) continue;       // 左詰め：次に置けるのは cur.length の位置のみ
      const l=below[col], rgt=below[col+1];
      if(l===undefined || rgt===undefined) continue;  // 真下の2枚が揃っていない
      if(color===l || color===rgt) spots.push({row:r, col});
    }
  }
  return spots;
}
function canPlaceAny(hand){
  for(const c of new Set(hand)) if(legalSpots(c).length) return true;
  return false;
}

/* ================= 描画 ================= */
function msg(h){ $("msg").innerHTML=h; }
function pengHTML(color, cls=""){ return `<div class="peng c${color} ${cls}">${COLORS[color]}</div>`; }
function render(){
  const orcaTxt=p=>p.orca>0?`🔴${p.orca}`:"";
  $("topinfo").textContent=`${N()}人 ・ CPU:${DIFF_LABEL[diffLevel]} ・ ラウンド${roundNo}/${maxRounds} ・ 最下段${baseSize}枚`;
  $("others").innerHTML=players.map((p,i)=>{
    if(i===0) return "";
    return `<div class="who${turnIdx===i&&!over?" active":""}${p.out?" out":""}">
      <div class="nm">🐧 ${p.name}</div>
      <div class="cnt">手札 ${p.hand.length}</div>
      ${p.out?`<div class="st">脱落</div>`:""}
      <div class="orca">シャチ ${p.orca}</div></div>`;
  }).join("");
  renderPyramid(null);
  const me=players[0];
  $("myhead").innerHTML=`🐧 あなた ・ 手札 ${me.hand.length} ・ シャチ ${me.orca}`;
  renderHand(!over && turnIdx===0 && !me.out && !busy);
}
function renderPyramid(spots){
  const rows=[];
  for(let r=baseSize-1; r>=0; r--){           // 上段から表示
    const width=baseSize-r;
    const cur=pyramid[r]||[];
    let cells="";
    for(let col=0; col<width; col++){
      if(cur[col]!==undefined){ cells+=pengHTML(cur[col]); }
      else{
        const spot = spots && spots.find(s=>s.row===r && s.col===col);
        if(spot){ cells+=`<div class="cell slot" data-row="${r}" data-col="${col}"></div>`; }
        else cells+=`<div class="cell empty"></div>`;
      }
    }
    rows.push(`<div class="prow">${cells}</div>`);
  }
  $("pyramid").innerHTML=rows.join("");
}
function renderHand(interactive){
  const me=players[0];
  const counts={};
  for(const c of me.hand) counts[c]=(counts[c]||0)+1;
  $("hand").innerHTML=COLORS.map((_,c)=>{
    if(!counts[c]) return "";
    const sel = selCard===c ? "sel" : "dim";
    return `<div class="peng handcard c${c} ${sel}" data-c="${c}">
      <span class="hc-icon">${COLORS[c]}</span>
      <span class="hc-count">${counts[c]}</span></div>`;
  }).join("") || `<div style="opacity:.5;font-size:.8rem;padding:10px">手札なし</div>`;
  if(interactive){
    $("hand").querySelectorAll(".handcard").forEach(el=>{
      el.onclick=()=>{ if(busy) return; selectCard(+el.dataset.c); };
    });
  }
}
function selectCard(c){
  selCard = selCard===c ? -1 : c;
  const spots = selCard>=0 ? legalSpots(selCard) : null;
  renderHand(true);
  renderPyramid(spots);
  if(selCard>=0){
    if(spots.length) msg(`${COLORS[selCard]}を置ける場所（金の枠）をタップ`);
    else msg(`<span class="bad">${COLORS[selCard]}は今どこにも置けません</span>。別の色を選んでください`);
    $("pyramid").querySelectorAll(".slot").forEach(el=>{
      el.onclick=()=>{ if(busy) return; humanPlace(+el.dataset.row, +el.dataset.col); };
    });
  }else{
    msg("カードを選んでください");
  }
}

/* ================= 手番 ================= */
function nextAlive(i){ let j=i, guard=0; do{ j=(j+1)%N(); guard++; }while(players[j].out && guard<=N()); return j; }

async function step(){
  if(over) return;
  render();
  const p=players[turnIdx];
  if(p.out){ advance(); return; }
  if(p.hand.length===0){ advance(); return; }     // 出し切り済みは飛ばす
  // 置けないカードしかない → 脱落
  if(!canPlaceAny(p.hand)){
    p.out=true;
    render();
    msg(`<span class="bad">${p.name} はどのカードも置けず脱落…</span>（手札${p.hand.length}枚）`);
    await sleep(1200);
    await maybeOfferSkip(turnIdx);
    advance(); return;
  }
  if(p.cpu){
    msg(`🤖 ${p.name} が考えています…`);
    await sleep(1200);
    const mv=cpuMove(turnIdx);
    if(!mv){                       // 合法手なし（保険）→ 脱落
      p.out=true; render();
      msg(`<span class="bad">${p.name} は置けず脱落…</span>`);
      await sleep(1000); advance(); return;
    }
    await doPlace(turnIdx, mv.color, mv.row, mv.col);
  }else{
    busy=false; selCard=-1;
    renderHand(true);
    $("controls").innerHTML="";
    msg("カードを選んでから、置ける場所をタップ");
  }
}
function humanPlace(row,col){
  if(busy || selCard<0) return;
  busy=true;
  const c=selCard; selCard=-1;
  doPlace(0, c, row, col);
}

async function doPlace(pi, color, row, col){
  const p=players[pi];
  p.hand.splice(p.hand.indexOf(color),1);
  if(!pyramid[row]) pyramid[row]=[];
  pyramid[row][col]=color;
  render();
  const pn = pi===0?`<span class="em">あなた</span>`:`🤖 ${p.name}`;
  msg(`${pn} は ${COLORS[color]} を ${row===0?"最下段":(row+1)+"段目"}に置いた`);
  // ポップ演出
  await sleep(700);
  // あがり判定
  if(p.hand.length===0){
    msg(`<span class="em">${pi===0?"あなた":p.name} が手札を出し切った！</span>`);
    await sleep(1100);
    await maybeOfferSkip(pi);
  }
  await afterMove(pi);
}

/* あなたが退場（脱落 or 出し切り）し、まだ勝負が続くなら結果まで飛ばすか提案 */
async function maybeOfferSkip(pi){
  if(pi!==0 || fastFwd) return;
  const stillPlaying = players.filter(p=>!p.out && p.hand.length>0);
  if(stillPlaying.length<1) return;              // もう決着済み
  // 自分以外にまだ打つ人がいる場合のみ
  if(stillPlaying.every(p=>p===players[0])) return;
  await new Promise(res=>{
    showSheet({title: players[0].out?"脱落…":"出し切った！",
      body:`このラウンドのあなたの出番は終わりです。<br>残りはCPU同士の勝負になります。`,
      btns:[["結果まで飛ばす",()=>{ fastFwd=true; res(); }],
            ["最後まで見る",()=>res()]]});
  });
}

async function afterMove(pi){
  // 全員が脱落 or 出し切ったら終了
  const stillPlaying = players.filter(p=>!p.out && p.hand.length>0);
  if(stillPlaying.length===0){ endRound(); return; }
  // ピラミッドが完成（最上段=1枚が埋まった）したらラウンド終了
  if(pyramid[baseSize-1] && pyramid[baseSize-1].length===1){
    msg(`ピラミッド完成！ ラウンド終了`);
    await sleep(1100);
    endRound(); return;
  }
  advance();
}
function advance(){
  if(over) return;
  const rem=players.filter(p=>!p.out && p.hand.length>0);
  if(rem.length===0){ endRound(); return; }
  turnIdx=nextAlive(turnIdx);
  // 出し切った人（out扱いではないが手札0）も飛ばす
  let guard=0;
  while(players[turnIdx].hand.length===0 && !players[turnIdx].out && guard<N()*2){ turnIdx=nextAlive(turnIdx); guard++; }
  setTimeout(step, fastFwd?0:500);
}

/* ================= CPU ================= */
/* 公開情報：ピラミッド＋自分の手札。まだ場に出ていない各色の枚数を数える */
function unseenByColor(pi){
  const cnt=Array(NCOL).fill(PER);
  for(const row of pyramid) for(const c of row) if(c!==undefined) cnt[c]--;
  for(const c of players[pi].hand) cnt[c]--;
  return cnt;   // 他人の手札にありうる枚数
}
/* まだピラミッドに積める色か（最下段にその色があるか、または最下段自体がまだ空きあり） */
function colorStillPlaceable(color){
  if(pyramid[0].length < baseSize) return true;    // 最下段に空きがあればどの色も置ける
  // 最下段が埋まっている場合、最下段にその色があれば上に伸ばせる可能性
  return pyramid[0].includes(color);
}
function cpuMove(pi){
  const p=players[pi], hand=p.hand;
  const easy=diffLevel==="easy", hard=diffLevel==="hard";
  const colors=[...new Set(hand)];
  // 各色について合法手を集める
  const moves=[];
  for(const c of colors){
    for(const s of legalSpots(c)) moves.push({color:c, row:s.row, col:s.col});
  }
  if(!moves.length) return null;   // 呼び出し側で脱落判定済み
  if(easy) return moves[Math.floor(Math.random()*moves.length)];

  const unseen=unseenByColor(pi);
  const myCount={};
  for(const c of hand) myCount[c]=(myCount[c]||0)+1;

  // 各手を評価
  let best=null, bs=-Infinity;
  for(const m of moves){
    let sc=0;
    // ① 自分が多く持つ色を最下段に置く → その色を上に伸ばせる土台を作る
    if(m.row===0){
      sc += (myCount[m.color]||0)*3;        // 手札に多い色ほど土台にしたい
      // 最下段の残り枠が少ないなら、通したい自分の色を今のうちに置く
      const baseLeft = baseSize - pyramid[0].length;
      if(baseLeft<=2) sc += (myCount[m.color]||0)*2;
    } else {
      // ② 上段に置く：自分の色を消化できるのは良い
      sc += (myCount[m.color]||0)*2 + m.row;  // 上に行くほど手札が減り上出来
    }
    // ③ 相手が持ちがちな色（＝場にまだ多く残る色）を最下段の端に置くと、相手が伸ばしにくい…
    //    逆に自分の色は端に置かない方が伸ばせる。ここは簡易に、自分の少ない色を土台にしない
    if(m.row===0 && (myCount[m.color]||0)===1 && !hard) sc -= 1;
    // ④ つよい：相手の色（unseenが多い＝他家が持つ可能性大）を最下段から締め出す
    if(hard && m.row===0){
      // 自分が持たない色ほど unseen が多い→それを土台に置くと相手を利する。避ける
      const rivalColor = unseen[m.color] - (myCount[m.color]||0);
      sc -= rivalColor*1.2;
    }
    sc += Math.random()* (hard?0.6:1.5);
    if(sc>bs){ bs=sc; best=m; }
  }
  return best;
}

/* ================= ラウンド終了 ================= */
function endRound(){
  // 手札に残った枚数分シャチチップ（失点）
  for(const p of players){ p.orca += p.hand.length; }
  render();
  const lines=players.map(p=>`${p.name}：+${p.hand.length}（累計 ${p.orca}）`).join("<br>");
  if(roundNo>=maxRounds){
    over=true;
    const min=Math.min(...players.map(p=>p.orca));
    const winners=players.filter(p=>p.orca===min).map(p=>p.name);
    const meWin=players[0].orca===min;
    saveRecord({t:Date.now(), n:N(), diff:diffLevel, win:meWin, orca:players[0].orca});
    showSheet({title: meWin?"🎉 あなたの勝ち！":"ゲーム終了",
      body:`最終シャチチップ（少ない方が勝ち）<br><br>${players.map(p=>`${p.name}：${p.orca}`).join("<br>")}<br><br>
        勝者：<b>${winners.join("、")}</b>`,
      btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,"g"]]});
    return;
  }
  startIdx=(startIdx+1)%N();      // スタートプレイヤーを次へ
  showSheet({title:`ラウンド${roundNo} 終了`,
    body:`手札の残り枚数がシャチチップ（失点）に：<br><br>${lines}`,
    btns:[["次のラウンドへ",()=>newRound()]]});
}

/* ================= シート ================= */
function showSheet({title,body,btns}){
  $("stitle").textContent=title;
  $("sbody").innerHTML=body||"";
  $("sbtns").innerHTML="";
  for(const [label,fn,cls] of (btns||[])){
    const b=document.createElement("button");
    b.className="act"+(cls?" "+cls:""); b.textContent=label;
    b.onclick=()=>{ closeSheet(); fn&&fn(); };
    $("sbtns").appendChild(b);
  }
  $("veil").classList.add("show");
}
function closeSheet(){ $("veil").classList.remove("show"); }

/* ================= 履歴 ================= */
$("histBtn").onclick=async()=>{
  if($("veil").classList.contains("show")) return;
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",body:`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":"敗退"}（シャチ${num(r.orca)}）`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br><span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[["閉じる",closeSheet,"g"],["履歴を全消去",()=>confirmClear(),"g"]]});
};

chooseSetup();
<\/script>

</div></div>
<script>
(function(){
  var HTML=`<p class="hgoal"><b>目的</b>　手札のペンギンをピラミッドに置いて、いち早く出し切るゲーム。置けずに残った手札がシャチチップ（失点）になります。人数分のラウンドを終えて、失点が最も少ない人の勝ちです。</p><h3>カード</h3><p>5色のペンギンが各7枚、全35枚。色だけが意味を持ちます。</p><h3>ピラミッドを積む</h3><p>手番に手札から1枚をピラミッドに置きます。<br><b>最下段</b>は好きな色を置けます（最大8枚、2人・5人時は7枚）。左から順に埋まります。</p><h3>上の段のルール（重要）</h3><p>上の段に置けるのは、<b>すぐ真下で隣り合う2枚のうち、どちらかと同じ色</b>のときだけです。<br>たとえば下が「赤・青」なら、その上には赤か青しか置けません。<br>土台にない色は、上に積むことができません。</p><h3>置けなくなったら脱落</h3><p>自分の番に、手札のどのカードも置けなくなったら<b>脱落</b>。残った手札の枚数分シャチチップ（失点）を受け取ります。</p><h3>勝敗</h3><p>全員が脱落するか、誰かが出し切るとラウンド終了。人数分のラウンドを行い、<b>シャチチップの合計が最も少ない人</b>の勝ちです。</p><h3>コツ</h3><p>「まだ積める色」「その色の残り枚数」「自分の手札」を見比べるゲームです。<br>自分が多く持つ色を土台に置いて上に伸ばせるようにし、逆に相手が持っていそうな色は土台から締め出すのが基本です。</p><h3>CPUについて</h3><p>つよいCPUは、まだ場に出ていない各色の枚数を数え、自分の色を通しやすく、相手の色を詰まらせるように置いてきます。</p>`;
  var veil=document.getElementById("helpveil");
  document.getElementById("helpbody").innerHTML=HTML;
  function open(){ veil.classList.add("show"); }
  function close(){ veil.classList.remove("show"); }
  document.getElementById("helpBtn").onclick=open;
  document.getElementById("helpclose").onclick=close;
  veil.onclick=function(e){ if(e.target===veil) close(); };
  window.openHelp=open;
})();
<\/script>


<script>
/* 親（ランチャー）からテーマ指定を受け取る。単体で開いたときはOSの設定に従う */
(function(){
  function apply(t){ document.documentElement.setAttribute("data-theme", t==="light"?"light":"dark"); }
  var t=null;
  try{ t = window.name && window.name.indexOf("theme:")===0 ? window.name.slice(6) : null; }catch(e){}
  if(!t){ try{ t = localStorage.getItem("bodoge-theme"); }catch(e){} }
  if(!t){ t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark"; }
  apply(t);
  window.addEventListener("message", function(ev){
    if(ev.data && ev.data.type==="theme") apply(ev.data.value);
  });
})();
<\/script>
