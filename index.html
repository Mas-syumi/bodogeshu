<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボドゲ集 — CPU対戦バンドル</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic",system-ui,sans-serif;
    background:radial-gradient(ellipse at 50% -10%, var(--lbgA), var(--lbgB) 70%);
    color:var(--ltxt); min-height:100%; user-select:none;
    display:flex; flex-direction:column;
  }
  /* ---------- launcher ---------- */
  #home{flex:1; display:flex; flex-direction:column; align-items:center; padding:26px 14px 30px; overflow-y:auto;}
  #home h1{
    font-size:1.5rem; letter-spacing:.3em; font-weight:800; text-align:center;
  }
  #home .tag{font-size:.68rem; letter-spacing:.2em; opacity:.5; margin-top:6px; text-align:center;}
  html[data-theme="light"] #home .tag{ opacity:1; color:rgba(20,32,42,.55); }
  #grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    width:100%; max-width:460px; margin-top:24px;
  }
  .tile{
    border-radius:16px; padding:16px 14px 14px; cursor:pointer; text-align:left;
    border:1.5px solid rgba(255,255,255,.16); position:relative; overflow:hidden;
    min-height:132px; display:flex; flex-direction:column;
    transition:transform .12s, border-color .12s;
  }
  .tile:hover{transform:translateY(-3px); border-color:rgba(255,255,255,.5);}
  .tile:active{transform:translateY(0);}
  .tile .ico{font-size:1.5rem; line-height:1;}
  .tile .nm{font-weight:800; font-size:1rem; margin-top:8px; letter-spacing:.05em;}
  .tile .en{font-size:.58rem; opacity:.55; letter-spacing:.12em; margin-top:1px;}
  .tile .ds{font-size:.66rem; opacity:.8; line-height:1.55; margin-top:8px;}
  .tile .pl{font-size:.6rem; opacity:.6; margin-top:auto; padding-top:8px;}
  .t-nimmt{background:linear-gradient(160deg,#276a51,#16382b);}
  .t-gems{background:linear-gradient(160deg,#4a3560,#1f1630);}
  .t-koi{background:linear-gradient(160deg,#7c3446,#2c1119);}
  .t-hannin{background:linear-gradient(160deg,#33405c,#141821);}
  .t-jackal{background:linear-gradient(160deg,#8a4a25,#33190c);}
  .t-goki{background:linear-gradient(160deg,#4a5a2c,#1b2112);}
  .t-kotori{background:linear-gradient(160deg,#2f5068,#111f2b);}
  .t-pengin{background:linear-gradient(160deg,#2a4a5e,#0f1e28);}
  /* ライトモード：タイルを淡い色にして濃い文字を載せる */
  html[data-theme="light"] .t-nimmt{background:linear-gradient(160deg,#c9e6d6,#a5d2ba);}
  html[data-theme="light"] .t-gems{background:linear-gradient(160deg,#ded2ec,#c3b2da);}
  html[data-theme="light"] .t-koi{background:linear-gradient(160deg,#f0cdd5,#dfa9b6);}
  html[data-theme="light"] .t-hannin{background:linear-gradient(160deg,#d2dcee,#b2c0da);}
  html[data-theme="light"] .t-jackal{background:linear-gradient(160deg,#f0d5bf,#dfb694);}
  html[data-theme="light"] .t-goki{background:linear-gradient(160deg,#d9e4c4,#bccf9c);}
  html[data-theme="light"] .t-kotori{background:linear-gradient(160deg,#cfe0ec,#aec8dc);}
  html[data-theme="light"] .t-pengin{background:linear-gradient(160deg,#cee2ec,#a9cadc);}
  html[data-theme="light"] .tile{ color:#22303a; border-color:rgba(0,0,0,.10); }
  html[data-theme="light"] .tile:hover{ border-color:rgba(0,0,0,.35); }
  html[data-theme="light"] .tile .en{ opacity:1; color:rgba(20,32,42,.55); }
  html[data-theme="light"] .tile .ds{ opacity:1; color:rgba(20,32,42,.85); }
  html[data-theme="light"] .tile .pl{ opacity:1; color:rgba(20,32,42,.62); }
  html[data-theme="light"] .howto{ background:rgba(255,255,255,.75); color:#22303a; border-color:rgba(0,0,0,.25); }
  .howto{
    position:absolute; right:10px; bottom:10px;
    font:inherit; font-size:.6rem; font-weight:800; padding:3px 9px; border-radius:999px;
    border:1px solid rgba(255,255,255,.4); background:rgba(0,0,0,.25); color:#f0ecdf; cursor:pointer;
  }
  .howto:hover{background:rgba(255,255,255,.18);}
  #helpveil{position:fixed; inset:0; background:rgba(6,8,12,.9); z-index:200; display:none;
    align-items:center; justify-content:center; padding:14px;}
  #helpveil.show{display:flex;}
  #helppanel{background:#20242e; border:2px solid rgba(255,255,255,.25); border-radius:16px;
    max-width:520px; width:100%; max-height:88vh; display:flex; flex-direction:column;}
  #helphead{display:flex; align-items:center; gap:10px; padding:14px 16px 10px;
    border-bottom:1px solid rgba(255,255,255,.14);}
  #helphead h2{font-size:1rem; font-weight:800; letter-spacing:.06em;}
  #helpbody{padding:12px 16px 16px; overflow-y:auto; text-align:left; font-size:.78rem; line-height:1.85;}
  #helpbody h3{font-size:.8rem; font-weight:800; margin:14px 0 3px; color:#e8c46a; letter-spacing:.04em;}
  #helpbody h3:first-of-type{margin-top:4px;}
  #helpbody .hgoal{background:rgba(255,255,255,.08); border-radius:8px; padding:8px 10px; margin-bottom:6px;}
  #helpclose{margin-left:auto; font:inherit; font-weight:800; font-size:.7rem; padding:5px 14px;
    border-radius:999px; border:1.5px solid rgba(255,255,255,.4); background:transparent; color:#f0ecdf; cursor:pointer;}
  #note{margin-top:24px; display:flex; gap:10px; align-items:center; justify-content:center;}
  #note button, #note a{
    font:inherit; font-size:.66rem; font-weight:800; padding:6px 16px; border-radius:999px;
    border:1.5px solid rgba(255,255,255,.28); background:transparent; color:#f0ecdf;
    cursor:pointer; text-decoration:none; opacity:.75;
  }
  #note button:hover, #note a:hover{opacity:1; border-color:rgba(255,255,255,.55);}

  /* ---------- game view ---------- */
  #view{display:none; flex-direction:column; height:100%;}
  #view.on{display:flex;}
  #home.off{display:none;}
  #bar{
    display:flex; align-items:center; gap:10px; padding:8px 12px;
    background:rgba(0,0,0,.45); border-bottom:1px solid rgba(255,255,255,.12);
    flex:0 0 auto;
  }
  #back{
    font:inherit; font-size:.72rem; font-weight:800; padding:6px 14px; border-radius:999px;
    border:1.5px solid rgba(255,255,255,.35); background:transparent; color:#f0ecdf; cursor:pointer;
  }
  #barname{font-size:.78rem; font-weight:800; letter-spacing:.08em; opacity:.85;}
  #frame{flex:1; width:100%; border:none; background:transparent;}

  /* ===== テーマ ===== */
  :root{ --lbgA:#2a2f42; --lbgB:#12141d; --ltxt:#f0ecdf;
         --tile-bd:rgba(255,255,255,.10); --foot-bd:rgba(255,255,255,.28); }
  html[data-theme="light"]{
    --lbgA:#eef1f7; --lbgB:#dce1ec; --ltxt:#26313a;
    --tile-bd:rgba(0,0,0,.12); --foot-bd:rgba(0,0,0,.28);
  }
  html[data-theme="light"] #helpveil{ background:rgba(240,238,230,.9); }
  html[data-theme="light"] #helppanel{ background:#f7f4ec; color:#26313a; border-color:rgba(0,0,0,.2); }
  html[data-theme="light"] #helpbody{ color:#26313a; }
  html[data-theme="light"] #helpbody .hgoal{ background:rgba(0,0,0,.06); }
  html[data-theme="light"] #helpclose{ color:#26313a; border-color:rgba(0,0,0,.3); }
  html[data-theme="light"] #note button, html[data-theme="light"] #note a{ color:#26313a; border-color:var(--foot-bd); }
  html[data-theme="light"] #topbar{ background:rgba(255,255,255,.8); border-bottom-color:rgba(0,0,0,.12); }
  html[data-theme="light"] #back, html[data-theme="light"] #gname{ color:#26313a; }
  html[data-theme="light"] .howto{ background:rgba(0,0,0,.18); }

</style>
</head>
<body>
  <div id="home">
    <h1>ボドゲ集</h1>
    <div class="tag">CPU対戦バンドル</div>
    <div id="grid"></div>
    <div id="note">
      <button id="themeBtn">🌙 ダーク</button>
      <button id="aboutBtn">このサイトについて</button>
      <a href="https://github.com/Mas-syumi/bodogeshu" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>

  <div id="helpveil"><div id="helppanel">
    <div id="helphead"><h2 id="helptitle"></h2><button id="helpclose">閉じる</button></div>
    <div id="helpbody"></div>
  </div></div>

  <div id="view">
    <div id="bar">
      <button id="back">← ゲーム選択</button>
      <span id="barname"></span>
    </div>
    <iframe id="frame" title="game"></iframe>
  </div>

<script>
"use strict";
const GAMES=[
  {id:"nimmt", cls:"t-nimmt", ico:"🐮", nm:"うしのむれ", en:"THE HERD",
   ds:"104枚のカードを4列に並べる。6枚目を置いた人が牛マークを引き取る、押し付け合いのゲーム。", pl:"3〜6人 ・ 難易度3段階"},
  {id:"gems", cls:"t-gems", ico:"💎", nm:"宝石商", en:"GEM MERCHANT",
   ds:"宝石を集めて発展カードを買い、ボーナスを雪だるま式に増やす。15点で決着。", pl:"2〜4人 ・ 難易度3段階"},
  {id:"koibumi", cls:"t-koi", ico:"💌", nm:"恋文", en:"LAST LETTER",
   ds:"手札は常に1枚。捨て札と推理で、相手の姫を暴き出す短期決戦。", pl:"2〜4人 ・ 難易度3段階"},
  {id:"hannin", cls:"t-hannin", ico:"🕵️", nm:"踊る容疑者", en:"DANCING SUSPECTS",
   ds:"犯人カードは手から手へ。探偵で暴くか、いぬで嗅ぎ当てるか、逃げ切るか。", pl:"3〜8人 ・ 難易度3段階"},
  {id:"jackal", cls:"t-jackal", ico:"🐺", nm:"ジャッカル", en:"JACKAL",
   ds:"自分のカードだけ見えない。全員の合計を推理して数を釣り上げるチキンレース。", pl:"3〜6人 ・ 難易度3段階"},
  {id:"gokipoker", cls:"t-goki", ico:"🪳", nm:"むしポーカー", en:"BUG BLUFF",
   ds:"「これはカエルです」…嘘か本当か。嫌われ者を押し付け合う、純粋なブラフ勝負。", pl:"2〜6人 ・ 難易度3段階"},
  {id:"kotori", cls:"t-kotori", ico:"🐦", nm:"ことりならべ", en:"NEXT大富豪",
   ds:"手札は並べ替えできない。場のカードを回収して役を育て、一気に出し切る大富豪系。", pl:"3〜6人 ・ 難易度3段階"},
  {id:"pengin", cls:"t-pengin", ico:"🐧", nm:"ぺんぎんの山", en:"PENGUIN PYRAMID",
   ds:"5色のペンギンをピラミッドに積む。土台にない色は上に積めない。出し切れずに残すと失点。", pl:"2〜6人 ・ 難易度3段階"},
];
const $=id=>document.getElementById(id);

$("grid").innerHTML=GAMES.map(g=>`
  <div class="tile ${g.cls}" data-id="${g.id}">
    <span class="ico">${g.ico}</span>
    <span class="nm">${g.nm}</span>
    <span class="en">${g.en}</span>
    <span class="ds">${g.ds}</span>
    <span class="pl">${g.pl}</span>
    <button class="howto" data-help="${g.id}">遊び方 ›</button>
  </div>`).join("");

document.querySelectorAll(".tile").forEach(el=>{
  el.onclick=()=>open_(el.dataset.id);
});
document.querySelectorAll(".howto").forEach(el=>{
  el.onclick=e=>{ e.stopPropagation(); showHelp(el.dataset.help); };
});

const RULES={"nimmt": {"title": "うしのむれ", "html": "<p class=\"hgoal\"><b>目的</b>　牛マーク（🐮）を最も少なく引き取った人の勝ち。誰かが66🐮に達したラウンドで終了です。</p><h3>カード</h3><p>1〜104の数字カード。数字ごとに牛マークの数が違います。<br><b>5の倍数＝🐮2</b> ／ <b>10の倍数＝🐮3</b> ／ <b>11の倍数＝🐮5</b> ／ <b>55＝🐮7</b> ／ それ以外＝🐮1<br>牛マークがそのまま失点です。キリのいい数字ほど危険。</p><h3>流れ</h3><p>場に4つの列があります。全員が手札から1枚を<b>同時に</b>選び、小さい数字の人から順に置いていきます。<br>置く列は選べません。<b>自分の数字より小さく、かつ最も近い数字が末尾にある列</b>に自動的に置かれます。</p><h3>引き取り</h3><p>列は5枚まで。<b>6枚目を置くことになった人が、その列の5枚をすべて引き取ります</b>（＝失点）。<br>引き取ったあと、その列は自分のカード1枚だけになります。</p><h3>どの列にも置けないとき</h3><p>自分のカードが<b>どの列の末尾よりも小さい</b>場合、好きな列を1つ選んで引き取ります。<br>手札に小さい数字を抱え込んでいると、これを強いられます。</p><h3>コツ</h3><p>列が4〜5枚まで伸びていると、次に置いた人が引き取る危険があります。<br>「安い列をわざと引き取って、場をリセットする」のも立派な戦術です。<br>全員同時出しなので、<b>他の人がどの数字を出しそうか</b>を読むゲームです。</p><h3>上級（プロ）ルール</h3><p>ゲーム開始時に選べます。<br>通常は、カードは「末尾が自分より小さく、差が最も近い列」に置かれます。<br><b>プロルールでは、列の先頭（左端）にも置けるようになります</b>。カードより先頭が大きい列なら、その手前に入れられます。<br>置き場所は<b>末尾・先頭を問わず、数値差が最小の場所に自動で決まります</b>（若い数字の人から順に処理）。前置きでその列が<b>6枚目</b>になった人は、通常どおり引き取りです。<br>小さいカードにも置き場所が生まれるぶん、駆け引きが深くなる上級者向けルールです。</p><h3>CPUについて</h3><p>つよいCPUは、まだ場に出ていない札から相手の手札を推定し（決定化サンプリング）、そこからラウンド終了までを何百回もシミュレーションして、失点の期待値が最小になる札を選びます。<br>すべての可能性を読み切る完全探索ではなく、シミュレーションによる<b>近似</b>です。それでも、単純に「安全そうな列」を選ぶだけのCPU（＝ふつう）と対戦させると、平均失点は 13.2 → 7.6、勝率は 25%（4人戦の基準値）→ 46.7% になります。</p>"}, "gems": {"title": "宝石商", "html": "<p class=\"hgoal\"><b>目的</b>　発展カードで得点を集め、先に15点へ。全員の手番数が揃った時点で集計し、同点ならカード枚数が少ない方の勝ちです。</p><h3>手番でできること（3つのうち1つ）</h3><p><b>① 宝石を取る</b>：違う色を3枚 ／ または同じ色を2枚（山に4枚以上残っている場合のみ）<br><b>② カードを買う</b>：コストを支払って発展カードを購入<br><b>③ カードを確保する</b>：1枚を手元にキープし、金を1枚もらう（最大3枚）</p><h3>ボーナスが雪だるま式に効く</h3><p>買った発展カードは<b>永続の割引</b>になります。白のカードを2枚持っていれば、以後どのカードも白のコストが2つ安くなります。<br>序盤は安いカードでボーナスを増やし、終盤に高得点カードを買うのが基本です。</p><h3>宝石は10枚まで</h3><p>手持ちの宝石が10枚を超えたら超過分を捨てます。取りすぎに注意。</p><h3>貴族</h3><p>上部の貴族タイルは、指定された色のボーナス数を満たすと<b>自動的に訪問し+3点</b>。色を意図的に偏らせる価値があります。</p><h3>金（ワイルド）</h3><p>確保でもらえる金は、どの色の代わりにも使えます。高額カードを買う切り札です。</p><h3>手番順と操作</h3><p>画面上部に<b>手番順</b>が表示されます（金枠が現在の手番）。先手はランダムに決まり、以降その順で時計回りに回ります。<br>宝石をタップして選び「宝石を取る」。同じ宝石を<b>2回タップ</b>で同色2枚になります。金枠のカードは今すぐ買えるカードです。</p><h3>CPUについて</h3><p>つよいCPUは、あなたがあと少しで買えそうな高得点カードを「確保」で横取りしてきます。狙いのカードは早めに押さえましょう。</p>"}, "koibumi": {"title": "恋文", "html": "<p class=\"hgoal\"><b>目的</b>　最後まで生き残るか、山札が尽きたとき最も強いカードを持っていればトークンを1個獲得。<b>先に3個</b>集めた人の勝ちです（第2版の正規ルール）。</p><h3>基本の流れ</h3><p>手札は常に<b>1枚</b>。自分の番に1枚引いて2枚になり、<b>どちらかを場に出して効果を使います</b>。脱落するとそのラウンドは終わりです。</p><h3>カード（数字が大きいほど強い）</h3><p><b>8 姫</b>：捨てたら即脱落。抱え続けるしかない爆弾<br><b>7 伯爵夫人</b>：王か王子と一緒に持っていたら必ずこちらを捨てる<br><b>6 王</b>：相手と手札を交換<br><b>5 王子</b>：誰か1人（自分も可）の手札を捨てさせ引き直させる。姫を捨てさせれば脱落<br><b>4 侍女</b>：次の自分の番まで効果の対象にならない<br><b>3 男爵</b>：相手と手札を比べ、小さい方が脱落<br><b>2 僧侶</b>：相手の手札をこっそり見る<br><b>1 兵士</b>：相手を指名して手札を推理（兵士以外）。的中で脱落させられる</p><h3>情報が命</h3><p>僧侶で見た手札は、その相手の欄に表示され続けます（手札が変わるまで）。<br>捨て札は全員分ずっと見えているので、<b>残りカードを数えれば</b>兵士の推理精度が上がります。<br>ヘッダーの<b>「内訳」</b>ボタンで、16枚の構成と残り枚数がいつでも確認できます。</p><h3>山札が尽きたら</h3><p>生き残った人が手札を公開し、最も強いカードの人が勝ち。同値なら捨て札の合計で比較します。</p><h3>CPUについて</h3><p>つよいCPUは、捨て札から残りカードを数えて兵士の推理を確率計算し、僧侶や王で得た情報を最後まで覚えています。</p>"}, "hannin": {"title": "踊る容疑者", "html": "<p class=\"hgoal\"><b>目的</b>　犯人カードの持ち主を暴けば探偵側の勝ち。犯人が最後の1枚として犯人カードを出せたら犯人の勝ちです。</p><h3>まず知っておくこと</h3><p><b>犯人は固定されていません。</b>犯人カードは取り引き・うわさ・情報操作で人から人へ移ります。<br>いま持っている人が犯人。さっきまで犯人だった人が今は無関係、ということも普通に起こります。</p><h3>勝ち方は3つ</h3><p><b>① 探偵</b>で犯人カードの持ち主を指名して当てる<br><b>② いぬ</b>で相手の手札から犯人カードを引き当てる<br><b>③ 犯人カードを、手札が最後の1枚になったときに出す</b>（逃げ切り）</p><h3>重要：アリバイ</h3><p>犯人カードを持っていても、<b>アリバイを一緒に持っていれば探偵に指名されても「いいえ」と言えます</b>。<br>逆に、アリバイを持たない犯人は探偵に怯えることになります。</p><h3>主なカード</h3><p><b>探偵</b>：1人を指名（最初の一巡では使用不可） ／ <b>いぬ</b>：1人の手札からランダムに1枚<br><b>目撃者</b>：1人の手札を全部見る ／ <b>少年</b>：いま犯人カードを持つ人を自分だけが知る<br><b>取り引き</b>：1人と1枚ずつ裏向きで交換 ／ <b>うわさ</b>：全員が右隣からランダムに1枚<br><b>情報操作</b>：全員が1枚選んで左隣へ ／ <b>たくらみ</b>：以後、犯人と運命共同体<br><b>アリバイ</b>：持つ限り探偵を否認できる ／ <b>一般人</b>：何も起こらない</p><h3>たくらみの罠</h3><p>たくらみを出した人は犯人の味方です。<b>たくらみ済の人が探偵で犯人を当てても、道連れで負けます</b>。</p><h3>画面の見方</h3><p>上部の<b>円</b>が席順です。あなたは常に下、手番は<b>時計回り</b>に進みます。<br>「うわさ」は<b>右隣（前の手番の人）</b>から引き、「情報操作」は<b>左隣（次の手番の人）</b>へ渡します。<br>あなたが得た情報（見た手札、少年情報、受け取った札、犯人カードが自分に来た警告）は、手札の上のメモ欄に残ります。</p><h3>CPUについて</h3><p>つよいCPUは、犯人カードを渡した相手を記憶し、うわさや取り引きで動くたびに容疑者を広げ、探偵の空振りで絞り込みます。</p>"}, "jackal": {"title": "ジャッカル", "html": "<p class=\"hgoal\"><b>目的</b>　自分のカードだけが見えない状態で「全員の合計以下」の数を宣言し続けるチキンレース。ライフを3回失うと脱落、最後まで残れば勝ちです。</p><h3>自分のカードだけ見えない</h3><p>全員が1枚ずつカードを引き、<b>自分だけ見えないように額に掲げます</b>。<br>他の人のカードは全部見えるので、<b>見えている合計＋自分の未知の1枚</b>を推理することになります。</p><h3>流れ</h3><p>手番の人は、全員の合計以下だと思う数を宣言します。次の人は<b>それより大きい数を宣言</b>するか、「ジャッカル！」と疑うかを選びます。</p><h3>「ジャッカル！」で疑う</h3><p>直前の宣言が合計を<b>超えている</b>と思ったら宣言します。全員がカードを公開して答え合わせ。<br>宣言 > 合計 なら<b>宣言した人</b>がライフを失い、宣言 ≦ 合計 なら<b>疑った人</b>がライフを失います。</p><h3>カード構成（36枚）</h3><p>1〜5が各4枚 ／ 0・10が各3枚 ／ -5・15が各2枚 ／ -10・20が各1枚<br>特殊カードが各1枚：<b>×2</b>（合計を2倍） ／ <b>MAX→0</b>（最大の数字を0にする） ／ <b>夜0</b>（0として扱い、次から山札を作り直す） ／ <b>?</b>（公開時に山札から1枚追加）</p><h3>コツ</h3><p>使ったカードは捨て札に残り、画面下でいつでも見られます。<b>20や-10が既に出ているか</b>を数えれば、自分のカードの見当がつきます。<br>ヘッダーの<b>「内訳」</b>ボタンで、36枚の構成と、どれが既に出たかを一覧できます。<br>また、みんなが妙に高い数を言うなら、あなたが大きい数字を持っている可能性が高いです。</p><h3>CPUについて</h3><p>つよいCPUは捨て札を数え、自分のカードの確率分布から合計の期待値を計算します。時々つり上げのブラフも打ってきます。</p>"}, "gokipoker": {"title": "むしポーカー", "html": "<p class=\"hgoal\"><b>目的</b>　「一人負け」を決めるゲーム。同じ生き物を4枚（2人戦は5枚）引き取るか、8種類すべて引き取るか、手札が尽きて出せなくなった人の負けです。</p><h3>流れ</h3><p>手番の人は手札から1枚を裏向きで誰かに渡し、<b>「これは○○です」と宣言</b>します。<b>本当でも嘘でもOK</b>。</p><h3>受け取った人の選択肢</h3><p><b>①「本当だ」または「嘘だ」と答える</b> → カードを公開。<br>　当てられたら<b>渡した人</b>が引き取り、外したら<b>自分</b>が引き取ります。<br><b>② 覗いて回す</b> → 自分だけカードを確認し、まだ見ていない人に回します。宣言は変えてもOK。<br>　ただし<b>全員が見てしまったら、最後の人は必ず答えなければなりません</b>。</p><h3>引き取ったら</h3><p>そのカードは表向きで自分の前に置かれ、全員に見えます。引き取った人が次の親になります。</p><h3>数えることが最大のコツ</h3><p>各生き物は8枚ずつしかありません。<b>場に見えている枚数＋自分の手札の枚数</b>を数えて、残りが0なら、その宣言は<b>確実に嘘</b>です。<br>ヘッダーの<b>「内訳」</b>ボタンを押すと、この計算を自動でやってくれます。</p><h3>押し付け合いの読み合い</h3><p>相手が3枚集めている生き物を、<b>本当のことを言って</b>渡すのが強力です。相手は怖くて「嘘だ」と言いたくなり、外して引き取ってしまいます。</p><h3>CPUについて</h3><p>つよいCPUは残り枚数を数えて確実な嘘を見抜き、あなたが3枚集めている生き物を狙って押し付けてきます。</p>"}, "kotori": {"title": "ことりならべ", "html": "<p class=\"hgoal\"><b>目的</b>　手札をいち早く出し切る「大富豪」系のゲーム。最後まで残るとペンギンを失い、2個失うと脱落。最後まで生き残れば勝ちです。</p><h3>手札は並べ替えできない</h3><p>配られた手札は<b>並び順を変えられません</b>。この制約がこのゲームの肝です。<br>だから最初はバラバラで、大きな役が作れません。</p><h3>カードの出し方</h3><p>自分の番に、手札からカードを出します。<b>手札で隣り合っている同じ数字は、まとめて出せます</b>（例：3が3枚並んでいれば3枚出し）。<br>場に出ているカードより<b>強い役</b>しか出せません。出せない・出したくないときはパスします。</p><h3>役の強さ</h3><p><b>枚数が多いほど強い</b>（1が2枚 ＞ 7が1枚）。<br><b>同じ枚数なら、数字が大きいほど強い</b>（7が2枚 ＞ 3が2枚）。</p><h3>カードを回収して手札を育てる（重要）</h3><p>手札を強化する方法が2つあります。<br>①<b>カードを出したとき</b>：直前に場にあったカードを「手札に加える」か「捨てる」か選べます。<br>②<b>パスしたとき</b>：山札から1枚引き、「手札に加える」か「捨てる」か選べます。<br>加えるときは絵をタップして同じ数字の隣に差し込み、<b>大きな役を育てられます</b>。並べ替えできないぶん、これが手札を強化する手段です。</p><h3>場が流れる</h3><p>カードを出した人以外の全員がパスをして、再びその人の番が来たら、場のカードは全て捨てられ、その人から好きなカードを出せます。</p><h3>勝敗</h3><p>手札を出し切った人から順に「あがり」。最後まで残った人がペンギンを1個失います。<br>ペンギンを2個失うと脱落。生き残れば勝ちです。</p><h3>CPUについて</h3><p>つよいCPUは、場のカードを回収して手札を育て、大きな役は温存し、終盤に一気に出し切る動きをします。</p>"}, "pengin": {"title": "ぺんぎんの山", "html": "<p class=\"hgoal\"><b>目的</b>　手札のペンギンをピラミッドに置いて、いち早く出し切るゲーム。置けずに残った手札がシャチチップ（失点）になります。人数分のラウンドを終えて、失点が最も少ない人の勝ちです。</p><h3>カード</h3><p>5色のペンギンが各7枚、全35枚。色だけが意味を持ちます。</p><h3>ピラミッドを積む</h3><p>手番に手札から1枚をピラミッドに置きます。<br><b>最下段</b>は好きな色を置けます（最大8枚、2人・5人時は7枚）。左から順に埋まります。</p><h3>上の段のルール（重要）</h3><p>上の段に置けるのは、<b>すぐ真下で隣り合う2枚のうち、どちらかと同じ色</b>のときだけです。<br>たとえば下が「赤・青」なら、その上には赤か青しか置けません。<br>土台にない色は、上に積むことができません。</p><h3>置けなくなったら脱落</h3><p>自分の番に、手札のどのカードも置けなくなったら<b>脱落</b>。残った手札の枚数分シャチチップ（失点）を受け取ります。</p><h3>勝敗</h3><p>全員が脱落するか、誰かが出し切るとラウンド終了。人数分のラウンドを行い、<b>シャチチップの合計が最も少ない人</b>の勝ちです。</p><h3>コツ</h3><p>「まだ積める色」「その色の残り枚数」「自分の手札」を見比べるゲームです。<br>自分が多く持つ色を土台に置いて上に伸ばせるようにし、逆に相手が持っていそうな色は土台から締め出すのが基本です。</p><h3>CPUについて</h3><p>つよいCPUは、まだ場に出ていない各色の枚数を数え、自分の色を通しやすく、相手の色を詰まらせるように置いてきます。</p>"}};
function showHelp(id){
  const r=RULES[id];
  document.getElementById("helptitle").textContent=r.title+" — 遊び方";
  document.getElementById("helpbody").innerHTML=r.html;
  document.getElementById("helpbody").scrollTop=0;
  document.getElementById("helpveil").classList.add("show");
}

/* ===== テーマ切り替え ===== */
function currentTheme(){
  try{ const t=localStorage.getItem("bodoge-theme"); if(t) return t; }catch(e){}
  return (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
}
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  const b=document.getElementById("themeBtn");
  if(b) b.textContent = t==="light" ? "☀️ ライト" : "🌙 ダーク";
  try{ localStorage.setItem("bodoge-theme", t); }catch(e){}
  // 開いているゲーム（iframe）にも伝える
  const fr=document.querySelector("#view iframe");
  if(fr && fr.contentWindow){ try{ fr.contentWindow.postMessage({type:"theme", value:t}, "*"); }catch(e){} }
}
applyTheme(currentTheme());
document.getElementById("themeBtn").onclick=()=>{
  applyTheme(document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light");
};

document.getElementById("aboutBtn").onclick=()=>{

  document.getElementById("helpbody").scrollTop=0;
  document.getElementById("helpveil").classList.add("show");
};
const ABOUT=`
<h3>ボドゲ集</h3>
<p>ブラウザで遊べる、CPU対戦カードゲーム集です。全6作品を収録しています。<br>
すべてのゲームに難易度3段階（やさしい / ふつう / つよい）、遊び方の説明、対戦履歴があります。</p>

<h3>CPUについて</h3>
<p>難易度「つよい」は、それぞれ本気で作ってあります。</p>
<p><b>うしのむれ</b> — まだ場に出ていない札から相手の手札を推定（決定化サンプリング）し、そこからラウンド終了までを何百回もプレイアウトして、失点の期待値が最小になる札を選びます。すべてを読み切る完全探索ではなく、シミュレーションによる<b>近似</b>です。<br>
ヘッドレスで自動対戦させた実測値は、単純なヒューリスティックCPU（＝ふつう）相手に<b>平均失点 7.6 vs 14.1、勝率 46.7%</b>（4人戦の基準値は25%）。<br>
なお「1トリック先だけを評価するMC」も比較しましたが、そちらは平均失点12.8とほぼ改善しませんでした。<b>ラウンド終了まで回すこと</b>が強さの本体です。</p>
<p><b>ジャッカル / むしポーカー</b> — 捨て札や場札から残り枚数を数え、確率を計算します。むしポーカーのCPUは、あなたがあと1枚で負ける生き物を「本当のことを言って」押し付けてきます。</p>
<p><b>踊る容疑者</b> — 犯人カードの受け渡しを追跡し、隠れた交換が起きるたびに容疑者を広げ、探偵の空振りで絞り込みます。</p>

<h3>対戦履歴について</h3>
<p>履歴はゲームごとに保存されます。既定ではブラウザのローカル保存のため、<b>端末をまたぐと別々の記録</b>になります。<br>
Firebase Realtime Database を設定すると、全端末で共有できます（各ゲームの履歴画面に「保存先」が表示されます）。</p>

<h3>技術メモ</h3>
<p>依存ライブラリなし・ビルド不要。1ファイルにすべて同梱しています。<br>
ランチャーは各ゲームを iframe（srcdoc）で読み込みます。</p>

<h3>免責</h3>
<p>既存のボードゲームに着想を得て、ルール（アイデア）を参考に<b>ゼロから実装したオリジナルの個人制作物</b>です。
グラフィック・テキスト・コードはすべて自作で、元のゲームのアートワークやルールブック等は一切使用していません。<br>
各ゲームのデザイナー、パブリッシャー、公式製品とは一切関係がありません。学習・個人利用が目的で、商用利用はしていません。<br>
権利者の方でご懸念がある場合は、GitHub の Issue にてご連絡ください。速やかに対応します。</p>
`;
document.getElementById("helpclose").onclick=()=>document.getElementById("helpveil").classList.remove("show");

function open_(id){
  const g=GAMES.find(x=>x.id===id);

  fr.onload=()=>{

<!-- Firebase（GitHub Pagesに置いて他端末と履歴を同期する場合に使用。未設定・読込失敗でも動きます） -->

<script>
"use strict";
/* ================= 対戦履歴（保存先3段構え） =================
   1) Firebase設定あり → Realtime Database（全端末で共有）
   2) Claude内で開いている → アプリ内ストレージ
   3) それ以外の通常ブラウザ → この端末のlocalStorage        */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="nimmt-history";
const FPATH="nimmt/history";       // 宝石商は gems/history なので混ざりません
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig);
    fdb=firebase.database();
  }
}catch(e){ console.warn("firebase init failed",e); }
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage; // バンドル内iframeから親のストレージを借りる
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）"
  : (STORE ? "アプリ内ストレージ" : "この端末のみ");

/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY, false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}

// ================= data =================
const heads = n => n===55 ? 7 : n%11===0 ? 5 : n%10===0 ? 3 : n%5===0 ? 2 : 1;
const hClass = n => { const h=heads(n); return h===1?"":"h"+h; };
const bulls = n => "🐮".repeat(heads(n));
const sleep = ms => new Promise(r=>setTimeout(r,ms));

const CPU_NAMES=["モー吉","ベコ美","ウシ王","カウ子","ホル斉藤","ギュー太"];
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};
let P=[];
let hands, rows, totals, roundPts, roundNo, turnNo, picks, seen;
let diffLevel="normal", MC_SIMS=400, proRule=false;
let selIdx = -1, resolvingChoice = null;

// ================= dom =================
const $ = id => document.getElementById(id);
const scoresEl=$("scores"), rowsEl=$("rows"), handEl=$("hand"),
      msgEl=$("msg"), confirmBtn=$("confirm"), statusEl=$("status"),
      overlay=$("overlay"), ptitle=$("ptitle"), plines=$("plines"), pbtn=$("pbtn"),
      pbtn2=$("pbtn2"), panelEl=$("panel");

function cardHTML(n, extra=""){
  return `<div class="card ${hClass(n)} ${extra}"><span class="n">${n}</span><span class="hd">${bulls(n)}</span></div>`;
}

function renderScores(revealed){
  scoresEl.style.gridTemplateColumns=`repeat(${Math.min(P.length,4)},1fr)`;
  scoresEl.innerHTML = P.map((p,i)=>{
    let pick = "";
    if(picks && picks[i]!=null){
      pick = revealed
        ? `<div class="pick face card ${hClass(picks[i])}" style="width:34px">${picks[i]}</div>`
        : `<div class="pick back">?</div>`;
    } else {
      pick = `<div class="pick"></div>`;
    }
    return `<div class="pl${(!p.cpu&&picks&&picks[0]==null)?" active":""}">
      <div class="nm">${p.name}</div>
      <div class="tt">${totals[i]+roundPts[i]}<small> 🐮</small></div>
      <div class="rd">今R +${roundPts[i]}</div>
      ${pick}
    </div>`;
  }).join("");
}

function renderRows(){
  rowsEl.innerHTML = rows.map((row,ri)=>{
    const slots=[];
    for(let s=0;s<6;s++){
      if(s<row.length) slots.push(cardHTML(row[s]));
      else slots.push(`<div class="slot${s===5?" six":""}"></div>`);
    }
    const hp = row.reduce((a,c)=>a+heads(c),0);
    const sel = resolvingChoice!==null ? " selectable" : "";
    return `<div class="row${sel}" data-ri="${ri}">${slots.join("")}
      <div class="rowheads"><b>${hp}</b>🐮</div></div>`;
  }).join("");
  if(resolvingChoice!==null){
    rowsEl.querySelectorAll(".row").forEach(el=>{
      el.onclick = ()=>{ const f=resolvingChoice; resolvingChoice=null; f(+el.dataset.ri); };
    });
  }
}

function renderHand(enabled){
  handEl.innerHTML = hands[0].map((n,i)=>
    cardHTML(n, (i===selIdx?"sel ":"")+(enabled?"":"disabled"))
  ).join("");
  [...handEl.children].forEach((el,i)=>{
    el.onclick = ()=>{ if(!enabled) return; selIdx=(selIdx===i?-1:i); renderHand(true); confirmBtn.disabled = selIdx<0; };
  });
  confirmBtn.disabled = !enabled || selIdx<0;
}

function msg(html){ msgEl.innerHTML = html; }
function renderStatus(){ statusEl.textContent = `R${roundNo} ・ ターン${turnNo}/10 ・ CPU:${DIFF_LABEL[diffLevel]}${proRule?" ・ プロ":""} ・ 66🐮で終了`; }

// ================= setup =================
function chooseSetup(){
  ptitle.textContent="対戦人数を選択";
  plines.innerHTML=`あなた + CPU で対戦します`;
  pbtn.style.display="none"; pbtn2.style.display="none";
  setChoices([3,4,5,6].map(n=>[`${n}人（CPU×${n-1}）`,()=>chooseDiff(n-1)]));
  overlay.classList.add("show");
}
function chooseDiff(nCpu){
  overlay.classList.add("show");
  ptitle.textContent="CPUの強さを選択";
  plines.innerHTML=`やさしい：ほぼ気まぐれ<br>ふつう：安全そうな列に置く<br>つよい：相手の手札を推定し、ラウンド終了まで先読みする`;
  setChoices([
    ["やさしい",()=>chooseRule(nCpu,"easy")],
    ["ふつう",()=>chooseRule(nCpu,"normal")],
    ["つよい",()=>chooseRule(nCpu,"hard")],
  ]);
}
function chooseRule(nCpu,diff){
  overlay.classList.add("show");
  ptitle.textContent="ルールを選択";
  plines.innerHTML=`<b>通常</b>：どの列にも置けない小さいカードを出すと、失点が最小の列を自動で引き取ります。<br><br>
    <b>上級（プロフェッショナル）</b>：そのとき、<b>好きな列を選んで引き取れます</b>。さらに、引き取った列にそのカードを置くので、次に何が起きるかまで読む必要があります。上級者向けの駆け引きルールです。`;
  setChoices([
    ["通常ルール",()=>newGame(nCpu,diff,false)],
    ["上級（プロ）ルール",()=>newGame(nCpu,diff,true)],
  ]);
}
function setChoices(list){
  let box=document.getElementById("choices");
  if(!box){ box=document.createElement("div"); box.id="choices"; box.style.cssText="display:flex;flex-direction:column;gap:8px;align-items:center"; panelEl.appendChild(box); }
  box.innerHTML="";
  for(const [label,fn] of list){
    const b=document.createElement("button");
    b.textContent=label;
    b.style.cssText="font:inherit;font-weight:800;padding:9px 26px;border-radius:999px;border:none;background:var(--h3);color:var(--ink);cursor:pointer;letter-spacing:.08em;box-shadow:0 3px 0 #b98f2e;min-width:200px";
    b.onclick=()=>{ box.remove(); fn(); };
    box.appendChild(b);
  }
}
function newGame(nCpu,diff,pro){
  const box=document.getElementById("choices"); if(box) box.remove();
  overlay.classList.remove("show");
  pbtn.style.display="inline-block";
  diffLevel=diff||"normal";
  proRule=!!pro;
  P=[{name:"あなた",cpu:false}];
  for(let i=0;i<nCpu;i++) P.push({name:CPU_NAMES[i],cpu:true});
  totals=P.map(()=>0); roundNo=0;
  newRound();
}
function newRound(){
  roundNo++; turnNo=1; roundPts=P.map(()=>0);
  const deck=[...Array(104)].map((_,i)=>i+1);
  for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
  hands = P.map(()=>deck.splice(0,10).sort((a,b)=>a-b));
  rows = [[deck.pop()],[deck.pop()],[deck.pop()],[deck.pop()]];
  seen = rows.flat().slice();           // 公開情報（CPUのカウンティング用）
  startTurn();
}

function startTurn(){
  picks=P.map(()=>null); selIdx=-1; busy=false;
  renderStatus(); renderScores(false); renderRows(); renderHand(true);
  msg("カードを1枚選んでください");
}

// ================= CPU =================
/* ルール部分（描画から独立、シミュレーションでも使う） */
function targetRow(card, rws){
  let best=-1, bestTail=-1;
  rws.forEach((r,i)=>{ const t=r[r.length-1]; if(t<card && t>bestTail){bestTail=t; best=i;} });
  return best;
}
/* プロルール配置：末尾に置ける列（末尾差）と、先頭に前置きできる列（先頭差）を
   すべて比較し、数値差が最小の場所に置く。全自動（プレイヤーは選べない）。
   戻り値 {row, front}：front=true なら先頭に前置き。 */
function proPlace(card, rws){
  let best=null, bestGap=Infinity, bestHeads=Infinity;
  rws.forEach((r,i)=>{
    const tail=r[r.length-1], head=r[0];
    if(tail<card){                          // 末尾に追加できる（通常の置き方）
      const gap=card-tail, h=rowHeads(r);
      if(gap<bestGap || (gap===bestGap && h<bestHeads)){ bestGap=gap; bestHeads=h; best={row:i,front:false}; }
    }
    if(head>card){                          // 先頭に前置きできる（プロ限定）
      const gap=head-card, h=rowHeads(r);
      if(gap<bestGap || (gap===bestGap && h<bestHeads)){ bestGap=gap; bestHeads=h; best={row:i,front:true}; }
    }
  });
  return best;   // 末尾にも先頭にも置けない場合のみ null
}
const rowHeads = r => r.reduce((a,c)=>a+heads(c),0);
function lowestRow(rws){
  let best=0,bv=Infinity;
  rws.forEach((r,i)=>{const v=rowHeads(r)*10+r.length; if(v<bv){bv=v;best=i;}});
  return best;
}
/* トリック解決（純粋関数版）。失点配列を返す。pro=プロルール */
function simTrick(rws, picks, pro){
  const pts=picks.map(()=>0);
  const order=picks.map((c,i)=>({i,c})).sort((a,b)=>a.c-b.c);
  for(const {i,c} of order){
    if(pro){
      const pl=proPlace(c,rws);            // 末尾/先頭を問わず差が最小の場所
      if(pl){
        if(pl.front){
          rws[pl.row].unshift(c);
          if(rws[pl.row].length>=6){ pts[i]+=rowHeads(rws[pl.row].slice(1)); rws[pl.row]=[c]; }
        } else {
          if(rws[pl.row].length>=5){ pts[i]+=rowHeads(rws[pl.row]); rws[pl.row]=[c]; }
          else rws[pl.row].push(c);
        }
        continue;
      }
      // どこにも置けない → 引き取り
      const ri=lowestRow(rws); pts[i]+=rowHeads(rws[ri]); rws[ri]=[c];
      continue;
    }
    // 通常ルール
    let ri=targetRow(c,rws);
    if(ri<0){ ri=lowestRow(rws); pts[i]+=rowHeads(rws[ri]); rws[ri]=[c]; }
    else if(rws[ri].length>=5){ pts[i]+=rowHeads(rws[ri]); rws[ri]=[c]; }
    else rws[ri].push(c);
  }
  return pts;
}
/* 軽量方策（プレイアウト用・「ふつう」の思考でもある） */
function greedyPick(hand, rws, noise=2){
  let best=null,bs=Infinity;
  for(const c of hand){
    let sc;
    if(proRule){
      const pl=proPlace(c,rws);
      if(!pl){                                    // どこにも置けない＝引き取り
        sc = 100 + Math.min(...rws.map(rowHeads))*10 + c*0.05;
      } else if(pl.front){
        const row=rws[pl.row];
        sc = row.length>=5 ? 100+rowHeads(row)*10 : 18 + row.length*3 + (row[0]-c)*0.05;
      } else {
        const row=rws[pl.row], gap=c-row[row.length-1];
        sc = row.length>=5 ? 100+rowHeads(row)*10+gap*0.1 : row.length*4+gap*0.6;
      }
    } else {
      const ri=targetRow(c,rws);
      if(ri<0) sc = 100 + Math.min(...rws.map(rowHeads))*10 + c*0.05;
      else{
        const row=rws[ri], gap=c-row[row.length-1];
        sc = row.length>=5 ? 100+rowHeads(row)*10+gap*0.1 : row.length*4+gap*0.6;
      }
    }
    sc += Math.random()*noise;
    if(sc<bs){bs=sc;best=c;}
  }
  return best;
}
/* 未公開カード（自分の手札と、場に出た全カードを除く） */
function unseenCards(myHand){
  const used=new Set(seen);
  for(const c of myHand) used.add(c);
  const out=[];
  for(let v=1;v<=104;v++) if(!used.has(v)) out.push(v);
  return out;
}
/* モンテカルロ：他家の手札を未公開カードから決定化し、
   ラウンド終了まで全員プレイアウトして、自分の総失点が最小の札を選ぶ */
function mcPick(pi){
  const myHand=hands[pi];
  if(myHand.length===1) return myHand[0];
  const h=myHand.length;
  const sims=Math.max(80, Math.min(MC_SIMS, Math.round(12000/(h*h))));  // 1手あたり概ね150ms以内
  const pool=unseenCards(myHand);
  const nOpp=P.length-1, hs=myHand.length;
  const tot=new Map(myHand.map(c=>[c,0]));
  for(let k=0;k<sims;k++){
    const p=pool.slice();
    for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
    const oppBase=[];
    for(let o=0;o<nOpp;o++) oppBase.push(p.slice(o*hs,(o+1)*hs));
    for(const c of myHand){
      const rws=rows.map(r=>r.slice());
      const mine=myHand.filter(x=>x!==c);
      const opp=oppBase.map(h=>h.slice());
      let loss=0;
      let picksSim=[c,...opp.map(h=>greedyPick(h,rws,3))];
      picksSim.slice(1).forEach((pc,o)=>opp[o].splice(opp[o].indexOf(pc),1));
      loss += simTrick(rws,picksSim,proRule)[0];
      while(mine.length){                       // 残りトリックを最後まで
        const my=greedyPick(mine,rws,3);
        mine.splice(mine.indexOf(my),1);
        const op=opp.map(h=>greedyPick(h,rws,3));
        op.forEach((pc,o)=>opp[o].splice(opp[o].indexOf(pc),1));
        loss += simTrick(rws,[my,...op],proRule)[0];
      }
      tot.set(c, tot.get(c)+loss);
    }
  }
  let best=null,bs=Infinity;
  for(const [c,v] of tot) if(v<bs){bs=v;best=c;}
  return best;
}
function cpuPick(pi){
  if(diffLevel==="easy"){
    const h=hands[pi];
    return Math.random()<0.5 ? h[Math.floor(Math.random()*h.length)] : greedyPick(h,rows,14);
  }
  if(diffLevel==="hard") return mcPick(pi);
  return greedyPick(hands[pi], rows, 2);
}
function cpuChooseRow(){ return lowestRow(rows); }

// ================= resolve turn =================
let busy=false;
confirmBtn.onclick = async ()=>{
  if(selIdx<0 || busy) return;
  busy=true; confirmBtn.disabled=true;
  picks[0]=hands[0].splice(selIdx,1)[0];
  selIdx=-1; renderHand(false);
  renderScores(false);
  const wait = diffLevel==="hard" ? 420 : 620;
  for(let i=1;i<P.length;i++){
    msg(`🤖 ${P[i].name} が考えています…`);
    await sleep(wait);                       // 描画を反映させてから計算
    const c=cpuPick(i);
    hands[i]=hands[i].filter(x=>x!==c);
    picks[i]=c;
    renderScores(false);
    await sleep(120);
  }
  msg("全員が選びました。オープン！");
  await sleep(900);
  renderScores(true);
  await sleep(1400);
  await resolve();
};

async function resolve(){
  picks.forEach(c=>seen.push(c));                 // 出たカードを公開情報へ
  const order=P.map((_,i)=>({pi:i,c:picks[i]})).sort((a,b)=>a.c-b.c);
  for(const {pi,c} of order){
    const name = pi===0 ? `<span class="em">${P[pi].name}</span>` : P[pi].name;
    if(proRule){
      // プロルール：末尾/先頭を問わず、数値差が最小の場所に自動配置
      const pl = proPlace(c, rows);
      if(pl){
        if(pl.front){
          rows[pl.row].unshift(c);
          renderRows();
          msg(`${name} は <b>${c}</b> を列${pl.row+1}の先頭へ（前置き）`);
          await sleep(700);
          if(rows[pl.row].length>=6){
            msg(`${name} の前置きで列${pl.row+1}が6枚に！ 引き取り 🐮`);
            await sleep(800);
            const pts=rowHeads(rows[pl.row].slice(1));
            roundPts[pi]+=pts; rows[pl.row]=[c];
            renderRows(); renderScores(true);
            await sleep(700);
          }
        } else {
          if(rows[pl.row].length>=5){
            msg(`${name} の <b>${c}</b> が <b>6枚目</b>！ 列${pl.row+1}を引き取り 🐮`);
            await sleep(900);
            await takeRow(pi, pl.row, c, name);
          } else {
            rows[pl.row].push(c);
            msg(`${name} は <b>${c}</b> を列${pl.row+1}へ`);
            renderRows();
            const rowEl=rowsEl.children[pl.row];
            const cardEl=rowEl && rowEl.children[rows[pl.row].length-1];
            if(cardEl) cardEl.classList.add("pop");
            await sleep(700);
          }
        }
      } else {
        // 末尾にも先頭にも置けない → 引き取り（列は自動：失点最小）
        const ri=lowestRow(rows);
        msg(`${name} の <b>${c}</b> はどこにも置けず、列${ri+1}を引き取り 🐮`);
        await sleep(900);
        await takeRow(pi, ri, c, name);
      }
      continue;
    }
    // ===== 通常ルール =====
    let ri = targetRow(c, rows);
    if(ri<0){
      // どの列にも置けない → 好きな列を引き取る（人間は選べる）
      if(pi===0){
        msg(`${name} の <b>${c}</b> はどの列にも置けません。<span class="em">引き取る列をタップ</span>`);
        ri = await new Promise(res=>{ resolvingChoice=res; renderRows(); });
      } else {
        ri = cpuChooseRow();
        msg(`${name} の <b>${c}</b> は置けないので列${ri+1}を引き取り…`);
        await sleep(900);
      }
      await takeRow(pi, ri, c, name);
    } else if(rows[ri].length>=5){
      msg(`${name} の <b>${c}</b> が <b>6枚目</b>！ 列${ri+1}を引き取り 🐮`);
      await sleep(900);
      await takeRow(pi, ri, c, name);
    } else {
      rows[ri].push(c);
      msg(`${name} は <b>${c}</b> を列${ri+1}へ`);
      renderRows();
      const rowEl=rowsEl.children[ri];
      const cardEl=rowEl.children[rows[ri].length-1];
      cardEl.classList.add("pop");
      await sleep(750);
    }
  }
  // turn end
  picks=P.map(()=>null);
  if(hands[0].length===0){ endRound(); return; }
  turnNo++; startTurn();
}

async function takeRow(pi, ri, c, name){
  const pts=rowHeads(rows[ri]);
  const rowEl=rowsEl.children[ri];
  if(rowEl) rowEl.classList.add("taken");
  await sleep(650);
  roundPts[pi]+=pts;
  rows[ri]=[c];
  msg(`${name} は 🐮${pts} を引き取りました`);
  renderRows(); renderScores(true);
  await sleep(750);
}

// ================= round / game end =================
function endRound(){
  for(let i=0;i<P.length;i++){ totals[i]+=roundPts[i]; }
  const over = Math.max(...totals)>=66;
  const rank=P.map((_,i)=>i).sort((a,b)=>totals[a]-totals[b]);
  ptitle.textContent = over ? "ゲーム終了！" : `ラウンド ${roundNo} 終了`;
  plines.innerHTML = rank.map((i,k)=>{
    const cls = i===0 ? "me" : "";
    const crown = over && k===0 ? "👑 " : "";
    return `<div class="${cls}">${crown}${k+1}位　${P[i].name}：🐮${totals[i]}（今R +${roundPts[i]}）</div>`;
  }).join("");
  const pbtn2=document.getElementById("pbtn2");
  if(over){
    const win = rank[0];
    saveRecord({t:Date.now(), n:P.length, diff:diffLevel, win:win===0, rank:rank.indexOf(0)+1, pt:totals[0]});
    ptitle.textContent = win===0 ? "🎉 あなたの勝ち！" : `${P[win].name} の勝ち！`;
    pbtn.textContent="もう一度遊ぶ";
    pbtn.onclick=()=>{ pbtn2.style.display="none"; overlay.classList.remove("show"); chooseSetup(); };
    pbtn2.style.display="inline-block";
    pbtn2.onclick=()=>{ pbtn2.style.display="none"; overlay.classList.remove("show"); };
  } else {
    pbtn2.style.display="none";
    pbtn.textContent="次のラウンドへ";
    pbtn.onclick=()=>{ overlay.classList.remove("show"); newRound(); };
  }
  roundPts=P.map(()=>0);
  renderScores(false);
  overlay.classList.add("show");
}

/* ================= history view ================= */
document.getElementById("histBtn").onclick=async()=>{
  if(overlay.classList.contains("show")) return;   // ラウンド結果表示中は開かない
  const h=await loadHistory();
  ptitle.textContent="対戦履歴";
  if(h===null){
    plines.innerHTML=`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`;
    setChoices([["閉じる",()=>overlay.classList.remove("show")]]);
    overlay.classList.add("show");
    return;
  }
  if(!h.length){
    plines.innerHTML=`まだ対戦記録がありません。<br><span style="opacity:.6">保存先：${storageMode()}</span>`;
  }else{
    const wins=h.filter(r=>r.win).length;
    const rows=[...h].reverse().slice(0,15).map(r=>{
      const dt=new Date(r.t);
      return `${dt.getMonth()+1}/${dt.getDate()}　${num(r.n,4)}人・${esc(DIFF_LABEL[r.diff]||"—")}　${r.win?"🏆勝ち":num(r.rank)+"位"}（🐮${num(r.pt)}）`;
    }).join("<br>");
    plines.innerHTML=`<b>通算 ${h.length}戦 ${wins}勝</b><br>
      <span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}<br><br>
      <a href="#" id="clearHist" style="color:var(--h3)">履歴を全消去</a>`;
    document.getElementById("clearHist").onclick=async e=>{
      e.preventDefault();
      const shared = !!fdb;
      ptitle.textContent="履歴を全消去しますか？";
      plines.innerHTML = shared
        ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
        : `この端末に保存された対戦履歴をすべて削除します。`;
      setChoices([
        ["削除する", async()=>{ await clearHistory(); overlay.classList.remove("show"); msg("対戦履歴を消去しました"); }],
        ["やめる", ()=>overlay.classList.remove("show")],
      ]);
    };
  }
  pbtn.textContent="閉じる";
  pbtn.onclick=()=>overlay.classList.remove("show");
  overlay.classList.add("show");
};

chooseSetup();

<script>
(function(){
  var HTML=`<p class="hgoal"><b>目的</b>　牛マーク（🐮）を最も少なく引き取った人の勝ち。誰かが66🐮に達したラウンドで終了です。</p><h3>カード</h3><p>1〜104の数字カード。数字ごとに牛マークの数が違います。<br><b>5の倍数＝🐮2</b> ／ <b>10の倍数＝🐮3</b> ／ <b>11の倍数＝🐮5</b> ／ <b>55＝🐮7</b> ／ それ以外＝🐮1<br>牛マークがそのまま失点です。キリのいい数字ほど危険。</p><h3>流れ</h3><p>場に4つの列があります。全員が手札から1枚を<b>同時に</b>選び、小さい数字の人から順に置いていきます。<br>置く列は選べません。<b>自分の数字より小さく、かつ最も近い数字が末尾にある列</b>に自動的に置かれます。</p><h3>引き取り</h3><p>列は5枚まで。<b>6枚目を置くことになった人が、その列の5枚をすべて引き取ります</b>（＝失点）。<br>引き取ったあと、その列は自分のカード1枚だけになります。</p><h3>どの列にも置けないとき</h3><p>自分のカードが<b>どの列の末尾よりも小さい</b>場合、好きな列を1つ選んで引き取ります。<br>手札に小さい数字を抱え込んでいると、これを強いられます。</p><h3>コツ</h3><p>列が4〜5枚まで伸びていると、次に置いた人が引き取る危険があります。<br>「安い列をわざと引き取って、場をリセットする」のも立派な戦術です。<br>全員同時出しなので、<b>他の人がどの数字を出しそうか</b>を読むゲームです。</p><h3>上級（プロ）ルール</h3><p>ゲーム開始時に選べます。<br>通常は、カードは「末尾が自分より小さく、差が最も近い列」に置かれます。<br><b>プロルールでは、列の先頭（左端）にも置けるようになります</b>。カードより先頭が大きい列なら、その手前に入れられます。<br>置き場所は<b>末尾・先頭を問わず、数値差が最小の場所に自動で決まります</b>（若い数字の人から順に処理）。前置きでその列が<b>6枚目</b>になった人は、通常どおり引き取りです。<br>小さいカードにも置き場所が生まれるぶん、駆け引きが深くなる上級者向けルールです。</p><h3>CPUについて</h3><p>つよいCPUは、まだ場に出ていない札から相手の手札を推定し（決定化サンプリング）、そこからラウンド終了までを何百回もシミュレーションして、失点の期待値が最小になる札を選びます。<br>すべての可能性を読み切る完全探索ではなく、シミュレーションによる<b>近似</b>です。それでも、単純に「安全そうな列」を選ぶだけのCPU（＝ふつう）と対戦させると、平均失点は 13.2 → 7.6、勝率は 25%（4人戦の基準値）→ 46.7% になります。</p>`;
  var veil=document.getElementById("helpveil");
  document.getElementById("helpbody").innerHTML=HTML;
  function open(){ veil.classList.add("show"); }
  function close(){ veil.classList.remove("show"); }
  document.getElementById("helpBtn").onclick=open;
  document.getElementById("helpclose").onclick=close;
  veil.onclick=function(e){ if(e.target===veil) close(); };
  window.openHelp=open;
})();
<\/script>

(function(){
  function apply(t){ document.documentElement.setAttribute("data-theme", t==="light"?"light":"dark"); }
  var t=null;
  try{ t = window.name && window.name.indexOf("theme:")===0 ? window.name.slice(6) : null; }catch(e){}
  if(!t){ try{ t = localStorage.getItem("bodoge-theme"); }catch(e){} }
  if(!t){ t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark"; }
  apply(t);
  window.addEventListener("message", function(ev){
    if(ev.data && ev.data.type==="theme") apply(ev.data.value);
  });
})();

<!-- Firebase（GitHub Pagesに置いて他端末と履歴を同期する場合に使用。未設定・読込失敗でも動きます） -->

<script>
"use strict";
const C=["w","u","g","r","k"];
const CN={w:"白",u:"青",g:"緑",r:"赤",k:"黒",y:"金"};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);

/* ================= deck generation =================
   本家に近い構成：Tier1=40枚(0-1点) Tier2=30枚(1-3点) Tier3=20枚(3-5点)
   コストは「自色からのオフセット」テンプレを5色に回して生成 */
const T1=[ // [pt, {offset:count}]  offset0=自分のボーナス色
  [0,{1:1,2:1,3:1,4:1}], [0,{1:1,2:2,3:1,4:1}], [0,{1:2,2:2}], [0,{1:3}],
  [0,{2:2,3:1}], [0,{0:1,2:1,3:3}], [0,{2:2,4:1}], [1,{1:4}]
];
const T2=[
  [1,{1:3,2:2,3:2}], [1,{2:3,3:2,4:2}], [2,{1:5}],
  [2,{0:1,1:4,2:2}], [2,{2:5,3:3}], [3,{0:6}]
];
const T3=[
  [3,{1:3,2:3,3:3,4:5}], [4,{1:7}], [4,{0:3,1:6,2:3}], [5,{0:3,1:7}]
];
function buildDeck(tpls,tier){
  const d=[];
  for(let ci=0; ci<5; ci++)
    for(const [pt,off] of tpls){
      const cost={};
      for(const o in off) cost[C[(ci+ +o)%5]]=off[o];
      d.push({tier, pt, bonus:C[ci], cost, id:Math.random()});
    }
  return shuffle(d);
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function makeNobles(count){
  const list=[];
  for(let i=0;i<5;i++){
    list.push({pt:3, req:{[C[i]]:4,[C[(i+1)%5]]:4}});
    list.push({pt:3, req:{[C[i]]:3,[C[(i+2)%5]]:3,[C[(i+4)%5]]:3}});
  }
  return shuffle(list).slice(0,count);
}

/* ================= state ================= */
let decks, market, nobles, bank, players, sel, turnPlayer, startPlayer, gameEnding, over;

const CPU_NAMES=["ザラ","ルドルフ","ミネット"];
function newPlayer(name,cpu){
  return {name,cpu,tok:{w:0,u:0,g:0,r:0,k:0,y:0},bonus:{w:0,u:0,g:0,r:0,k:0},pt:0,rsv:[],nb:0,bought:0};
}
function newGame(nCpu,diff){
  diffLevel=diff||"normal";
  $("goal").textContent=`15点で最終R ・ CPU:${DIFF_LABEL[diffLevel]}`;
  const n=nCpu+1;
  decks=[buildDeck(T1,1),buildDeck(T2,2),buildDeck(T3,3)];
  market=decks.map(d=>d.splice(0,4));
  nobles=makeNobles(n+1);
  const t={2:4,3:5,4:7}[n];                    // 人数別トークン数
  bank={w:t,u:t,g:t,r:t,k:t,y:5};
  players=[newPlayer("あなた",false)];
  for(let i=0;i<nCpu;i++) players.push(newPlayer("CPU・"+CPU_NAMES[i],true));
  sel=[]; gameEnding=false; over=false;
  startPlayer=Math.floor(Math.random()*players.length);   // 先手はランダム
  turnPlayer=startPlayer;
  renderAll();
  if(players[turnPlayer].cpu){
    msg(`先手は ${players[turnPlayer].name} です`);
    (async()=>{ await sleep(2400); await cpuTurn(players[turnPlayer]); })();
  } else {
    msg("あなたが先手です。同じ宝石を2回タップで同色2枚（山に4枚以上あるとき）");
  }
}
let diffLevel="normal";
const DIFF_LABEL={easy:"やさしい",normal:"ふつう",hard:"つよい"};
function chooseSetup(){
  showSheet({title:"対戦人数を選択",body:"あなた + CPU で対戦します",btns:[
    ["2人（CPU×1）",()=>chooseDiff(1)],
    ["3人（CPU×2）",()=>chooseDiff(2)],
    ["4人（CPU×3）",()=>chooseDiff(3)],
  ]});
}
function chooseDiff(nCpu){
  showSheet({title:"CPUの強さを選択",
    body:"やさしい：時々気まぐれな手を打つ<br>ふつう：効率重視で無駄なし<br>つよい：あなたのリーチカードを妨害してくる",
    btns:[
      ["やさしい",()=>newGame(nCpu,"easy")],
      ["ふつう",()=>newGame(nCpu,"normal")],
      ["つよい",()=>newGame(nCpu,"hard")],
    ]});
}

/* ================= helpers ================= */
const tokCount=p=>Object.values(p.tok).reduce((a,b)=>a+b,0);
function shortfall(p,card){
  let need=0;
  for(const c of C) need+=Math.max(0,(card.cost[c]||0)-p.bonus[c]-p.tok[c]);
  return need;
}
const canBuy=(p,card)=>shortfall(p,card)<=p.tok.y;
function pay(p,card){
  for(const c of C){
    let due=Math.max(0,(card.cost[c]||0)-p.bonus[c]);
    const use=Math.min(due,p.tok[c]);
    p.tok[c]-=use; bank[c]+=use; due-=use;
    p.tok.y-=due; bank.y+=due;
  }
}
function gainCard(p,card){
  p.bonus[card.bonus]++; p.pt+=card.pt; p.bought++;
  // 貴族チェック
  for(let i=nobles.length-1;i>=0;i--){
    const n=nobles[i];
    if(Object.entries(n.req).every(([c,v])=>p.bonus[c]>=v)){
      p.pt+=n.pt; p.nb++; nobles.splice(i,1);
      msg(`<span class="em">${p.name}</span> に貴族が訪問！ +3点`);
    }
  }
}
function removeFromMarket(card){
  for(let t=0;t<3;t++){
    const i=market[t].findIndex(c=>c&&c.id===card.id);
    if(i>=0){ market[t][i]=decks[t].shift()||null; return true; }
  }
  return false;
}

/* ================= rendering ================= */
function tokchip(c){return `<span class="tokchip c${c}"></span>`;}
function bonuschip(c){return `<span class="bonuschip c${c}"></span>`;}
function cardHTML(card,cls=""){
  if(!card) return `<div class="gcard empty"></div>`;
  const cost=C.filter(c=>card.cost[c]).map(c=>`<span class="costdot c${c}">${card.cost[c]}</span>`).join("");
  return `<div class="gcard ${cls}" data-id="${card.id}">
    <div class="head"><span class="pt">${card.pt||""}</span>${bonuschip(card.bonus)}</div>
    <div class="cost">${cost}</div></div>`;
}
function boardHTML(p,active){
  const toks=C.concat("y").map(c=>`<div class="asset"><div class="gemrow">${tokchip(c)}<b>${p.tok[c]}</b></div></div>`).join("");
  const bons=C.map(c=>`<div class="asset"><div class="gemrow">${bonuschip(c)}<b>${p.bonus[c]}</b></div></div>`).join("");
  let rsv="";
  if(p.rsv.length){
    rsv = `<div class="rsv">`+p.rsv.map((card,i)=>
      p.cpu ? `<div class="mini back">確保</div>`
            : `<div class="mini" data-ri="${i}">${card.pt||0}点 ${CN[card.bonus]}<br>${C.filter(c=>card.cost[c]).map(c=>CN[c]+card.cost[c]).join(" ")}</div>`
    ).join("")+`</div>`;
  }
  return `<div class="board${active?" active":""}">
    <div class="top">${p.cpu?"🤖":"🧑"} ${p.name}
      <span class="pts">得点 <b>${p.pt}</b></span></div>
    <div class="assets">${bons}<span style="opacity:.4">|</span>${toks}
      <span style="font-size:.6rem; opacity:.6">(所持${tokCount(p)}/10)</span></div>
    ${rsv}</div>`;
}
function renderTurnOrder(){
  const n=players.length;
  const seq=[];
  for(let k=0;k<n;k++){
    const i=(startPlayer+k)%n;
    seq.push(`<span class="tp${i===turnPlayer&&!over?" now":""}">${players[i].name}</span>`);
  }
  $("turnorder").innerHTML=`<span class="tlabel">手番順</span>`+seq.join(`<span class="arw">→</span>`)+`<span class="arw">↻</span>`;
}
function renderAll(){
  renderTurnOrder();
  $("cpuboard").innerHTML=players.slice(1).map((p,i)=>boardHTML(p,turnPlayer===i+1)).join("");
  $("myboard").innerHTML=boardHTML(players[0],turnPlayer===0);
  $("nobles").innerHTML=nobles.map(n=>`<div class="noble"><div class="np">${n.pt}点</div>
    <div class="req">${Object.entries(n.req).map(([c,v])=>`<span>${bonuschip(c)}${v}</span>`).join("")}</div></div>`).join("");
  $("market").innerHTML=[2,1,0].map(t=>`<div class="tier">
      <div class="deckback" style="background:${["#1d4d3a","#3a3a68","#5e2f4e"][t]}">Lv${t+1}<span>残${decks[t].length}</span></div>
      <div class="cards4">${market[t].map(c=>cardHTML(c, c&&canBuy(players[0],c)&&turnPlayer===0?"buyable":"")).join("")}</div>
    </div>`).join("");
  $("bank").innerHTML=C.concat("y").map(c=>{
    const n=sel.filter(x=>x===c).length, isSel=n>0;
    const dis=turnPlayer!==0||bank[c]===0||(!isSel&&!canAddSel(c));
    return `<div class="btok ${c==="y"?"gold":""} ${isSel?"sel":""} ${dis&&c!=="y"?"dis":""}" data-c="${c}">
      <div class="circ c${c}">${bank[c]}</div>${CN[c]}${n===2?" ×2":""}</div>`;
  }).join("");
  $("takeBtn").disabled = turnPlayer!==0 || !validSel();
  // events
  if(turnPlayer===0&&!over){
    $("bank").querySelectorAll(".btok:not(.gold)").forEach(el=>el.onclick=()=>toggleSel(el.dataset.c));
    $("market").querySelectorAll(".gcard:not(.empty)").forEach(el=>el.onclick=()=>openCard(findCard(el.dataset.id)));
    $("myboard").querySelectorAll(".mini[data-ri]").forEach(el=>el.onclick=()=>openReserved(+el.dataset.ri));
  }
}
function findCard(id){ for(const t of market) for(const c of t) if(c&&String(c.id)===id) return c; }
function msg(h){$("msg").innerHTML=h;}

/* ================= token selection ================= */
function canAddSel(c){
  if(sel.length===0) return bank[c]>=1;
  if(sel.length===1){
    if(sel[0]===c) return bank[c]>=4;          // 同色2枚は山に4枚以上
    return bank[c]>=1;
  }
  if(sel.length===2) return sel[0]!==sel[1] && !sel.includes(c) && bank[c]>=1;
  return false;
}
function validSel(){
  if(sel.length===2&&sel[0]===sel[1]) return true;
  return sel.length>=1 && sel.length<=3 && new Set(sel).size===sel.length;
}
function toggleSel(c){
  const count=sel.filter(x=>x===c).length;
  if(count===0){ if(canAddSel(c)) sel.push(c); }
  else if(count===1){
    if(sel.length===1&&bank[c]>=4) sel=[c,c];   // もう一度タップで同色2枚
    else sel=sel.filter(x=>x!==c);
  }
  else{ sel=[]; }                                // 2枚選択中にタップで解除
  renderAll();
}
$("clearBtn").onclick=()=>{sel=[];renderAll();};
$("takeBtn").onclick=async()=>{
  if(!validSel())return;
  for(const c of sel){ bank[c]--; players[0].tok[c]++; }
  const t=sel.map(c=>CN[c]).join("・");
  sel=[];
  msg(`あなたは 宝石（${t}）を取りました`);
  await afterAction(players[0]);
};

/* ================= card sheet ================= */
function openCard(card){
  if(!card)return;
  const me=players[0];
  const buy=canBuy(me,card), rsv=me.rsv.length<3;
  showSheet({
    title:"このカードをどうする？",
    card,
    body:`ボーナス:${CN[card.bonus]} ／ ${card.pt}点`,
    btns:[
      buy&&["購入する",async()=>{ pay(me,card); gainCard(me,card); removeFromMarket(card);
        msg(`あなたはカードを購入（${CN[card.bonus]}ボーナス +${card.pt}点）`); await afterAction(me); }],
      rsv&&["確保する"+(bank.y>0?"（金+1）":""),async()=>{ removeFromMarket(card); me.rsv.push(card);
        if(bank.y>0){bank.y--; me.tok.y++;}
        msg("あなたはカードを確保しました"); await afterAction(me); }],
      ["やめる",closeSheet,true]
    ].filter(Boolean)
  });
}
function openReserved(ri){
  const me=players[0], card=me.rsv[ri];
  if(!canBuy(me,card)){ showSheet({title:"確保カード",card,body:"まだ購入できません（宝石が足りない）",btns:[["閉じる",closeSheet,true]]}); return; }
  showSheet({title:"確保カードを購入？",card,body:`ボーナス:${CN[card.bonus]} ／ ${card.pt}点`,
    btns:[["購入する",async()=>{ pay(me,card); gainCard(me,card); me.rsv.splice(ri,1);
      msg(`あなたは確保カードを購入（+${card.pt}点）`); await afterAction(me); }],
      ["やめる",closeSheet,true]]});
}
function showSheet({title,card,body,btns,disc}){
  $("stitle").textContent=title;
  $("spreview").innerHTML=card?cardHTML(card):"";
  $("sbody").innerHTML=body||"";
  $("sdisc").innerHTML=disc||"";
  $("sbtns").innerHTML="";
  for(const [label,fn,ghost] of btns){
    const b=document.createElement("button");
    b.className="act"+(ghost?" ghost":""); b.textContent=label;
    b.onclick=()=>{closeSheet(); fn&&fn();};
    $("sbtns").appendChild(b);
  }
  $("veil").classList.add("show");
}
function closeSheet(){$("veil").classList.remove("show");}

/* ================= turn flow ================= */
async function afterAction(p){
  closeSheet();
  // 10枚制限
  while(tokCount(p)>10){
    if(p.cpu){ cpuDiscard(p); }
    else{ await playerDiscard(p); }
  }
  if(p.pt>=15) gameEnding=true;
  renderAll();
  // 最終ラウンド：手番が一巡の最後の人まで回ったら終了（全員同回数）
  if(gameEnding && turnPlayer===(startPlayer+players.length-1)%players.length){ endGame(); return; }
  turnPlayer=(turnPlayer+1)%players.length;
  renderAll();
  if(players[turnPlayer].cpu){
    msg(`🤖 ${players[turnPlayer].name} が考えています…`);
    await sleep(2400);
    await cpuTurn(players[turnPlayer]);
  } else {
    msg("あなたの番です");
  }
}
function playerDiscard(p){
  return new Promise(res=>{
    const build=()=>{
      const disc=C.concat("y").filter(c=>p.tok[c]>0).map(c=>
        `<div class="btok" data-c="${c}"><div class="circ c${c}">${p.tok[c]}</div>${CN[c]}</div>`).join("");
      showSheet({title:`宝石が10枚を超えています（${tokCount(p)}枚）`,
        body:"捨てる宝石をタップ", disc, btns:[]});
      $("sdisc").querySelectorAll(".btok").forEach(el=>el.onclick=()=>{
        const c=el.dataset.c; p.tok[c]--; bank[c]++;
        if(tokCount(p)>10) build(); else {closeSheet(); res();}
      });
    };
    build();
  });
}

/* ================= CPU ================= */
function nobleValue(p,bonusColor){
  let v=0;
  for(const n of nobles) if(n.req[bonusColor]&&p.bonus[bonusColor]<n.req[bonusColor]) v+=1;
  return v;
}
async function cpuTurn(p){
  renderAll();
  // つよい：あなたが今買える/あと1枚で買える高得点カードを横取り確保
  if(diffLevel==="hard" && p.rsv.length<3){
    const me=players[0];
    const steal=market.flat().filter(Boolean)
      .filter(c=>c.pt>=2 && shortfall(me,c)<=me.tok.y+1 && !canBuy(p,c))
      .sort((a,b)=>b.pt-a.pt)[0];
    if(steal && Math.random()<0.6){
      removeFromMarket(steal); p.rsv.push(steal);
      if(bank.y>0){bank.y--;p.tok.y++;}
      msg(`🤖 ${p.name} はカードを確保しました（妨害…？）`);
      await afterAction(p); return;
    }
  }
  // やさしい：たまに買えるのに買わず、適当な宝石を取る
  if(diffLevel==="easy" && Math.random()<0.35){
    const avail=C.filter(c=>bank[c]>=1);
    if(avail.length){
      const taken=shuffle([...avail]).slice(0,3);
      for(const c of taken){ bank[c]--; p.tok[c]++; }
      msg(`🤖 ${p.name} は宝石（${taken.map(c=>CN[c]).join("・")}）を取りました`);
      await afterAction(p); return;
    }
  }
  // 1) 購入できる中で最良
  const buyables=[...market.flat().filter(Boolean),...p.rsv].filter(c=>canBuy(p,c));
  if(buyables.length){
    let card;
    if(diffLevel==="easy" && Math.random()<0.5){
      card=buyables[Math.floor(Math.random()*buyables.length)];  // やさしい：適当に選ぶ
    } else {
      const w=(diffLevel==="hard"&&p.pt>=10)?25:10;               // つよい：終盤は得点最優先
      buyables.sort((a,b)=>(b.pt*w+nobleValue(p,b.bonus)*3+b.tier)-(a.pt*w+nobleValue(p,a.bonus)*3+a.tier));
      card=buyables[0];
    }
    pay(p,card); gainCard(p,card);
    const ri=p.rsv.indexOf(card);
    if(ri>=0) p.rsv.splice(ri,1); else removeFromMarket(card);
    msg(`🤖 ${p.name} はカードを購入（${CN[card.bonus]} +${card.pt}点）`);
    await afterAction(p); return;
  }
  // 2) 狙いのカードに向けて宝石収集
  const targets=[...market.flat().filter(Boolean),...p.rsv]
    .map(c=>({c, miss:shortfall(p,c)}))
    .sort((a,b)=>((b.c.pt*3+1)/(b.miss+1))-((a.c.pt*3+1)/(a.miss+1)));
  const tgt=targets[0]?.c;
  if(tgt){
    const needs=C.filter(c=>((tgt.cost[c]||0)-p.bonus[c]-p.tok[c])>0)
                 .sort((a,b)=>((tgt.cost[b]||0)-p.bonus[b]-p.tok[b])-((tgt.cost[a]||0)-p.bonus[a]-p.tok[a]));
    // 同色2枚が有効か
    const dbl=needs.find(c=>((tgt.cost[c]||0)-p.bonus[c]-p.tok[c])>=2&&bank[c]>=4);
    let taken=[];
    if(dbl&&needs.length<=1){ bank[dbl]-=2; p.tok[dbl]+=2; taken=[dbl,dbl]; }
    else{
      for(const c of needs){ if(taken.length<3&&bank[c]>=1){bank[c]--;p.tok[c]++;taken.push(c);} }
      // 足りない分は多い山から補充
      if(taken.length<3){
        for(const c of [...C].sort((a,b)=>bank[b]-bank[a])){
          if(taken.length<3&&!taken.includes(c)&&bank[c]>=1){bank[c]--;p.tok[c]++;taken.push(c);}
        }
      }
    }
    if(taken.length){
      msg(`🤖 ${p.name} は宝石（${taken.map(c=>CN[c]).join("・")}）を取りました`);
      await afterAction(p); return;
    }
  }
  // 3) 確保（銀行が空etc.）
  if(p.rsv.length<3){
    const best=market[2].filter(Boolean)[0]||market[1].filter(Boolean)[0];
    if(best){ removeFromMarket(best); p.rsv.push(best);
      if(bank.y>0){bank.y--;p.tok.y++;}
      msg(`🤖 ${p.name} はカードを確保しました`);
      await afterAction(p); return;
    }
  }
  msg(`🤖 ${p.name} はパス`);
  await afterAction(p);
}
function cpuDiscard(p){
  // 一番多く持っている色を捨てる
  const c=[...C,"y"].sort((a,b)=>p.tok[b]-p.tok[a])[0];
  p.tok[c]--; bank[c]++;
}

/* ================= 対戦履歴（保存先3段構え） =================
   1) Firebase設定あり → Realtime Database（全端末で共有）
   2) Claude内で開いている → アプリ内ストレージ
   3) それ以外の通常ブラウザ → この端末のlocalStorage
   ---- GitHub Pagesで同期する場合はここに設定を貼る ----      */
const firebaseConfig = {
  apiKey: "AIzaSyDML257ZXglBfRZ6zKkS2l4rIZBpeyNuTo",
  authDomain: "bodogeshu.firebaseapp.com",
  databaseURL: "https://bodogeshu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bodogeshu",
};
const HKEY="gm-history";
const FPATH="gems/history";        // ポーカー道場と同じDBでもパスが別なので混ざりません
let fdb=null;
try{
  if(typeof firebase!=="undefined" && firebaseConfig.databaseURL){
    firebase.initializeApp(firebaseConfig);
    fdb=firebase.database();
  }
}catch(e){ console.warn("firebase init failed",e); }
const STORE=(()=>{ try{
  if(window.storage) return window.storage;
  if(window.parent && window.parent!==window && window.parent.storage) return window.parent.storage; // バンドル内iframeから親のストレージを借りる
}catch(e){} return null; })();
const storageMode=()=> fdb ? "Firebase（全端末で共有）"
  : (STORE ? "アプリ内ストレージ" : "この端末のみ");

/* 読み込み。失敗は null を返す（空履歴と区別する） */

/* 履歴レコードの値を表示用に安全化（外部データをHTMLとして解釈させない） */
const esc=v=>String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=(v,d=0)=>{ const n=Number(v); return Number.isFinite(n)?n:d; };

async function loadHistory(){
  try{
    if(fdb){
      // 直近200件のみ取得（pushキーは時系列順なので limitToLast が使える）
      const s=await fdb.ref(FPATH).limitToLast(200).once("value");
      const v=s.val();
      if(v==null) return [];
      const arr = Array.isArray(v) ? v.filter(x=>x) : Object.keys(v).sort().map(k=>v[k]);
      return arr.filter(x=>x && typeof x==="object");
    }
    if(STORE){ const r=await STORE.get(HKEY,false); return r?JSON.parse(r.value):[]; }
    return JSON.parse(localStorage.getItem(HKEY)||"[]");
  }catch(e){ return null; }
}
/* 保存。Firebaseは1件ずつ push（読み書き競合で他端末の記録を消さない） */
async function saveRecord(rec){
  try{
    if(fdb){ await fdb.ref(FPATH).push(rec); return; }
    const h=await loadHistory();
    if(h===null) return;
    h.push(rec);
    if(h.length>100) h.splice(0,h.length-100);
    if(STORE){ await STORE.set(HKEY, JSON.stringify(h), false); return; }
    localStorage.setItem(HKEY, JSON.stringify(h));
  }catch(e){}
}
async function clearHistory(){
  try{
    if(fdb){ await fdb.ref(FPATH).remove(); }
    else if(STORE){ await STORE.delete(HKEY, false); }
    else localStorage.removeItem(HKEY);
  }catch(e){}
}
/* 全消去の確認（Firebase有効時は共有データである旨を明示） */
function confirmClear(){
  const shared = !!fdb;
  showSheet({title:"履歴を全消去しますか？",
    body: shared
      ? `<b>この操作は全端末で共有されている履歴を削除します。</b><br>他の端末で記録した対戦もすべて消えます。`
      : `この端末に保存された対戦履歴をすべて削除します。`,
    btns:[["削除する", async()=>{ await clearHistory(); msg("対戦履歴を消去しました"); }],
          ["やめる", null, "g"]]});
}

async function showHistory(){
  const h=await loadHistory();
  if(h===null){
    showSheet({title:"対戦履歴",body:`履歴を読み込めませんでした。<br>通信状況を確認してもう一度お試しください。`,
      btns:[["閉じる",closeSheet,"g"]]});
    return;
  }
  if(!h.length){
    showSheet({title:"対戦履歴",body:`まだ対戦記録がありません。1ゲーム遊ぶとここに残ります。<br><span style="opacity:.6">保存先：${storageMode()}</span>`,
      btns:[["閉じる",closeSheet,true]]});
    return;
  }
  const wins=h.filter(r=>r.win).length;
  const byDiff=["easy","normal","hard"].map(d=>{
    const g=h.filter(r=>r.diff===d);
    return g.length?`${DIFF_LABEL[d]}：${g.length}戦${g.filter(r=>r.win).length}勝`:null;
  }).filter(Boolean).join(" ／ ");
  const rows=[...h].reverse().slice(0,15).map(r=>{
    const dt=new Date(r.t);
    const day=`${dt.getMonth()+1}/${dt.getDate()}`;
    return `${day}　${num(r.n)}人・${esc(DIFF_LABEL[r.diff]||"?")}　${r.win?"🏆勝ち":`${num(r.rank)}位`}（${r.pt}点）`;
  }).join("<br>");
  showSheet({title:"対戦履歴",
    body:`<b>通算 ${h.length}戦 ${wins}勝</b><br>${byDiff}<br>
      <span style="opacity:.6">保存先：${storageMode()}</span><br><br>${rows}${h.length>15?"<br>…":""}`,
    btns:[
      ["閉じる",closeSheet,true],
      ["履歴を全消去",()=>confirmClear(),true],
    ]});
}
$("histBtn").onclick=showHistory;

function endGame(){
  over=true; renderAll();
  const rank=[...players].sort((a,b)=>b.pt-a.pt||a.bought-b.bought); // 同点はカード少ない方
  const win=rank[0];
  saveRecord({
    t:Date.now(), n:players.length, diff:diffLevel,
    win:win===players[0], rank:rank.indexOf(players[0])+1, pt:players[0].pt,
  });
  showSheet({
    title: win===players[0] ? "🎉 あなたの勝ち！" : `${win.name} の勝ち！`,
    body: rank.map((p,i)=>{
      const me=p===players[0];
      return `${me?"<b>":""}${i+1}位　${p.name}：${p.pt}点（カード${p.bought}枚・貴族${p.nb}）${me?"</b>":""}`;
    }).join("<br>"),
    btns:[["もう一度遊ぶ",()=>chooseSetup()],["閉じる",closeSheet,true]]
  });
}

chooseSetup();

  var HTML=`<p class="hgoal"><b>目的</b>　発展カードで得点を集め、先に15点へ。全員の手番数が揃った時点で集計し、同点ならカード枚数が少ない方の勝ちです。</p><h3>手番でできること（3つのうち1つ）</h3><p><b>① 宝石を取る</b>：違う色を3枚 ／ または同じ色を2枚（山に4枚以上残っている場合のみ）<br><b>② カードを買う</b>：コストを支払って発展カードを購入<br><b>③ カードを確保する</b>：1枚を手元にキープし、金を1枚もらう（最大3枚）</p><h3>ボーナスが雪だるま式に効く</h3><p>買った発展カードは<b>永続の割引</b>になります。白のカードを2枚持っていれば、以後どのカードも白のコストが2つ安くなります。<br>序盤は安いカードでボーナスを増やし、終盤に高得点カードを買うのが基本です。</p><h3>宝石は10枚まで</h3><p>手持ちの宝石が10枚を超えたら超過分を捨てます。取りすぎに注意。</p><h3>貴族</h3><p>上部の貴族タイルは、指定された色のボーナス数を満たすと<b>自動的に訪問し+3点</b>。色を意図的に偏らせる価値があります。</p><h3>金（ワイルド）</h3><p>確保でもらえる金は、どの色の代わりにも使えます。高額カードを買う切り札です。</p><h3>手番順と操作</h3><p>画面上部に<b>手番順</b>が表示されます（金枠が現在の手番）。先手はランダムに決まり、以降その順で時計回りに回ります。<br>宝石をタップして選び「宝石を取る」。同じ宝石を<b>2回タップ</b>で同色2枚になります。金枠のカードは今すぐ買えるカードです。</p><h3>CPUについて</h3><p>つよいCPUは、あなたがあと少しで買えそうな高得点カードを「確保」で横取りしてきます。狙いのカードは早めに押さえましょう。</p>`;
  var veil=document.getElementById("helpveil");
  document.getElementById("helpbody").innerHTML=HTML;
  function open(){ veil.classList.add("show"); }
  function close(){ veil.classList.remove("show"); }
  document.getElementById("helpBtn").onclick=open;
  document.getElementById("helpclose").onclick=close;
  veil.onclick=function(e){ if(e.target===veil) close(); };
  window.openHelp=open;
})();
<\/script>

(function(){
  function apply(t){ document.documentElement.setAttribute("data-theme", t==="light"?"light":"dark"); }
  var t=null;
  try{ t = window.name && window.name.indexOf("theme:")===0 ? window.name.slice(6) : null; }catch(e){}

  if(!t){ t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark"; }

  window.addEventListener("message", function(ev){
    if(ev.data && ev.data.type==="theme") apply(ev.data.value);
  });
})();

<!-- Firebase（GitHub Pagesに置いて他端末と履歴を同期する場合に使用。未設定・読込失敗でも動きます） -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"><\/script>
